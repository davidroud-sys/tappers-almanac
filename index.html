l, studied physics at Imperial College London, and began to pursue his PhD. He studied the faint glow of dust drifting between the planets. To do it, he traveled to the Canary Islands, where the observatory on the peak of Tenerife offered dark skies and a clear view. \n\nHis music also never stopped. And in 1974, his band took off. Queen became a global phenomenon. The PhD went into a drawer. It waited more than 30 years. In 2007, he pulled the thesis back out, finished it, submitted it, and he earned his doctorate in astrophysics. Brian was 60.\n\nIn 2014, Brian co-founded International Asteroid Day, and chose June 30 (today!) ... the day in 1908 when the largest asteroid impact in recorded history struck Earth, in Tunguska, Siberia. Brian warns that humanity is living on borrowed time. As of 2026, we've found only 8% of the near-Earth asteroids big enough to destroy a city."}],"2026-07-01":[{"round":1,"name":"Newark, New Jersey","lat":40.743,"lon":-74.1724,"country":"United States","continent":"North America","story":"Alice Guy, born July 1, 1873, just outside Paris. She was working as a secretary at a camera company called Gaumont when motion pictures arrived. In 1895, the new machines mostly filmed real life ... a train arriving, workers leaving a factory, people crossing a street. Alice thought, what if a film could tell a story?\n\nShe asked her boss if she could try. He said yes ... on the condition that it didn't interfere with her secretarial duties. \n\nIn 1896, she made a short film about a fairy pulling babies out of a cabbage patch. It had a plot, costumes, and actors.\n\nShe ran Gaumont's film production for the next ten years. Then she sailed to America, built a studio in Fort Lee, New Jersey, and for a few years ran the largest film studio in the United States. She hung a single instruction on the wall for her actors, \"Be Natural.\"\n\nA few years later, Hollywood rose, and her studio closed.\n\nFor decades, we didn't really hear about Alice ... the people who wrote down the history of movies simply left her out. In recent years, film historians began digging through studio records, production notes, and surviving films. And Alice did so much more than anyone realizes. \n\nWhen she started making films, movies were records of real life. By the time she left filmmaking, audiences expected stories with actors, costumes, close-ups, special effects, and scenes edited together into a story."},{"round":2,"name":"Tokyo, Japan","lat":35.6764,"lon":139.65,"country":"Japan","continent":"Asia","story":"Masaru Ibuka, born April 11, 1908. He co-founded Sony with Akio Morita in 1946, and in 1955, Sony released Japan's first transistor radio. By 1979 he was 71, and he was a serious, and frustrated, music lover ... he carried a Sony TC-D5, a \"portable\" cassette recorder. It weighed 4 pounds and was the size of a small briefcase.\n\nMasaru took a lot of long flights. He went for a lot of long walks. And he wanted to listen to opera. He carried his cassette recorder into the lab and asked an engineer to gut it. Pull out the speaker (he wanted headphones). Pull out everything needed for recording (he just wanted to listen). Make it light enough to hold. \n\nHis colleagues thought he'd lost his mind. A cassette player that can't record? Who buys that? And they were right. Today, July 1, 1979, the Walkman goes for sale for the first time. In July, it sold 3,000 units. It was a flop. They'd removed most of the features ... how do you sell a product when you are advertising all the things it doesn't have?\n\nSony's marketing team stopped trying to tell people about the Walkman, and instead, handed them one. The moment people tried it, they understood. Music wasn't trapped in a living room any more. It was personal, and you could take it anywhere.\n\nThey carried test players into the streets of Tokyo and just put headphones on strangers. Sales skyrocketed. Stores sold out. Within a year, Sony was selling 20,000 per month, and couldn't keep up with demand.\n\nAnd Masaru finally got to take his opera everywhere."},{"round":3,"name":"Charlottetown, Prince Edward Island, Canada","lat":46.2382,"lon":-63.1311,"country":"Canada","continent":"North America","story":"In the 1860s, Britain had a handful of colonies across the top of North America, from the Atlantic to the Great Lakes. They had separate governments, separate currencies, and they argued constantly. Most people assumed they'd stay that way ... and plenty of Americans assumed they'd eventually just join the United States.\n\nIn 1864, a few of them finally sat down to talk. The meeting was in Charlottetown, on Prince Edward Island. The delegates from the Province of Canada more or less crashed the gathering. They also brought alcohol. A lot of alcohol. The real negotiating happened at banquets and balls that ran until five in the morning.\n\nThey sketched a plan for the colonies to unite in a federation. It was not popular. Some colonies feared losing control of their own affairs. Others doubted a country that big could even work. The talks dragged. \n\nWhen the American Civil War ended, groups of Irish-American veterans called the Fenians began crossing the border, hoping to seize Canada and hold it ransom. They wanted Ireland's independence. The Canadian colonies' defenses were in shambles. Alone, each was vulnerable. Together, maybe not.\n\nToday, July 1, 1867, Ontario, Quebec, New Brunswick, and Nova Scotia united as the Dominion of Canada. No revolution. No war of independence. No king overthrown. Just people deciding they would be stronger together than apart."},{"round":4,"name":"Gaborone, Botswana","lat":-24.6282,"lon":25.9231,"country":"Botswana","continent":"Africa","story":"Seretse Khama, born July 1, 1921. He was a king. His grandfather had ruled the Bamangwato people of Bechuanaland (today: Botswana), and when Seretse was four, the throne passed to him. His uncle ruled as regent, and sent him to England to study law.\n\nIn 1947, at a dance in London, he met a young Englishwoman named Ruth Williams. She was a clerk at Lloyd's of London. They fell in love. When they decided to marry, the church refused them ... he was Black, and she was white. They married at a registry office anyway ... and then it became an international political crisis.\n\nSouth Africa opposed marriages between Black and white people (they would make it a crime the next year), and a Black king with a white queen on its border enraged the apartheid government. Britain, struggling economically after World War II, needed South African gold. Britain sided with South Africa.\n\nSeretse went home and asked his people to decide. They backed him overwhelmingly. But this area wasn't independent yet ... it was the British protectorate of Bechuanaland. And Britain exiled him.\n\nAfter six years of exile, Britain let the couple return ... but only if Seretse surrendered his throne. He did. He started a political party instead. On September 30, 1966, Bechuanaland became the independent nation of Botswana, and Seretse became president.\n\nIt was one of the poorest countries on Earth. Then diamonds were found, on the land of Seretse's own people. He passed a law making all mineral wealth (diamonds included) belong to the whole nation. The money built schools and clinics and roads, and while much of Africa fell into war and coups, Botswana held elections and grew.\n\nSeretse and Ruth stayed married the rest of their lives."},{"round":5,"name":"Darwin, Australia","lat":-12.4634,"lon":130.8456,"country":"Australia","continent":"Oceania","story":"Amy Johnson, born July 1, 1903, in Hull, England. She was a secretary at a London law firm. On her way home from work she stopped at a small airport to watch the planes. One day, she decided to sign up for lessons. \n\nIn July, 1929, she earned her pilot's license. Then she trained as a mechanic, one of the first British women to do so. By the spring of 1930, Amy had about 75 hours in the air, and the farthest she had flown was the 180 miles from London to Hull. \n\nIn 1930, she announced she was going to fly to Australia. Alone. More than 11,000 miles (17,700 km) across Europe, the Middle East, India, and Southeast Asia. She bought a second-hand biplane and took off from England on May 5, 1930. \n\nShe got lost over the deserts of Iraq and was forced down near Baghdad. She got caught in a sandstorm. In Burma (now Myanmar), she landed hard on a muddy airstrip and damaged a wing. Mechanics worked through the night to patch the aircraft together while crowds gathered to watch.\n\n19 days after leaving England, Amy landed in Darwin, Australia. She became the first woman to fly solo from Britain to Australia. Australia went wild. They called her Queen of the Air. \n\nWhen she returned to London, 200,000 people gathered at the airport to watch her arrive. Another 1 million lined the streets (only 8 million lived in the whole city at the time) to cheer for her. She was one of the most famous pilots in the world.\n\nWhen World War II began, Amy joined the Air Transport Auxiliary, a group that ferried military aircraft from factories to airfields across Britain. The work was dangerous. Pilots often flew unfamiliar aircraft, alone, in poor weather, without radios. On January 5, 1941, while delivering an aircraft during a snowstorm, she became lost somewhere over the North Sea. Amy was 37."}],"2026-07-02":[{"round":1,"name":"Roswell, New Mexico","lat":33.3943,"lon":-104.523,"country":"United States","continent":"North America","story":"Happy World UFO Day! July 2, 1947, something crashed in the desert outside Roswell, New Mexico. The Roswell Army Air Field put out a press release saying they'd recovered a \"flying disc\". They walked it back within a day, and said it was just a weather balloon.\n\nThe cover-up part was real. In 1994 the Air Force admitted the weather balloon was a lie. It was actually Project Mogul, a string of top-secret high-altitude balloons built to listen for Soviet nuclear tests. The Air Force said they weren't hiding aliens ... they were hiding their spy program. \n\nIt seems like we can explain Roswell ... but can we explain all UFOs?\n\nSeptember 19, 1976, Iranian radar picked up an object over the capital. The Imperial Iranian Air Force scrambled an F-4 Phantom. As it closed in, the jet's instruments and radio went dead. It turned back, and the instruments worked again. They sent a second jet.\n\nMajor Parviz Jafari was flying it. He got a radar lock ... the object was as big as a 707. Every time he closed within 30 miles, it jumped to a new location. When he moved to fire a missile, his weapons panel and his comms cut out at the same instant. He broke off. Everything came back on.\n\nNearly 50 years later, and we still don't have a good explanation."},{"round":2,"name":"Stuttgart, Germany","lat":48.7758,"lon":9.1829,"country":"Germany","continent":"Europe","story":"Ferdinand von Zeppelin, born July 8, 1838, in the Kingdom of Württemberg, present-day Germany. He spent most of his life as an army officer, and eventually became a general. While visiting the US during the Civil War, he went up in an observation balloon. The experience fascinated him.\n\nIn 1891, he retired at 52 years old. He became obsessed with the idea of building an airship. Like the balloon he experienced, but steerable. Newspapers mocked it. Locals called him the Fool of Lake Constance.\n\nAt 62 years old, Ferdinand prepares to fly for the first time. Celebrities, military officers, and European nobles traveled from across the continent to watch. Today, July 2, 1900, his LZ 1 airship (400 feet, 128 m long) lifts off and flies for 18 minutes.\n\nPeople became fascinated with the idea and Ferdinand was suddenly one of the most famous inventors in Germany. But it wasn't easy ... In 1908, he was doing a critical test in front of a huge crowd when his airship made an emergency landing. It drifted into a pear tree, and the ship and the tree burned to the ground. Ferdinand was nearly bankrupt. Critics declared the whole thing finished.\n\nThe public disagreed. Donations poured in. Schoolchildren sent coins. Wealthy business leaders wrote him checks. In just a few weeks after the accident, the public had raised more than 6 million marks.\n\nThe money saved the project. New airships were built. The German military placed orders. At 70 years old, he had finally reached success. The airships worked.\n\nFerdinand von Zeppelin passed away in 1917 at 78 years old. Long enough to have seen giant airships carry passengers across Europe."},{"round":3,"name":"Salvador, Bahia, Brazil","lat":-12.9777,"lon":-38.5016,"country":"Brazil","continent":"South America","story":"Maria Quitéria de Jesus, born in 1792, on a farm near Feira de Santana in Bahia (now Brazil). As a child she learned how to ride horses and use firearms. When Portuguese troops occupied Salvador and Brazilian independence forces were organizing in the countryside, she wanted to fight. Her father said no. So Maria went to her sister's house, put on her brother-in-law's clothes, cut her hair short, and enlisted under the name \"Soldado Medeiros\".\n\nThe disguise didn't last long. Her father discovered what she had done and reported her to the army. By then, however, Maria had already earned the respect of her commanders. They refused to send her home. Instead, they allowed her to remain with the unit.\n\nShe fought in several engagements around Salvador. At Pituba, Itapuã, and elsewhere, she carried messages, scouted enemy positions, and fought alongside the men. During one battle, she captured Portuguese prisoners and escorted them back to camp herself. General Pierre Labatut took notice and promoted her to First Cadet.\n\nThe war dragged on for months. Then, today, July 2, 1823, the Portuguese finally abandoned Salvador and sailed away. The Liberation Army marched into the city in triumph, and Maria Quitéria marched with them. Emperor Dom Pedro I awarded her the Imperial Order of the Cruzeiro, one of Brazil's highest honors for military service.\n\nBahia is part of Brazil today, but it still celebrates July 2 as its own Independence Day ... the day Portuguese rule finally ended there. Happy Independence Day, Bahia!"},{"round":4,"name":"Holmenkollen, Norway","lat":59.9636,"lon":10.6672,"country":"Norway","continent":"Europe","story":"Alexander Edward Christian Frederik, born July 2, 1903, in Norfolk, England. He was a Danish prince. When he was two years old, his father became King Haakon VII of Norway, and Alexander was renamed Olav. He grew up loving the outdoors and sports. In 1928, when he was 25, he won an Olympic gold medal in sailing as a crew member of the Norwegian team.\n\nDuring World War II, Nazi Germany invaded Norway. Olav and his father refused demands to surrender and escaped with the Norwegian government. For the next 5 years, he traveled constantly among Norwegian soldiers, sailors, and airmen. He became one of the most important symbols of the country's resistance. When the war ended, he returned home to a hero's welcome.\n\nIn 1973, the world was hit by an oil crisis. Fuel supplies tightened, prices soared, and Norway restricted private driving on weekends. People who wanted to go skiing in the hills above Oslo had to leave their cars at home and take public transportation instead. \n\nKing Olav V wanted to go skiing. So, he grabbed his skis, put on his worn ski clothes, and boarded the Holmenkollen rail line. A photographer captured the moment. The picture spread across the country and became one of Norway's most beloved images.\n\nWhen someone asked how he could travel without bodyguards, Olav reportedly replied, \"I have four million bodyguards.\""},{"round":5,"name":"Chiang Rai, Thailand","lat":19.9105,"lon":99.8406,"country":"Thailand","continent":"Asia","story":"John Volanthen, born June 1971, in England. He grew up on the south coast and loved exploring. At 14, he joined a Scout caving trip and was hooked. In school, he studied medical electronics and he built a career designing medical and industrial technology.\n\nBut on weekends, he explored caves. Over the years, that hobby became a specialty. He learned cave diving, one of the most dangerous sports. Visibility is often zero and a wrong turn can be fatal. By his 40s, he was one of the world's most experienced cave rescuers.\n\nJune 2018. 12 boys and their coach entered the Tham Luang cave in northern Thailand. Monsoon rain flooded the passages behind them. As the waters rose, they fled deeper. They were trapped 2.5 miles (4 km) inside. In the dark. With no food.\n\nThailand mobilized the largest rescue in its history. The Thai Navy SEALs went in first. They are elite soldiers, but cave diving isn't your normal 'defend the country' sort of skill. They found nothing.\n\nAlong the way, someone called John. John called his partner Rick Stanton. Together, they flew to Thailand.\n\nToday, July 2, 2018, John entered the caves. 9 days after the boys vanished. Some passages were so narrow they had to take off their tanks, wiggle through, and then pull the tanks through. After more than 3 hours, John surfaced in an air pocket and found the trapped boys.\n\nFinding them was only the beginning. The boys were taught to wear diving masks, then sedated so panic would not overwhelm them during the hours-long journey through the flooded cave. One by one, divers guided them through the darkness. The rescue took 3 days.\n\nEveryone made it home."}],"2026-07-03":[{"round":1,"name":"Cape Cod, Massachusetts","lat":41.6688,"lon":-70.2962,"country":"United States","continent":"North America","story":"Megan Murphy lost both of her parents in her 20s. To stay close to them, she started walking the beach, talking to them as if they were with her, and looking for signs. A heart-shaped rock meant her father was listening. A piece of sea glass meant her mother. \n\nOne day, 20 years later, in 2015, she brought a marker. She wondered how many other people on the beach were carrying worries of their own. She picked up a flat stone and wrote, \"You've got this.\" Then she left it behind for a stranger to find. Later that day, a friend sent her a photo of the rock. Finding it had made her day. Megan was thrilled.\n\nShe wrote more messages. Other people started doing the same thing. The idea spread from beach to beach, then from town to town. Soon, painted rocks were appearing in parks, hiking trails, outside schools, and in hospital gardens.\n\nToday is International Drop a Rock Day! MapTap can't drop a rock for you to find ... the best I can do is the digital equivalent ... \n\nThe world is stranger and kinder than you think."},{"round":2,"name":"Kozhikode (Calicut), Kerala, India","lat":11.2588,"lon":75.7804,"country":"India","continent":"Asia","story":"Happy Feast of St. Thomas!\n\nThomas was one of Jesus's twelve apostles. Beyond that, we know surprisingly little about his early life. We don't know exactly when he was born, and we don't know what he did before he began following Jesus. If you're Christian, you know 'doubting Thomas' because he was the disciple who refused to believe the resurrection until he saw Jesus with his own eyes.\n\nAccording to ancient Christian texts, Thomas left the eastern Mediterranean and traveled east along trade routes to India. The journey would have taken him across deserts, mountains, kingdoms, and thousands of miles of unfamiliar territory. In India he began to preach Jesus, gather a following, and build churches.\n\nDid that really happen? It's impossible to prove, but by the time the story was written down, there were already ancient Christian communities in India claiming Thomas as their founder.\n\nWhen the Portuguese arrived in Kerala in 1498, they expected to find a land of Hindus and Muslims. Instead they found a thriving community of Christians. They had their own bishops, their own liturgy, and their own traditions that blended Christian theology with Hindu cultural practices.\n\nThe Portuguese were astonished. They expected to bring Christianity to India, not to find Christians who claimed they had been there since the age of the apostles. Christianity was in India before it was in Portugal.\n\nWe know these Christian communities are old. Very old. They can be traced back at least a thousand years, and probably several centuries further. Did Thomas really make the journey from Jerusalem to India 2000 years ago? No one can prove it.\n\nThe Christians of Kerala have never had much doubt."},{"round":3,"name":"Frederiksted, St. Croix, US Virgin Islands","lat":17.7117,"lon":-64.8826,"country":"United States","continent":"North America","story":"Anna Heegaard, born ~1790 on St. Croix. She had a white father and a mixed-race mother ... she was born free, but she also was a woman of color. She couldn't vote, testify in court, or hold a title of any kind. \n\nSometime in the 1820s she began a relationship with Peter von Scholten, the governor-general and the most powerful man on the islands. It would last for more than 20 years. Anna was a woman of two worlds ... she moved easily among the free colored community and the plantations, and she also appeared by Peter's side at formal events. It caused quite the scandal.\n\nAnna knew the islands in a way Peter never could. She told him about everything she saw. The cruelty on the plantations. The gap between what officials believed and what people actually lived.\n\nShe helped him assemble a list of social reforms that he carried to the Danish king. Schools for Black children opened. Free people of color won the right to own property. And things began to shift ... but not fast enough. Copenhagen had decreed that slavery would end on a schedule ... in 12 years. To the people living it, 12 years was a lifetime. A man named Moses Gottlieb, known across the island as Buddhoe, organized the slaves. He had one rule ... no killing. \n\nOn the night of July 2, 1848, people began gathering outside Fort Frederik. By morning there were ~9,000. Their demand was freedom, that afternoon, not 11 years from now.\n\nPeter traveled across the island to face them. He was not surprised the moment had come ... he had been preparing for it. Today, July 3, 1848, at 4pm, he stood in front of the crowd and declared every enslaved person in the Danish West Indies free, effective immediately. He had freed more than 22,000 people.\n\nCopenhagen was furious. He was relieved of duty, and hauled home to be put on trial. He would never see Anna again. \n\nFor more than a century, Anna was little more than a footnote. Then historians began asking ... why had Peter become so different from the other governors? Again and again, it came back to Anna. In 2024, St. Croix began work on her permanent memorial."},{"round":4,"name":"Banjul, The Gambia","lat":13.4549,"lon":-16.579,"country":"Gambia","continent":"Africa","story":"Isatou Ceesay, born 1972 in N'jau, The Gambia. She grew up on a farm in the middle of nowhere. Her father passed away when she was 10, and she dropped out of school to work. She made toys out of scraps of cloth and wood, and sold them. At 20, she sold the cow she had inherited from her father and used the money to train as a secretary.\n\nIn 1997, Isatou was frustrated with all the plastic bags. They were everywhere. On roads, in storm drains, in rivers. In her village, people were using them once then dropping them. Rainwater pooled inside, inviting mosquitoes ... and malaria. Goats wandered over, ate the bags, and died. One of those goats belonged to Isatou's grandmother.\n\nShe started collecting the bags. She washed them, dried them in the sun, and tore them into long thin threads. Then with the plastic thread, she crocheted a purse.\n\nPeople laughed at her. Digging through trash was an embarrassing thing to do. One woman joined. Then another. Soon a group was meeting under a tree, sorting bags by color, and selling bags at the local market.\n\nThen the regional market. And then to buyers in the United States. By the 2010s, Isatou's organization had trained more than 11,000 people. They call her the Queen of Recycling. \n\nToday is International Plastic Bag Free Day! The Gambia banned plastic bags in 2015. They aren't alone. More than 90 countries and territories have banned or heavily restricted single-use plastic bags, including Rwanda, Kenya, Eritrea, Tanzania, Mauritania, Morocco, Bangladesh, France, New Zealand, Chile, Canada, Vietnam (with biodegradable exceptions), and Italy."},{"round":5,"name":"Qizhou, Hubei Province, China ","lat":30.234,"lon":115.433,"country":"China","continent":"Asia","story":"Li Shizhen, born July 3, 1518, in Qizhou, in what is now Hubei, China. His family were doctors, but in Ming China, that wasn't prestigious. His father wanted more for his son. He wanted him to be a government official. All Li had to do was pass the imperial civil service exam.\n\nHe failed it. Then he failed it again. After the third time, he gave up, and his father finally let him train for the thing he'd wanted all along ... Medicine.\n\nAs he practiced, Li noticed the herbal manuals every Chinese physician relied on were riddled with mistakes. Plants misidentified. Poisons listed as cures. The same herb named three different ways. Patients were being treated from books full of errors.\n\nSo he set out to fix all of it.\n\nFor the next 27 years, he traveled across China. He climbed mountains, waded through rice fields, and asked farmers, hunters, fishermen, and woodcutters what they knew. He read more than 800 books. His son drew the illustrations. The finished work was 52 volumes ... it listed 1,892 substances and 11,000 remedies. And it brought centuries of accumulated medical knowledge into one of the most influential medical books in Chinese history."}],"2026-07-04":[{"round":1,"name":"Boston, Massachusetts","lat":42.3601,"lon":-71.0589,"country":"United States","continent":"North America","story":"Henrietta Swan Leavitt was born July 4, 1868, in Lancaster, Massachusetts. She went deaf as a young woman. She finished college and took a job at the Harvard College Observatory.\n\nShe was a \"computer\", a job in the late 1800s and early 1900s often filled by women who spent their days making calculations and measurements. Photography was new, and now telescopes were taking thousands of pictures of the night sky. Henrietta spent her days helping catalog every star, recording their positions and brightness. \n\nOver years, she noticed that some stars (called Cepheids) didn't shine steadily. Cepheids would brighten, then dim, in a regular rhythm. Like a heartbeat. Over the course of years, she realized that the stars with the slowest pulses were the brightest.\n\nA Cepheid can look dim either because ... it really is dim ... or because it is far away. But how do you know which it is? Henrietta had discovered the answer. Measure the star's heartbeat, and you knew its true brightness. Compare that to how bright it looked from Earth, and now you knew exactly how far away it was.\n\nShe had just figured out how to measure the universe. She published it in 1912. Twelve years later, Edwin Hubble used her method to prove Andromeda was outside our Milky Way. He showed there wasn't just one galaxy ... there are billions. He said Henrietta deserved the Nobel Prize. \n\nShe had passed away before we truly understood the value of her discovery."},{"round":2,"name":"Dublin, Ireland","lat":53.3498,"lon":-6.2603,"country":"Ireland","continent":"Europe","story":"Thomas Barnardo, born July 4, 1845, in Dublin, Ireland. As a teenager, he converted to evangelical Christianity. He wanted to become a doctor, and become a medical missionary to China. In 1866, he moved to London to begin medical school. \n\nThat year, a cholera epidemic swept through London. There were already a huge number of destitute children, and now there were thousands more orphaned. Thomas opened a school, the 'East End Juvenile Mission'. One night, after school was over, a boy named Jim Jarvis lingered. Thomas asked him why he wasn't going home. Jim said he didn't have one.\n\nJim took Thomas to the rooftops of London, where homeless children would go after dark. They'd sleep with their heads near the ridge, and feet in the gutters. Thomas stopped thinking about going to China.\n\nInstead, he spent the rest of his life rescuing children from the streets of London. He hung a sign, 'No Destitute Child Ever Refused Admission'. And he meant it. He opened homes that provided food, clothing, medical care, schooling, and training, then built a network of supporters across Britain whose donations funded the work.\n\nBy the time he died, ~60,000 children had passed through the homes, schools, and programs he created."},{"round":3,"name":"New Orleans, Louisiana","lat":29.9511,"lon":-90.0715,"country":"United States","continent":"North America","story":"Happy Independence Day, America!\n\nBy 1779, the American Revolutionary War had grown beyond America. France had joined the fight. Then Spain. Battles were being fought in the Caribbean, on the Gulf Coast, around Gibraltar, and across the Atlantic. What began as a colonial rebellion was turning into a global war.\n\nSpain's most dangerous man in the New World was a 33-year-old governor in New Orleans named Bernardo de Gálvez.\n\nBefore Spain had even declared war, Bernardo was already slipping gunpowder, muskets, and medicine up the Mississippi to Washington's army. When Spain did declare war, he went on the attack. He began taking the Gulf Coast from the British one fort at a time. Baton Rouge. Natchez. Mobile. Then Pensacola, the British capital of West Florida.\n\nAt Pensacola, the Spanish fleet froze. The bay was guarded by a British fort, and his admiral refused to sail his ships past its guns. So Bernardo took his own little brig, the Galveztown, and sailed in alone, under fire, daring the rest to follow. They did.\n\nThe United States was born in America, but its independence was won in a world war. And Bernardo helped win a war for a country that wasn't his. In 1783, a grateful Congress voted to hang his portrait in the Capital."},{"round":4,"name":"Port Hedland, Western Australia, Australia","lat":-20.3104,"lon":118.5775,"country":"Australia","continent":"Oceania","story":"Quinlyn Wardagoo, born July 4, 1900, in the far northwest of Australia. She spent her early childhood with her Aboriginal family, speaking her native language and growing up in a world that had already existed for thousands of years.\n\nWhen she was about six years old, strangers arrived and took her away. She was sent hundreds of miles from home to Beagle Bay Mission. There, she was given a new name, Belinda, and told to leave the old one behind. Her language was discouraged. The name Quinlyn Wardagoo disappeared from official records.\n\nBelinda grew up at the mission. She married, and raised six children, helped start a school, and became one of the most respected women in her town. Decades passed. Children became grandchildren. Then great-grandchildren. The whole country changed around her.\n\nIn 2007, one of her grandsons mentioned her childhood name to an Aboriginal girl, and the girl knew the family. A few phone calls later, and in May, at 106 years old, Belinda met her younger brother Patty Jungine, 97, for the first time.\n\nFamily members said that after seeing him, words from her childhood language began returning to her. Words she had not spoken in ~100 years. \n\nPatty passed away a month later. Belinda soon after that, at age 107. She was buried in Port Hedland, the town that had been her home for eighty years. But two weeks later, her family carried a lock of her hair back to her family's homeland, and buried it beside her mother's grave."},{"round":5,"name":"Kaifeng, Henan Province, China","lat":34.7973,"lon":114.3076,"country":"China","continent":"Asia","story":"Today, July 4, 1054, court astronomers in Song China noticed a new star in the sky. It wasn't faint. It was bright enough to see in full daylight. It was in the sky for 23 days. They called it a \"guest star\". Then, slowly, it began to fade.\n\nThe Chinese recorded it carefully. Astronomers in the Islamic world seem to have noticed it too. And in what is now New Mexico, some researchers think Ancestral Puebloan artists may have carved it into stone ... a bright star beside a crescent moon.\n\nThe records survived, but the star never re-appeared. For ~900 years, it remained a mystery. \n\nIn 1928, Edwin Hubble was looking at the expanding cloud of gas in a nebula. He suggested if you traced that expansion backwards, the origin date would align to 1054.\n\nHe was right. The guest star that Earth had seen for 23 days? It was a distant supernova ... the explosion of a star at the end of its life. Today we call its remains the Crab Nebula."}],"2026-07-05":[{"round":1,"name":"Cambridge, England","lat":52.2053,"lon":0.1218,"country":"United Kingdom","continent":"Europe","story":"In 1684, a young astronomer named Edmond Halley rode to Cambridge to ask Isaac Newton about the shape of a planet's orbit ... and why was it shaped this way? Newton answered before Halley had finished asking. Planets orbit in an ellipse. He'd solved it years ago. Halley asked to see the proof. Newton couldn't find it. He'd lost his work.\n\nHalley asked him to work it out again ... and that turned out to be harder than it sounds. Newton had spent years pulling away from the world, keeping almost everything to himself. Halley kept after him ... encouraging, coaxing, and refusing to let it drop. Two and a half years later, Newton had finished his book, the 'Principia'. It was one of the most groundbreaking books in physics. The laws of motion, universal gravitation, and the math behind everything from a falling apple to an orbiting planet. \n\nThen the money ran out. The Royal Society, who would normally pay for the publishing, had just spent its budget on \"The History of Fishes\" ... a book that almost nobody bought. There was nothing left to publish Newton's book. Halley paid for it himself.\n\nThe Principia was published today, July 5, 1687. Later that year, when Halley went to collect his salary as the Society's clerk, they still had no cash. They paid him in unsold copies of the fish book."},{"round":2,"name":"Memphis, Tennessee","lat":35.1495,"lon":-90.049,"country":"United States","continent":"North America","story":"Elvis Presley, born January 8, 1935, in Tupelo, Mississippi, in a two-room house his father built. His twin brother was stillborn. The family had almost nothing, and when Elvis was 13 they moved to Memphis, into public housing.\n\nHe was a shy outsider. He was not popular in high school ... he was teased for his long hair and his loud clothes. He loved gospel and blues music. He spent hours listening to church choirs. \n\nIn 1953, at 18, he walked into a little Memphis studio and paid four dollars to record two songs. It was a gift, he said, for his mother. Nothing came from it. Elvis got a job as a truck driver for Crown Electric Company. \n\nA year later, the owner of the recording studio, Sam Phillips, was looking for a new sound. He paired Elvis with guitarist Scotty Moore and bassist Bill Black. The first sessions went nowhere. Hours passed. Nobody was happy with what they were hearing.\n\nDuring a break, Elvis picked up his guitar and started fooling around with an old blues song, called 'That's All Right'. He played it twice as fast as anyone was used to hearing ... today, July 5, 1954. \n\nA local radio station played the record a few days later. Elvis was too nervous to listen, so he went to the movies. The station's phones lit up and didn't stop ... his parents had to pull him out of the theater so the DJ could put him on the air.\n\nCrown Electric would need a new truck driver."},{"round":3,"name":"Algiers, Algeria","lat":36.7538,"lon":3.0588,"country":"Algeria","continent":"Africa","story":"On July 5, 1962, Algeria won its independence from France. It had taken a brutal 8-year war. Hundreds of thousands had died. But it sent a message across Africa ... a European empire could be beaten. And Algeria could show you how.\n\nThroughout the 1960s, fighters from across the continent came to Algeria for training, weapons, and money. Nelson Mandela came in 1962 to learn from Algeria's guerrillas. The ANC, the PLO, and even the American Black Panthers opened offices in Algiers. People began calling the city the capital of revolution.\n\nThen the dominoes began to fall. Guinea-Bissau won independence in 1974. Mozambique (June 1975), Cape Verde (July 1975), Angola (November 1975), Zimbabwe (1980), Namibia (1990). South Africa ended apartheid and held its first democratic elections in 1994. Each struggle was different. Each was won by its own people. But running through many of them was a line back to Algiers, where a newly independent nation had opened its doors, offering training, support, and sanctuary to those fighting colonialism, occupation, and apartheid around the world."},{"round":4,"name":"Maturín, Venezuela","lat":9.7457,"lon":-63.1832,"country":"Venezuela","continent":"South America","story":"Juana Ramírez, born into slavery, January 12, 1790, in eastern Venezuela. She was the daughter of an African woman who'd been enslaved and shipped across the ocean. Juana grew up washing other people's clothes in Maturín.\n\nWar came to Venezuela. Today, July 5, 1811, Venezuela declared independence from Spain, and Juana joined the fight. She was put in charge of a unit called the Batería de Mujeres (the \"Women's Battery\"). There were about a hundred of them. They hauled gunpowder, loaded cannons, and dragged off the wounded. \n\nOn May 25, 1813, a Spanish army marched on Maturín. At the height of the battle, Juana walked forward, across open ground and through enemy fire. She reached the body of a fallen enemy Spanish officer. She took up his sword and raised it over her head, and advanced forward. The Venezuelan defenders surged after her, and the battle was won.\n\nJuana lived until 1856, long enough to see Venezuela become an independent nation. In Maturín, statues were raised in her honor, almost always showing her with the sword she seized. Schoolchildren learned her nickname, La Avanzadora \"The One Who Advances\". In 2015, her remains were transferred to Venezuela's National Pantheon in Caracas, making her the first Black woman honored there among the country's national heroes."},{"round":5,"name":"Praia, Cape Verde","lat":14.9331,"lon":-23.5133,"country":"Cape Verde","continent":"Africa","story":"Happy Independence Day, Cape Verde! Today, July 5, 1975. On paper, this doesn't look like a country that should have made it. Ten dry volcanic islands off the coast of West Africa. No oil. No major mineral wealth. Almost no rain. Portugal ruled for ~500 years, and left behind little infrastructure and few opportunities. ~65% of the population could not read or write. The treasury was empty. Unemployment was high. Every arrow pointed down.\n\nCape Verde did almost everything right. In 1991 it held its first multiparty elections and peacefully transferred power. Over the next few decades it became one of Africa's strongest democracies. Literacy rose from roughly a third of the population to nearly 90%.\n\nLife expectancy has climbed to 75 years, among the highest in Africa. In 2007, the United Nations removed Cape Verde from its list of the world's least developed countries. It was the second country ever to graduate."}],"2026-07-06":[{"round":1,"name":"Manchester, New Hampshire","lat":42.9956,"lon":-71.4548,"country":"United States","continent":"North America","story":"The Amoskeag Manufacturing Company, in Manchester, New Hampshire, was the largest cotton mill in the world. 30 buildings along the Merrimack River, turning out miles of cloth every hour. At its peak, it employed ~17,000 people.\n\nIn 1857, there was a global financial crisis ... there was over-speculation in railroads, a big bank failure, and the collapse of grain prices after the end of the Crimean War. Orders dried up, and the shop was idled.\n\nNehemiah Bean (born 1818, in New Hampshire) was a machinist at the shop. He suddenly had extra time on his hands. He was also a volunteer firefighter, and he was tired of the way fires were fought ... Men worked hand pumps until their arms gave out, and then other men took their place.\n\nSo Nehemiah designed a steam-powered fire engine that pumped itself. He built it from an idea, and it worked well enough that Amoskeag put him to work building the best fire engine in New England.\n\nOn its trial run, his engine threw two streams of water over 200 feet into the air, and held them there for as long as the engine had coal. For the first time, a fire engine no longer depended on how long firefighters could keep pumping. And today, July 6, 1859, the city of Manchester bought the first engine and built Steam Fire Engine Company No. 1. \n\nThen the orders started coming in ... the largest cloth company in the world also became the manufacturer of the best fire engines. Amoskeag built the earliest fleets for both the New York and Los Angeles fire departments. It kept producing them for more than 50 years, over 850 engines."},{"round":2,"name":"Camp Hood, Texas","lat":31.1349,"lon":-97.78,"country":"United States","continent":"North America","story":"Jack Roosevelt Robinson, born Jan 31, 1919, in Georgia. In 1941, low on money, he dropped out of school and got a job. When the US entered World War II, he was drafted. He applied to Officer Candidate School ... the Army made that quite difficult for Black servicemen at the time. But he scored extremely well on the aptitude tests and was accepted. He graduated and became an officer.\n\nToday, July 6, 1944, Second Lieutenant Robinson boarded an Army shuttle bus at Camp Hood, Texas. He took a seat halfway down the aisle. A few blocks later, the civilian driver ordered him to the back. Robinson knew the policy ... segregation on military buses had been officially prohibited. He said no.\n\nHe was arrested and charged with insubordination, disturbing the peace, drunkenness (he didn't drink), conduct unbecoming an officer, insulting a civilian woman, and refusing to obey a lawful order. The court-martial tribunal heard testimony for four and a half hours.\n\nHis defense attorney dismantled the witnesses one by one. Robinson's commanding officer testified to his character. Verdict: Not Guilty.\n\nJack received an honorable discharge a few months later. About a year after that, Branch Rickey of the Brooklyn Dodgers invited Jackie Robinson to join the Dodgers and help break baseball's color barrier. But that is a story for another day."},{"round":3,"name":"Sparta, Greece","lat":37.0755,"lon":22.4297,"country":"Greece","continent":"Europe","story":"2400 years ago, the Spartans were one of the most feared armies in the ancient world. Spartan boys were taken from their families at 7 and raised for nothing but war. They did not retreat, and they did not surrender. A Spartan came home with his shield, or on it. The rest of Greece believed they simply could not be beaten.\n\nToday, July 6, 371 BC, near a town called Leuctra, a Theban general named Epaminondas decided to test that belief. The Spartans marched out to crush the Thebans. Instead of spreading his army evenly across the field, Epaminondas packed his best troops into a column fifty men deep and aimed it straight at the Spartan king and his elite warriors.\n\nThe collision shattered the Spartan line. Sparta's king, Cleombrotus, was killed. \n\nEpaminondas wasn't done. Sparta's power rested on the Messenians, an entire people Sparta had conquered and forced to farm the land. With all the slaves as farmers, the Spartan men could devote themselves to war. Epaminondas marched south and freed them. All of them. And then he helped them build a great walled city of their own.\n\nThe Messenians had been enslaved for nearly 300 years. Without the slave labor to feed it, Sparta's war machine had nothing left to stand on. The myth of Spartan invincibility was broken. Sparta survived, but it never again dominated Greece."},{"round":4,"name":"Auckland, New Zealand","lat":-36.8485,"lon":174.7633,"country":"New Zealand","continent":"Oceania","story":"Arthur Lydiard, born July 6, 1917, in Auckland, New Zealand. Arthur made shoes in a factory for a living, and took up running as a hobby. A frustrating hobby. No matter how hard he trained, faster runners kept beating him. Coaches told everyone to focus on speed. Arthur wasn't fast. If he wanted to be competitive, he needed to find another way. \n\nHe began experimenting on himself. Before work, after work, on weekends, he ran farther and farther through the hills west of Auckland. Sprints. Hills. Distance. 10 miles. 15. 20. He was trying to figure out which ingredient led to better performance. The answer was building a huge aerobic base ... up to 100 miles per week. Then hills for strength, and only at the very end, speed.\n\nFriends noticed his performance improve. Dramatically. And then they asked to join him. Soon, Arthur wasn't just experimenting on himself anymore. He was coaching a growing group of runners from around Auckland, testing his ideas on athletes of every ability.\n\nThe results were impossible to ignore. Runners who followed his program began winning national titles and setting records. At the 1960 Olympics in Rome, runners coached by Arthur won medals. Gold medals (in the 800 and 5000 meter races) that stunned the track world. Four years later, they did it again in Tokyo.\n\nArthur wasn't trying to reinvent coaching. He was just trying to figure out why he kept losing. In the process, he changed how the world trains. He never won an Olympic medal himself. But athletes trained using his ideas have won hundreds."},{"round":5,"name":"Moroni, Comoros","lat":-11.7172,"lon":43.2473,"country":"Comoros","continent":"Africa","story":"The Comoros are four volcanic islands in the Indian Ocean, between Mozambique and Madagascar. They are small, remote, and covered in ylang-ylang trees whose flowers help make some of the world's most famous perfumes. France ruled the islands for generations.\n\nBy the 1970s, most of Africa had already won its independence, often after wars and decades of struggle. France's last small, remote colonies got an easier path ... they got to vote.\n\nIn 1974, France had the people of Comoros vote on independence. Grande Comore, Anjouan, and Mohéli voted overwhelmingly to split from France. Mayotte voted to stay French.\n\nToday, July 6, 1975, the Comoros declared independence. Well, three-quarters of it, anyway. Mayotte is still a part of France. It uses the euro, elects representatives to the French parliament, and is part of the European Union. The government of Comoros still wants Mayotte back. And Mayotte keeps voting to stay French. So a tiny dot of the European Union sits in the sea between Mozambique and Madagascar."}],"2026-07-07":[{"round":1,"name":"Ocean City, Maryland, USA","lat":38.3365,"lon":-75.0849,"country":"United States","continent":"North America","story":"Charles Albert Tindley, born July 7, 1851, on Maryland's Eastern Shore. His father had been enslaved, but his mother was free. She passed away when Charles was young, and he spent much of his childhood working instead of attending school. But he taught himself to read ... at night, he studied books by candlelight after long days of labor.\n\nAs a young man, Charles moved to Philadelphia and found work as a janitor at a church. He kept studying. He learned Greek. And Hebrew. He passed the exams to become a minister. Years later, he returned to the same church where he had swept the floors ... this time as its pastor. Over the next 20 years, his congregation grew from ~130 to more than 10,000.\n\nCharles became one of the most influential hymn writers in America. His songs spoke directly to working people facing hardship, grief, poverty, and discrimination. They were simple, memorable, and hopeful. Congregations across the country began singing hymns such as \"I'll Overcome Some Day\".\n\nPerhaps his best known hymn, written in 1905 ... \"Stand By Me\". More than 50 years later, it helped inspire the song by Ben E. King."},{"round":2,"name":"Rome, Italy","lat":41.9028,"lon":12.4964,"country":"Italy","continent":"Europe","story":"Frances Xavier Cabrini, born July 15, 1850, in Lombardy, Italy. She was small and often ill as a child. She might have been born premature, but records are thin. She dreamed of becoming a missionary in China. She folded paper boats, filling them with violets, and floating them down a stream, imagining they were carrying missionaries across the ocean.\n\nAs an adult, she founded a new religious order and asked permission to go east. Instead, Pope Leo XIII pointed her in the opposite direction. \"Not to the East, but to the West\", he told her. Millions of Italians were emigrating to America, and many were arriving poor, alone, and unable to speak English. In 1889, Cabrini sailed for New York with a handful of sisters.\n\nThe plan immediately fell apart. The archbishop who had invited them had no place for them to stay and suggested they return to Italy. Cabrini refused. If she had crossed an ocean to help immigrants, she was not turning around at the dock. She and her sisters found shelter, raised funds, and opened an orphanage. Then another. Then came schools, hospitals, and missions.\n\nFor the next 30 years, Cabrini crossed the Atlantic again and again. By the time she died in 1917, she had founded 67 institutions across Europe and the Americas. Today, July 7, 1946, she became the first American citizen to be declared a saint."},{"round":3,"name":"Sendai, Japan","lat":38.2682,"lon":140.8694,"country":"Japan","continent":"Asia","story":"Happy Tanabata (七夕), Japan!\n\nIn the summer night sky there are two bright stars facing each other across the Milky Way ... one is Vega, the other Altair. They are lovers.\n\nThe story began in China more than 2,000 years ago. Vega was the Weaver Princess (Orihime in Japan). Altair was the Cowherd (Hikoboshi). They fell deeply in love. But the more time they spent together, the less work they did. The princess stopped weaving. The cowherd neglected his cattle. So the King of Heaven separated them, placing them on opposite sides of the Heavenly River ... the Milky Way.\n\nHeartbroken, the lovers begged for another chance. The king relented. They could meet once a year, on the seventh day of the seventh month. On that night, a flock of magpies would form a bridge across the river of stars so they could cross and be together again.\n\nThe legend traveled from China to Japan, where it became Tanabata. Today, people celebrate by writing wishes on colorful strips of paper and hanging them from bamboo branches."},{"round":4,"name":"St Paul, St Paul Island, Pribilof Islands, Alaska, USA","lat":57.1236,"lon":-170.275,"country":"United States","continent":"North America","story":"Northern fur seals once filled the North Pacific by the millions. Each summer they returned to the same islands to breed, and for centuries the herds were massive. In the 1800s, their thick, waterproof fur became one of the most valuable commodities in the world. Hunters from the United States, Russia, Japan, and Canada all joined the trade.\n\nAt first, most seals were harvested on land. Then hunters began pursuing them at sea. Ships intercepted the animals during their migrations, often killing breeding females before they could return to their pups. The profits were enormous, but by the early 1900s the warning signs were impossible to ignore. Seal populations were falling fast.\n\nThe problem was bigger than any one country. If the US restricted hunting, Canadian ships could continue. If Russia stopped, Japanese vessels could take more. \n\nToday, July 7, 1911, the United States, Russia, Japan, and Great Britain signed the North Pacific Fur Seal Convention. It was the first international treaty created to protect a wildlife species. It banned most open-ocean hunting and created a system for protecting the herds. \n\nIt worked. Fur seal populations here in the Pribilofs had dropped to ~300,000. After the treaty, they recovered to more than 2 million."},{"round":5,"name":"Honiara, Guadalcanal, Solomon Islands","lat":-9.4456,"lon":159.9729,"country":"Solomon Islands","continent":"Oceania","story":"In 1568, a Spanish navigator named Álvaro de Mendaña was the first European to reach this cluster of islands. Álvaro got off the boat and explored the area, and found flecks of gold in the rivers. He was thrilled.\n\nHe became convinced he had found Ophir, the legendary land that, according to the Bible, supplied King Solomon with gold for the Temple in Jerusalem. In honor of the ancient king, Álvaro named the whole archipelago the Solomon Islands.\n\nSpain returned several times to collect the treasure ... but there was no treasure. They eventually gave up and sailed away. The wildly optimistic name stayed.\n\nThe Solomon Islands are a collection of nearly a thousand individual islands. There are 6 large ones, and hundreds of smaller islands, atolls, and reefs. Across them, the people speak around 70 different languages. This is one of the most linguistically diverse countries in the world. Communities separated by only a few miles of ocean can have completely different languages and traditions.\n\nBut they have at least one thing in common ... Happy Independence Day, Solomon Islands!"}],"2026-07-08":[{"round":1,"name":"Atlantic City, New Jersey, USA","lat":39.3643,"lon":-74.4229,"country":"United States","continent":"North America","story":"Happy Blueberry Day! \n\nFor most of human history, you could not go to a store and buy blueberries the way you could buy other fruit. Every blueberry on earth grew in the wild. And every attempt to farm them failed.\n\nFarmers tried. They'd find blueberry bushes out in the wild, transplant them to the farm, tend the soil ... then the bush would sicken, and die. And the better you cared for the plant, the faster you killed it. \n\nIn 1910, a USDA botanist named Frederick Coville finally figured out the secret ... blueberries need acidic soil. Soil that would cause other plants to struggle was perfect for blueberries.\n\nElizabeth White decided to put this to the test. She grew up on a cranberry farm in New Jersey, and invited Coville to test his idea at scale.\n\nElizabeth then paid the local woodsmen to comb the forest for wild bushes ... but only the best ones. Sweet, delicious, and plump. She named the varieties she kept after the men who found them. The finest came from a woodsman named Rube Leek. She called it Rubel.\n\nBy 1916, Elizabeth and Coville harvested the world's first commercially cultivated blueberry crop. Nearly every blueberry grown today traces back to those wild bushes."},{"round":2,"name":"Toulouse, France","lat":43.6047,"lon":1.4442,"country":"France","continent":"Europe","story":"Dominique-Jean Larrey, born July 8, 1766, in Beaudéan, a village in the French Pyrenees. His father was a shoemaker, who passed away when Dominique was 13. He was sent to his uncle in Toulouse, who was a surgeon. Dominique trained under him, and went to war as an army surgeon.\n\nHe was really good at it, and rose to become Napoleon's chief surgeon. At the time, the standard practice was to wait until the battle was over, then treat the wounded. The problem, of course, was that many of the wounded died waiting for the fighting to end.\n\nDominique created \"flying ambulances\" ... light, fast carts that charged into the fighting to drag men out while the guns were still firing. Then he changed the order in which the wounded were treated.\n\nInstead of treating the highest-ranking soldiers first, he treated the most injured first. After the Battle of the Pyramids, wounded enemy Mamluk soldiers were stunned to get exactly the same care as the French. \n\nHe had created the first modern triage system.\n\nHe was captured after the loss at the Battle of Waterloo. He was sent to the firing squad, when the Prussian commander, Blücher, recognized him, and knew how he had treated soldiers on both sides of the war. Blücher sent him home with an escort.\n\nNapoleon called him \"the most virtuous man I have known.\""},{"round":3,"name":"Yokohama, Japan","lat":35.4437,"lon":139.638,"country":"Japan","continent":"Asia","story":"By 1853, Japan had spent more than two hundred years with its doors largely shut to the outside world. Under the policy called sakoku, almost no foreigner could enter and almost no Japanese person could leave. \n\nToday, July 8, 1853, four American warships appeared off the coast of Uraga. Two were steam-powered, trailing black smoke and moving against the wind with no sails at all. Seeing a steam-powered ship for the first time must have been quite startling ... witnesses compared them to giant dragons. They called them kurofune ... the Black Ships. \n\nIn command was Commodore Matthew Perry. He carried a letter from US President Millard Fillmore asking Japan to open to trade. Perry insisted on speaking to the highest officials, then sailed away with a promise to return for an answer. \n\nHe came back the following year with an even larger fleet. Japan signed. The treaty opened a handful of ports. That sounds small ... but it was huge. For more than 200 years, the rulers had claimed they could keep foreign powers at bay ... now it had yielded under pressure from the outside. Confidence in the old government began to crack. \n\nWithin 15 years the shogunate that had ruled Japan for centuries had collapsed. Japan transformed. Power returned to the emperor. The samurai class was abolished. A national army replaced feudal warriors. Railroads appeared. Telegraph lines spread across the country. Modern factories, schools, banks, and industries sprang up almost overnight. \n\nPerhaps the biggest transformation was education. There were no universities in Japan prior to 1853. By 1872, there was a national school system, and by 1900, ~81% of the country's children were enrolled, one of the highest rates in the world."},{"round":4,"name":"Nuuk, Greenland","lat":64.1835,"lon":-51.7216,"country":"Greenland","continent":"North America","story":"On July 8, 1879, the USS Jeannette sailed out of San Francisco bound for the North Pole. At the time, maps of the Arctic were still full of question marks. Most explorers believed a warm current kept the sea around the Pole free of ice ... if you could get past the outer pack, warm, open water was waiting. \n\nYeah, not so much.\n\nWithin weeks, the ship became trapped north of Siberia. It drifted helplessly with the ice pack for nearly two years before the ice finally crushed it. The crew survived longer than they had any reasonable right to ... but eventually, with their ship gone, and stranded in the middle of nowhere, most of them perished. \n\nThat should have been the end of the story. Three years later, Inuit hunters on the southern coast of Greenland (orange pole) found wreckage frozen in the ice ... clothing with the crew's names sewn into it. Papers signed by the captain. Pieces of the ship itself. \n\nThe discovery made no sense. The ship had been lost on the other side of the Arctic Ocean, nearly 3,000 miles away. The only explanation was that the ice itself was somehow moving. \n\nNorwegian explorer Fridtjof Nansen wanted to test the idea. He built a vessel called the Fram with a rounded hull designed to survive the pressure, and sailed it straight into the ice. Nature took control. Three years later, the Arctic ice had carried the ship across the polar sea."},{"round":5,"name":"Lagash, Sumer (modern-day Iraq)","lat":31.4167,"lon":46.4,"country":"Iraq","continent":"Asia","story":"Happy National Video Game Day!\n\nIn the early 1960s, computers were room-sized machines owned by governments and corporations. Almost no one imagined a child would ever touch one. History teachers already had a difficult job ... convincing children to care about people who had died thousands of years ago. They had textbooks, maps, and imagination. Computers simply weren't part of the picture.\n\nMabel Addis taught 4th grade in Katonah, New York. She also had a degree in ancient history. Her school teamed up with IBM to discover if computers could help teach. I think the obvious thing to do would be to make a quiz. Mabel made a world.\n\nHer game put you in command of the ancient city of Lagash. It is more than 5,000 years in the past, and you are the ruler (the Luduga). How much grain do you plant? How much do you store for a bad year? How much land can the city afford? You decide ... and the computer tells you what your kingdom does next. Droughts come. Rats eat the surplus. Cities rise and fall on your arithmetic.\n\nIt was called The Sumerian Game, first played in 1964, and it was the first computer game built around a story. By 1966, each turn started with your royal council telling you how it was going. Mabel used recorded voices and images ... in other words, cutscenes, before there was a word for them.\n\nMabel didn't set out to be a game designer. She just thought that play was a faster way to learn."}],"2026-07-09":[{"round":1,"name":"Montgomery, Alabama, USA","lat":32.3792,"lon":-86.3077,"country":"United States","continent":"North America","story":"Happy Fashion Day! \n\nThis is Ann Lowe, born ~1898 in Clayton, Alabama. Her grandmother had been enslaved, but after emancipation, the women in the family became dressmakers. Ann grew up surrounded by silk, lace, and dresses being sewn by hand.\n\nWhen she was 16, her mother passed away suddenly. Unfinished were 4 gowns that were being made for the governor's wife. She finished them herself ... and no one realized the person doing the work had changed.\n\nShe married young, but the marriage didn't last. She was determined to build her career in fashion, and she left with her son for New York City to study design. Segregation meant she had to study in a separate room from her classmates ... but she earned top grades.\n\nAfter graduating, she opened her own salon. She became known for her elaborate, hand-crafted gowns with intricate embroidery, and fine detail. Her clients grew to include some of America's wealthiest families ... the Rockefellers, the du Ponts.\n\nHer most famous commission came in 1953, when she designed the wedding dress for Jacqueline Bouvier. She was getting married to John Kennedy. Just 10 days before the wedding, a pipe burst in her workshop, and the dress and nine bridesmaids' gowns were ruined. Months of work.\n\nAnn and her team remade every dress, from scratch, in 8 days. She delivered them on time and absorbed the entire cost herself. When she arrived at the estate, she was told to use the back service entrance. She refused, and walked through the front door.\n\nThe wedding was front-page news across America. Most newspapers described the gown only as being made by \"a colored dressmaker\". Today, her work hangs in museums, including the Smithsonian and the Metropolitan Museum of Art."},{"round":2,"name":"Zadar, Croatia","lat":44.1194,"lon":15.2314,"country":"Croatia","continent":"Europe","story":"Nikola Tesla, born at the stroke of midnight between July 9 and 10, 1856, in the village of Smiljan, in what is now Croatia. As a schoolboy, he could do calculus in his head. His teachers thought he was cheating. In college he was just as gifted ... until he discovered gambling. He lost his tuition money, dropped out, and never earned a degree.\n\nTesla rebuilt his life. He found work at Edison's company in Paris and became their fix-it man, repairing power stations across Europe. He was so good they sent him to New York to work for Thomas Edison himself. But after a dispute over pay, Tesla struck out on his own. He was convinced the future was alternating current (AC), not Edison's direct current (DC). He set out to prove it.\n\nIt was a disaster. Investors took control, got what they wanted from him, and pushed him out. By the winter of 1886, one of the most brilliant engineers in America was digging ditches in New York for $2 a day. He tried explaining the advantages of alternating current to his foreman while he dug.\n\nAnd apparently, the foreman listened. The story goes he introduced Tesla to new investors. Tesla got to build an AC motor prototype. George Westinghouse saw it, bought the patents and backed the technology. And in 1893, their system lit the Chicago World's Fair. For millions, it was the first time they saw electric light work at this scale.\n\nToday, ~every electric grid on Earth runs on Nikola Tesla's alternating current."},{"round":3,"name":"Sucre, Bolivia","lat":-19.0421,"lon":-65.2559,"country":"Bolivia","continent":"South America","story":"Juana Azurduy, born July 12, 1780, near Chuquisaca, in what is now Bolivia. Her father was a Spanish landowner, her mother was Indigenous. Her mom passed away when she was 7, and Juana grew close to her father ... he taught her to ride, to shoot, and how to work the hacienda. A few years later, he passed away too.\n\nOrphaned, she was sent away to a convent to become a nun ... which did not last long. They expelled her at 17.\n\nIn 1805, she married Manuel Padilla, and in 1809, they joined one of the first independence revolts in South America. They were fighting against Spain, who had claimed nearly all of South America for the past 300 years. \n\nJuana recruited an all-women cavalry escort, the Amazonas. They were Indigenous fighters who initially beat back Spanish forces with slingshots and wooden spears, then armed themselves with captured muskets. At the height of the war, she and her husband commanded thousands of guerrilla fighters across the mountains of Upper Peru."},{"round":4,"name":"San Miguel de Tucumán, Argentina","lat":-26.8083,"lon":-65.2176,"country":"Argentina","continent":"South America","story":"In 1815, mid-battle, Juana left the field to give birth to her fourth child. The legend goes she was back at the front within hours. Months later, she led an attack that captured the Spanish battle flag at Potosí. \n\nThe war against Spain created new nations across South America. Today, July 9, 1816, here in Tucumán, Argentina declared independence. A few weeks later, the new country promoted Juana to lieutenant colonel ... and General Manuel Belgrano presented her with his own sword. The fighting continued for years. Juana lost her husband ... he died in battle trying to help her. She also lost four of her five children to disease in the war camps.\n\nThe war was finally won in 1825. Juana began to fade from history soon after. In 1857, her pension was cut as part of government austerity. But in 1946, the first well-researched biography about her was published by Joaquín Gantier. In 2009, Argentina promoted her to General. And in 2015, the statue of Christopher Columbus at the presidential palace was taken down ... and replaced with a 25-ton, 52-foot statue of Juana, sword raised.\n\nHappy Independence Day, Argentina! Today, both Bolivia and Argentina claim her as a national heroine."},{"round":5,"name":"Juba, South Sudan","lat":4.8517,"lon":31.5825,"country":"South Sudan","continent":"Africa","story":"Normally, a country's borders form over centuries. People group themselves by shared language, culture, and values. Lines are drawn and redrawn in conflict. If you are an optimist like me, the hope is we end up with borders that make sense ... and peace endures.\n\nThis is not how Africa's borders were made. They were drawn in Europe, by Europeans, in the 1880s, to protect colonial claims. The people living in Africa had nothing to do with the lines drawn across it.\n\nSudan was one of those. The north was Arab and Muslim. The south was home to the Dinka, the Nuer, the Shilluk and dozens of cultures with their own languages. The British ran the two halves as separate places. You needed a permit just to travel between them.\n\nIn 1956, the British left behind a single country. The fighting started before the country did ... The first war was from 1955 to 1972, then again, from 1983 to 2005. Millions perished. \n\nA 2005 peace deal made a promise ... someday, the south could vote on its future. The vote came in January 2011. Only ~15% of adults could read, so the ballot used two pictures. Clasped hands meant unity. A single open hand meant independence. People walked for days to vote ... and the result? 98.8% chose the open hand.\n\nToday, July 9, 2011, South Sudan achieves independence. But peace has been elusive. The challenges are mostly the same ... many different people trying to find a way to live together."}],"2026-07-10":[{"round":1,"name":"Cheyenne, Wyoming","lat":41.14,"lon":-104.8202,"country":"United States","continent":"North America","story":"In 1869, Wyoming was a self-governing US territory, population ~7,000. 6,000 men, 1,000 women (this was the census-qualified population, it doesn't include the Indigenous or immigrant numbers). \n\nWilliam Bright ran a saloon in the gold-mining town of South Pass City. He was a Union veteran with almost no schooling. His wife, Julia, was 21 years younger, and well educated. She also was a big believer in women's right to vote. She won him over. William was elected to the territory's first legislature and he introduced a bill granting full voting rights for women. And they could hold office too.\n\nIn 1869, it passed, and on December 10, 1869, Governor John Campbell signed it into law. Wyoming became the first government in the world (wow) to guarantee women full voting rights and public office.\n\nWhy did they do it? Some were truly progressive. Others wanted to make the state more attractive to women, given the imbalance, and believed that this would help (they were right). Women voted, they ran for office, and they served on juries. Oddly, the sky did not fall.\n\nIn 1890, Wyoming applied for statehood. Congress demanded it drop women's suffrage as the price of entry. The legislature wired back, \"We will remain out of the Union 100 years rather than come in without women\". Congress backed down and today, July 10, 1890, Wyoming entered the Union. It took the rest of America another thirty years to catch up."},{"round":2,"name":"Johannesburg, South Africa","lat":-26.2041,"lon":28.0473,"country":"South Africa","continent":"Africa","story":"Sixto Rodriguez, born July 10, 1942, in Detroit, the sixth child of Mexican immigrants. In the late 1960s and early 1970s, he was discovered by music producers who thought they had found a major talent. His songs were thoughtful, political, and poetic. He sounded like Bob Dylan.\n\nSixto recorded two albums, 'Cold Fact' and 'Coming from Reality'. They were good. But they went nowhere. His label dropped him. With his music career over, he gave up and went to work. \n\nFor the next 30 years, he did demolition and renovation around Detroit. He bought a run-down house at a city auction for $50 and lived in it. He didn't have a phone.\n\nWhat he didn't know was, somehow, a copy of Cold Fact had made it to South Africa. There, under apartheid, his anti-establishment songs became anthems. Bootlegged and rebootlegged, Cold Fact went on to sell ~half a million copies. He was, in South Africa, more famous than Elvis.\n\nNobody there knew anything about him, so rumors filled the gap ... maybe he killed himself, or maybe he died on stage. For 25 years, South Africa believed Rodriguez was dead.\n\nIn the 1990s, two fans went looking for the truth about how he died. They followed clues in his lyrics, built a website ... and his daughter found it. Sixto was very much alive, living in Detroit, and doing construction. \n\nIn 1998, they flew him to South Africa to play live. He walked into sold-out arenas filled with people who knew every word of the songs he had recorded 30 years earlier. \n\nHe gave most of the money away, and kept his $50 house."},{"round":3,"name":"Vilnius, Lithuania","lat":54.6872,"lon":25.2797,"country":"Lithuania","continent":"Europe","story":"Karl Plagge, born July 10, 1897, in Darmstadt, Germany. He fought in the First World War, trained as an engineer, and in 1931 he joined the Nazi Party. Germany was broken, and he believed the party would fix it. In the 1930s, the racism repelled him, and he said so. It cost him standing, but he kept his post as an army officer.\n\nIn 1941, he was sent to Vilnius. Karl ran a unit that repaired military vehicles, and he needed workers ... he issued work permits to Jewish laborers. Then he extended them to their wives and children. His argument to his leadership was that safe families meant faster workers. On paper, a workforce. In practice, a shield.\n\nHe could not stop the killing. Of the roughly 1,250 people under his protection, most would not live to see the end of the war. In July 1944, the Soviets were closing in and the Germans prepared to flee. Karl gathered the prisoners, and with an SS officer standing beside him, he told them the SS would move them somewhere safe. He said the Nazis were experienced with protecting people. The Jews he was protecting understood exactly what he meant. Hundreds hid in spaces they had already built. About 250 survived.\n\nAfter the war, Karl was put on trial as a former Nazi. Survivors traveled to the court to speak for him, to call him a hero. He disagreed. He did not believe he had done enough. He passed away in 1957.\n\nIn 2005, ~50 years later, Israel named Karl Plagge Righteous Among the Nations ... the honor it reserves for those who risked their lives to save Jews from the Holocaust. A title he had refused to claim for himself."},{"round":4,"name":"Nassau, Bahamas","lat":25.0443,"lon":-77.3504,"country":"The Bahamas","continent":"North America","story":"For about 300 years, the Bahamas belonged to Britain. The islands had a large Black majority, but power sat with a small group of white merchants known as the Bay Street Boys.\n\nThe system was built to keep it that way. You voted based on the property you owned, so a wealthy man could vote again and again, district after district ... some cast more than twenty ballots. Women couldn't vote at all.\n\nDoris Johnson (born June 19, 1921) grew up in this. She left the islands to get a college education, and came back with a doctorate. Then she helped take the system apart. In 1959, she stood before the all-male legislature and made the case for a woman's right to vote. And in 1962, Bahamian women voted for the first time.\n\nBahamians call this the Quiet Revolution ... a civil rights movement that never turned violent. In 1967, the rigged voting finally collapsed, and the majority took power for the first time.\n\nHappy Independence Day, Bahamas! Their flag is black, for the strength of the people, gold, for the sand, and aquamarine, for the sea. Oh, and Doris? She became President of the Bahamian Senate."},{"round":5,"name":"Pattaya, Thailand","lat":12.9236,"lon":100.8825,"country":"Thailand","continent":"Asia","story":"Moo Deng, born July 10, 2024, at a zoo near Pattaya, Thailand. Moo Deng is a pygmy hippo ... these are a miniature kind of hippo, about the size of a chunky dog. The zoo let the public vote on her name, and more than 20,000 people landed on \"Moo Deng\", which means \"bouncy pork\".\n\nAt two months old, a handful of photos of her went online, and the internet lost its mind. She was round. Shiny. Perpetually annoyed. And she would bite everything she could reach. Videos of her charging (harmlessly) at keepers, bouncing through puddles, and gnawing on knees and boots spread everywhere.\n\nVisitors skyrocketed. People flew in from across the world. So many came that the zoo had to limit each viewing to five minutes. There were Moo Deng plushies, memes, cakes, and songs. For a few months, this baby hippo was the most popular animal on Earth.\n\nThere are probably fewer than 2,500 pygmy hippos left in the wild, most of them in the forests of Liberia and its neighbors. And for all of Moo Deng's fame, it didn't really result in increased funding. Asked whether the craze had helped wild pygmy hippos at all, Elie Bogui, the coordinator of the project that studies them, answered, \"Not yet.\"\n\nMoo Deng's zoo is trying to change that. It's working to fund the first tracking collars for wild pygmy hippos ... so Elie's team can finally follow them, learn how many are left, and help protect the forests they live in."}],"2026-07-11":[{"round":1,"name":"Carlsbad, New Mexico","lat":32.4207,"lon":-104.2288,"country":"United States","continent":"North America","story":"Jim White, born July 11, 1882, in Mason County, Texas. When he was ~10, he was sent to live and work (as a cowboy) on a ranch in southeastern New Mexico. One day, while out on horseback, he spotted what looked like a column of black smoke rising from the desert. He was worried about a fire, and went towards it. It wasn't smoke.\n\nHundreds of thousands of bats pouring out of a cave. Jim sat and watched ... for 3 hours. He figured the cave holding that many bats had to be enormous.\n\nAs a teenager, he came back carrying a kerosene lantern. Using fence wire and wooden poles, he built a homemade ladder and climbed about 60 feet into the darkness by himself. Jim, apparently, was also a little insane. Over the next several years, he explored farther and farther, discovering chambers so vast that his lantern couldn't reach the walls or ceiling.\n\nMost people didn't believe his stories. In 1915, Jim guided photographer Ray V. Davis into the cave. The photographs were just incredible. \n\nPresident Calvin Coolidge declared it a national monument in 1923, and Jim signed on as its Chief Ranger (1926). Congress made it a national park in 1930.\n\nToday, Carlsbad Caverns National Park protects more than 119 known caves. And on summer evenings, the bats still rise from the entrance in a swirling column, sometimes for hours at a time."},{"round":2,"name":"Marseille, France","lat":43.2965,"lon":5.3698,"country":"France","continent":"Europe","story":"Jean-Louis Pons, born December 24, 1761, in the French Alps. His family was poor, and he received almost no formal education. At 27, he found work as the doorkeeper at the Marseille Observatory. He swept floors, ran errands, and delivered messages. At night, when his work was over, he liked to sit with the astronomers and watch them work.\n\nThey noticed his curiosity. They let him use the equipment. Then, they began teaching him. Jean-Louis loved memorizing the patterns of the stars ... and it turned out, he had an extraordinary gift for it. He could remember star fields the way other people remember faces. He knew where every star was supposed to be. If there was something odd, he spotted it almost instantly.\n\nToday, July 11, 1801, he discovered his first comet. It was the beginning of an astonishing career. Over the next 27 years, Jean-Louis discovered 36 more. He is the greatest visual comet hunter in history."},{"round":3,"name":"Nagoya, Japan","lat":35.1815,"lon":136.9066,"country":"Japan","continent":"Asia","story":"Kōkichi Mikimoto, born 1858 in Toba, Japan. He was the eldest son of a noodle-shop owner. He grew up watching Ama (\"sea women\"). They are traditional Japanese women who are free-divers. They've been harvesting abalone, seaweed, shellfish, and pearls for more than a thousand years. And they do it without any scuba gear ... they descend on a single breath into cold waters ... some can hold their breath for 2 minutes.\n\nKōkichi thought that looked pretty hard. He wondered if there was an easier way to get pearls. He and his wife Ume borrowed money, built oyster rafts in the bay, and spent years opening th
