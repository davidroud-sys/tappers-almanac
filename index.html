<!doctype html>
<html lang="en">
<head><meta name="robots" content="noindex, nofollow">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tappers — Maptap Stats</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #141b24;
    --panel2: #18212c;
    --line: #263140;
    --line-soft: #1d2733;
    --text: #e8ecf1;
    --muted: #94a1b0;
    --dim: #5f6c7b;
    --accent: #e0b45c;
    --accent-dim: #8a7139;
    --good: #4ade80;
    --warn: #fbbf24;
    --bad: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    font-size: 15px;
  }
  .serif { font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif; }
  .num, td.num, .value { font-variant-numeric: tabular-nums; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 30px 18px 70px; }

  /* Masthead */
  .masthead { text-align: center; padding: 18px 0 22px; border-top: 3px double var(--line); border-bottom: 3px double var(--line); }
  .kicker { text-transform: uppercase; letter-spacing: .32em; font-size: 11px; color: var(--accent); font-weight: 600; }
  .masthead h1 { font-size: clamp(44px, 9vw, 68px); font-weight: 500; letter-spacing: .01em; line-height: 1.1; margin: 6px 0 2px; }
  .subtitle { color: var(--muted); font-style: italic; font-size: 15px; }
  .meta-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 26px; margin-top: 14px; color: var(--dim); font-size: 12.5px; text-transform: uppercase; letter-spacing: .08em; }
  .meta-row b { color: var(--muted); font-weight: 600; }

  section { margin-top: 52px; }
  .sec-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px 14px; border-bottom: 1px solid var(--line); padding-bottom: 9px; margin-bottom: 20px; }
  .sec-title { text-transform: uppercase; letter-spacing: .18em; font-size: 13px; color: var(--accent); font-weight: 700; }
  .sec-sub { color: var(--dim); font-size: 12.5px; }
  .badge { display: inline-block; font-size: 10.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 2px 9px; border-radius: 999px; border: 1px solid var(--accent-dim); color: var(--accent); vertical-align: 2px; }
  .badge.live { border-color: #7a4b4b; color: #f0a3a3; }

  .panel { background: var(--panel); border: 1px solid var(--line-soft); border-radius: 12px; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; vertical-align: 0; flex: none; }

  /* Today */
  .today-list { display: flex; flex-direction: column; gap: 10px; }
  .today-card { padding: 12px 14px; }
  .today-card.leader { border-color: var(--accent-dim); background: linear-gradient(180deg, rgba(224,180,92,.07), rgba(224,180,92,.02)); }
  .today-top { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .today-rank { color: var(--dim); font-size: 13px; width: 22px; font-variant-numeric: tabular-nums; }
  .today-name { font-weight: 650; display: inline-flex; align-items: center; }
  .today-time { color: var(--dim); font-size: 12px; }
  .today-final { margin-left: auto; font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .leader .today-final { color: var(--accent); }
  .leader-tag { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent-dim); border-radius: 4px; padding: 1px 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .chip { display: inline-flex; flex-direction: column; align-items: center; min-width: 44px; padding: 4px 6px 3px; border-radius: 7px; background: var(--panel2); border: 1px solid var(--line-soft); }
  .chip-e { font-size: 14px; line-height: 1.2; min-height: 17px; }
  .chip-n { font-size: 12.5px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--muted); }
  .chip.hi .chip-n { color: var(--good); }
  .chip.mid .chip-n { color: var(--text); }
  .chip.low .chip-n { color: var(--warn); }
  .chip.bad .chip-n { color: var(--bad); }
  .missing-row { color: var(--dim); font-size: 13px; margin-top: 14px; }
  .missing-row .pill { display: inline-flex; align-items: center; border: 1px dashed var(--line); border-radius: 999px; padding: 2px 11px; margin: 2px 3px; color: var(--muted); font-size: 12.5px; }

  /* Tables */
  .scroll { overflow-x: auto; border: 1px solid var(--line-soft); border-radius: 12px; background: var(--panel); }
  table { border-collapse: collapse; width: 100%; font-size: 13.5px; }
  th, td { padding: 9px 12px; text-align: right; white-space: nowrap; border-bottom: 1px solid var(--line-soft); }
  th { color: var(--dim); font-size: 11px; text-transform: uppercase; letter-spacing: .09em; font-weight: 600; position: sticky; top: 0; background: var(--panel); }
  tbody tr:last-child td { border-bottom: none; }
  td.pname, th.pname { text-align: left; }
  td.num { font-variant-numeric: tabular-nums; }
  .lb-table { min-width: 940px; }
  .pname .who { font-weight: 650; display: inline-flex; align-items: center; }
  .pname .joined { color: var(--dim); font-size: 11px; margin-left: 7px; }
  .top-avg { color: var(--accent); font-weight: 700; }
  .flag-mark { color: var(--accent); cursor: help; text-decoration: none; }

  /* Superlatives */
  .strip { padding: 14px 16px; margin-bottom: 18px; display: flex; flex-wrap: wrap; align-items: center; gap: 12px 26px; }
  .strip-title { text-transform: uppercase; font-size: 11px; letter-spacing: .14em; color: var(--muted); font-weight: 700; }
  .strip-note { color: var(--dim); font-size: 12.5px; flex-basis: 100%; }
  .rbars { display: flex; gap: 10px; align-items: flex-end; height: 64px; }
  .rbar { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 3px; height: 100%; }
  .rbar .bar { width: 26px; border-radius: 3px 3px 0 0; background: linear-gradient(180deg, var(--accent), var(--accent-dim)); opacity: .85; }
  .rbar small { color: var(--dim); font-size: 10px; }
  .rbar .bv { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .awards { display: grid; grid-template-columns: repeat(auto-fill, minmax(232px, 1fr)); gap: 12px; }
  .award { padding: 13px 15px; display: flex; flex-direction: column; gap: 3px; }
  .award .a-title { text-transform: uppercase; font-size: 10.5px; letter-spacing: .13em; color: var(--dim); font-weight: 700; }
  .award .a-holder { font-weight: 650; font-size: 15px; display: flex; align-items: center; }
  .award .a-value { font-size: 20px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  .award .a-desc { font-size: 12px; color: var(--muted); line-height: 1.45; }

  /* Trends */
  .legend { display: flex; flex-wrap: wrap; gap: 5px 16px; margin-bottom: 12px; font-size: 12.5px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; }
  .chart-panel { padding: 14px 10px 8px; }
  .chart-panel svg { width: 100%; height: auto; display: block; }
  .spark { display: block; }

  /* H2H */
  .h2h-table { min-width: 720px; }
  .h2h-table td { text-align: center; font-variant-numeric: tabular-nums; font-size: 12.5px; }
  .h2h-table th { text-align: center; }
  .h2h-table th.rowh { text-align: left; }
  .h2h-none { color: var(--line); }

  /* Records */
  .rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(215px, 1fr)); gap: 12px; }

  /* Emoji tiers */
  .emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 8px 14px; }
  .em-row { display: flex; align-items: center; gap: 10px; padding: 7px 12px; }
  .em-e { font-size: 19px; width: 28px; text-align: center; flex: none; }
  .em-count { color: var(--dim); font-size: 11.5px; width: 34px; flex: none; text-align: right; font-variant-numeric: tabular-nums; }
  .em-track { flex: 1; height: 6px; border-radius: 3px; background: var(--panel2); position: relative; min-width: 60px; }
  .em-range { position: absolute; top: 0; height: 100%; border-radius: 3px; background: var(--accent); opacity: .75; min-width: 3px; }
  .em-stats { color: var(--muted); font-size: 11.5px; flex: none; text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .rare-line { margin-top: 16px; color: var(--muted); font-size: 13px; line-height: 1.9; }
  .rare-line .re { font-size: 16px; }

  /* Geography */
  .geo-map { padding: 10px; }
  .geo-map svg { width: 100%; height: auto; display: block; }
  .geo-legend { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 18px; margin: 10px 2px 0; color: var(--dim); font-size: 12px; }
  .geo-scale { display: inline-flex; align-items: center; gap: 6px; }
  .geo-scale i { font-style: normal; font-variant-numeric: tabular-nums; }
  .geo-grad { display: inline-block; width: 120px; height: 8px; border-radius: 4px; background: linear-gradient(90deg, #3e6cc2, #7a7e8a 55%, #c49c50 80%, #f0cd7c); }
  .geo-subhead { text-transform: uppercase; font-size: 11px; letter-spacing: .14em; color: var(--muted); font-weight: 700; margin: 24px 0 10px; }
  .cont-table { min-width: 620px; }
  .cont-table td.num sub, .geo-t td.num sub { color: var(--dim); font-size: 9px; margin-left: 3px; }
  .cont-table .dim-cell, .geo-t .dim-cell { color: var(--dim); }
  .cont-table .group-row td, .geo-t .group-row td { border-top: 1px solid var(--line); font-weight: 650; }
  .geo-pending { padding: 18px 20px; color: var(--muted); font-size: 13.5px; }
  .pass-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px; margin-top: 10px; }
  .pass-chip { display: flex; align-items: baseline; gap: 6px; padding: 5px 9px; border-radius: 7px; background: var(--panel2); border: 1px solid var(--line-soft); font-size: 12px; min-width: 0; }
  .pass-chip b { font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .pass-chip i { font-style: normal; font-variant-numeric: tabular-nums; color: var(--muted); flex: none; }
  .pass-chip sub { color: var(--dim); font-size: 9px; flex: none; }
  .pass-chip.thin b { color: var(--dim); font-weight: 500; }
  .geo-note { color: var(--muted); font-size: 13px; margin-top: 10px; line-height: 1.7; }
  .geo-verdict { margin-top: 12px; padding: 10px 14px; border-left: 3px solid var(--accent-dim); background: var(--panel); border-radius: 0 8px 8px 0; color: var(--muted); font-size: 13px; line-height: 1.6; }
  .geo-verdict b { color: var(--text); }
  .dist-table { min-width: 760px; }
  .hemi-table, .clim-table, .r5-table { min-width: 540px; }
  .isl-table { min-width: 560px; }
  .homes-table { min-width: 680px; }
  .rem-table { min-width: 560px; }
  .delta-up { color: var(--good); }
  .delta-down { color: var(--bad); }

  /* Footnotes / footer */
  .notes ol { margin-left: 20px; color: var(--dim); font-size: 12px; line-height: 1.7; }
  .notes li { margin-bottom: 4px; }
  footer { margin-top: 56px; text-align: center; color: var(--dim); font-size: 12px; border-top: 3px double var(--line); padding-top: 18px; }
  footer .fleuron { color: var(--accent-dim); font-size: 14px; letter-spacing: .4em; }

  .empty { text-align: center; padding: 70px 24px; margin-top: 40px; }
  .empty h2 { font-weight: 500; font-size: 24px; margin-bottom: 10px; }
  .empty p { color: var(--muted); }
  .empty .hint { margin-top: 16px; color: var(--dim); font-size: 13px; }

  @media (max-width: 480px) {
    .wrap { padding: 20px 12px 50px; }
    th, td { padding: 8px 9px; }
    .today-final { font-size: 19px; }
    .awards { grid-template-columns: 1fr 1fr; }
    .award .a-value { font-size: 17px; }
  }
  @media (max-width: 379px) {
    .awards { grid-template-columns: 1fr; }
  }
</style>
</head>

window.MAPTAP_LOCATIONS = {"generated_at":"2026-07-13T22:00:20+03:00","days":{"2026-06-11":[{"round":1,"name":"Jefferson City, Missouri","lat":38.5767,"lon":-92.1735,"country":"United States","continent":"North America","story":"Maya Moore, born June 11, 1989, in Jefferson City, Missouri. Her father played college basketball and was briefly drafted by the Lakers. Maya started playing when she was 3, and she was amazing. Her high school team in Georgia went 125-3 across four seasons. She won three state championships, a national title, and was National High School Player of the Year. Twice.\n\nIn 2007, when she was 17, Maya's godparents brought her along to a prison visit. They had befriended an inmate at the correctional center through a ministry program. His name was Jonathan Irons. He had been arrested at 16, tried as an adult, and convicted by an all-white jury of a burglary and shooting with no physical evidence. He was sentenced to 50 years. Maya and Jonathan became friends.\n\nMaya went to the University of Connecticut. She won two national championships. In four years of college basketball, her team lost a total of four games. She was the first pick of the 2011 WNBA draft, joined the Minnesota Lynx, and won the championship that year. Then again in 2013, 2015, and 2017. She won two Olympic golds, a league MVP, and three All-Star Game MVPs. For about a decade, she was probably the best female basketball player in the world.\n\nIn February 2019, in her prime, Maya stepped away from basketball. At first she said it was to focus on ministry. Over the next year, what she was actually doing became clearer. She had not missed a single one of Jonathan's court hearings. She was working to achieve his freedom.\n\nMarch 9, 2020, a Missouri judge overturned the conviction. Prosecutors had withheld fingerprint evidence. On July 1, 2020, after 23 years in prison, Jonathan walked out. Maya was waiting at the gate. Soon after, they were married."},{"round":2,"name":"Hørsholm, Denmark","lat":55.8833,"lon":12.5,"country":"Denmark","continent":"Europe","story":"Carl Theodor Sørensen, born July 24, 1893, in Germany. He was trained as a gardener at first, then became a landscape architect. In 1931, Carl designed beautiful playgrounds across Copenhagen. They were graceful, symmetrical forms, with precise geometry. They were bright, open, and safe. He put lovely fences around them to protect the kids inside.\n\n And then he watched as kids ignored everything he had done. They walked right past his lovely playgrounds and went to the construction sites next door. Junkyards. Rubble piles. Carl must have been horrified.\n\nAnd fascinated. He wrote down what he was seeing ... kids wanted real materials, and real tools. He came to the conclusion that the best playground would be \"a junk playground in which children could create and shape, dream and imagine a reality.\" \n\nWith the new design in hand, he waited for a sponsor to build it. Everyone thought this was a terrible plan. It sounded dangerous. 12 years went by, and World War II arrived.\n\nIn 1943, in Copenhagen under Nazi occupation, a community decided to try it. Parents were scared of their kids playing in bomb sites or building rubble. Carl's new playground was, somehow, the safer option.\n\nToday is International Day of Play! Kids loved Carl's playgrounds. They did everything Carl's neat geometric playgrounds had failed to do. They built forts, dug holes, lit fires, hammered wood together, and transformed the space constantly. Today, we think of them as 'adventure playgrounds', and there are more than a thousand of them in the world."},{"round":3,"name":"Kosai, Shizuoka Prefecture, Japan","lat":34.7185,"lon":137.5317,"country":"Japan","continent":"Asia","story":"Kiichiro Toyoda, born June 11, 1894, in Yamaguchi, Japan. His father Sakichi Toyoda was a village carpenter who became one of Japan's great inventors. Over the course of his life, he would file 40 patents, mostly on improvements to looms. His masterpiece was the Type G automatic loom ... if a thread broke, it stopped itself. Before Toyoda, a loom would just keep going ... producing several feet of flawed material before anyone noticed.\n\nIn 1929, Sakichi sold the British patent for £100,000. He gave the money to Kiichiro and told him the future was in cars.\n \nKiichiro went to America. He bought a Chevrolet, a DeSoto, and a Ford truck. He brought them home and took them apart, learning from each. He founded Toyota, and his first car, the A1, was a blend of all three ... a Chevy-inspired engine, Ford-inspired chassis, and DeSoto-inspired styling.\n\nPerhaps his most important achievement was in 1938, when he built a factory that didn't stockpile parts. Each part would arrive exactly when it was needed, and not before. The goal was to eliminate waste. It is called \"just-in-time\" production, a concept that would get adopted worldwide in the manufacturing of ~everything.\n\nBut ... the world learned a huge downside to just-in-time production. During the Covid-19 pandemic, supply chains broke. Factories halted over missing parts that cost pennies. Today, modern manufacturing is a hybrid."},{"round":4,"name":"Isle of Wight, England","lat":50.6938,"lon":-1.3047,"country":"United Kingdom","continent":"Europe","story":"Julia Margaret Cameron, born June 11, 1815, in Calcutta. Her family was wealthy ... her father worked for the East India Company, and her mother was a minor noble. Julia grew up with a strong education, married, and raised six children. \n\nIn December 1863, she was 48 and mostly alone. Her kids were grown and out of the house. Her husband, Charles, was working in Sri Lanka. Her daughter sent her a camera as a gift: \"It may amuse you, Mother, to try to photograph during your solitude.\"\n\nJulia loved it. She had no photography education, and had no idea of the 'right' way to take pictures. She didn't care. She began doing the opposite of what every other photographer was doing. They were chasing sharpness, clarity ... the perfect focus. Her portraits came out soft, blurred ... intimate. Critics called her incompetent. \n\nHer friend Alfred (Lord Tennyson) lived next door. Julia's portrait of him is named \"the Dirty Monk\" and it became his favorite. She photographed Charles Darwin, Thomas Carlyle, and Sir John Herschel (the astronomer who had named photography). Her portrait of him, white hair lit like a halo, became one of her most famous images (shown above).\n\nBefore her, photographs were sharp and stiff. After her, they could be soft, intimate ... emotional. Less than two years after her daughter sent her that camera, the South Kensington Museum bought 63 of her photographs. Before that, museums had collected photographs to record what things looked like. Julia's were the first they purchased purely as art.\n\nIt turns out her work wasn't incompetent. It was the future of portrait photography."},{"round":5,"name":"Jeddah, Saudi Arabia","lat":21.5433,"lon":39.1728,"country":"Saudi Arabia","continent":"Asia","story":"Happy Birthday Jacques Cousteau! Born June 11, 1910, in Saint-André-de-Cubzac, France. He wanted to be a pilot. In 1936 he crashed his father's car on a foggy mountain road. Both his arms were shattered, and the right one was infected. The surgeons wanted to amputate. He refused.\n\nRecovery took months. Jacques spent months swimming in the Mediterranean off Toulon, where he'd been reassigned as a naval gunnery instructor. A fellow officer gave him a pair of swim goggles so Jacques could see underwater ...\n\nHe never piloted again.\n\nIn 1943, in occupied France, he met an engineer named Émile Gagnan. Jacques and Émile made a regulator that could feed compressed air to a diver's lungs on demand. They tested it in a river outside Paris, then in the Mediterranean. It worked. They called it the Aqua-Lung, but today we call it scuba.\n\nJacques spent the next fifty years showing the rest of us what was down there. With his ship Calypso, he explored shipwrecks, coral reefs, whales, sharks, and underwater caves across the globe. In the Red Sea, he filmed forests of soft coral, clouds of reef fish, and steep underwater walls few people had ever seen before.\n\nHis documentaries turned the oceans from distant and mysterious into something vivid and personal. Millions watched his television specials and read his books.\n\nLong before climate change and plastic pollution became global concerns, Cousteau was warning that the oceans were fragile, and that we were changing them faster than anyone realized."}],"2026-06-12":[{"round":1,"name":"Richmond, Virginia","lat":37.5407,"lon":-77.436,"country":"United States","continent":"North America","story":"Mildred Jeter (born 1939) and Richard Loving (born 1933) grew up together in Central Point, Virginia. She was Black and Native American. He was white. They were friends, then sweethearts, and by 1958 they wanted to get married. But that was against the law. In Virginia, it was illegal to marry someone of a different race. Virginia wasn't unique ... it was illegal in 24 states.\n\nThey drove to Washington, DC, and married on June 2, 1958. Five weeks later, at 2 am, the county sheriff entered their apartment and arrested them. They pled guilty, and the judge gave them a choice ... one year in prison or leave the state for 25 years. They left. Then they sued Virginia.\n\nToday, June 12, 1967, the US Supreme Court ruled unanimously in the Lovings' favor. \n\nKen Tanabe grew up in a multiracial family (Japanese and Belgian) and he felt like there was no public celebration for interracial couples. In 2004, he started celebrating Loving Day, and the celebration has grown every year since. \n\nHappy Loving Day!"},{"round":2,"name":"Leipzig, Germany","lat":51.3397,"lon":12.3731,"country":"Germany","continent":"Europe","story":"John Augustus Roebling, born today, June 12, 1806, in Mühlhausen, Prussia. He studied engineering in Berlin and emigrated to the United States in 1831. His breakthrough was wire rope. At the time, suspension bridges often relied on hemp rope, which wore out quickly. John developed strong twisted steel-wire cables and founded a steel wire rope company that transformed bridge engineering. \n\nIn 1867 his most ambitious design was accepted ... a suspension bridge across the East River of New York, joining Brooklyn and Manhattan. The span would be 1,595 feet, longer than any in the world. He was appointed chief engineer. But on June 28, 1869, when John was on a dock at the Brooklyn waterfront, an accident crushed his right foot. He passed away three weeks later, on July 22, 1869. Construction of the bridge had not yet begun.\n\nHis son Washington took over. But a construction accident injured him, too. He became bedridden. So his wife stepped in.\n\nEmily Warren Roebling (born 1843) began by carrying instructions between her husband and the construction crews. Then she began mastering the engineering herself ... stress calculations, cable construction, materials science, bridge design. She led meetings, negotiated with politicians, supervised contractors, and effectively became the bridge’s on-site project manager for ~11 years.\n\nIn May 1883, the Brooklyn Bridge opened, and Emily was the first to cross it."},{"round":3,"name":"Lyon, France","lat":45.764,"lon":4.8357,"country":"France","continent":"Europe","story":"Eugénie Brazier, born June 12, 1895, on a small farm in La Tranclière, near Lyon. Her mom died when she was 10. She was half-orphaned, and her father couldn't (or didn't want to) afford her. So he sent her away in what was called 'domestic service' ... which is basically child labor. You work at a farm all day, and in exchange, you get food and clothes. She did this for 9 years.\n\nAt 19, she got pregnant, and the baby's father was a married man. She was unmarried, unskilled, and now, a single mom out of a job. She named her son Gaston, then left him with a wet nurse and moved to Lyon.\n\nIn Lyon she was hired as a maid and nanny for a wealthy family. They took her to Cannes for the summer. When their cook fell ill, Eugénie filled in. It turns out Eugénie was an exceptional cook. Within a couple of years, she was hired by Mère Fillioux, one of the greatest chefs of Lyon.\n\nIn 1921, at 26, Eugénie opened her own restaurant. She brought Gaston (now 7) to live with her, and took over raising him. By the late 1920s, Gaston was working full time with his mom ... he would spend his entire career with her. In 1928, she opened a second restaurant up in the mountains outside the city.\n\nIn 1931, the Michelin Guide introduced the three-star restaurant ratings, and in 1933, Eugénie became the first chef ever awarded six Michelin stars. Three at each restaurant. She held that record for the next 65 years."},{"round":4,"name":"Manila, Philippines","lat":14.5995,"lon":120.9842,"country":"Philippines","continent":"Asia","story":"Happy Independence Day, Philippines!\n\nThe Philippines is 7,000 islands. In the 1500s, they were split among hundreds of independent kingdoms. In 1543, a Spanish explorer named the islands after a sixteen-year-old prince, the future King Philip II of Spain. Spain began colonizing them soon after, and ruled for the next 333 years, fighting generations of wars to keep control.\n\nBy the 1890s, Filipinos were in full revolt against Spain. Then, in 1898, the United States declared war on Spain in support of Cuban independence. The war spread across the world. American warships destroyed the Spanish fleet in Manila Bay while Filipino revolutionaries fought Spanish forces on land. Spain lost. Cuba gained independence. The Philippines also declared independence, today, June 12, 1898. Except ... it stayed a colony. But with a new master. Spain sold the Philippines to the US for $20 million as part of the peace treaty.\n\nFor the Filipinos, this was not the plan. Many believed the Americans had come as allies and they expected independence too. This triggered the Philippine–American War, a devastating, lopsided conflict that the Americans won.\n\nDuring World War II, Japan occupied the islands. After the war, the United States finally recognized Philippine independence on July 4, 1946. But Filipinos celebrate independence day today ... in 1962, they moved the holiday to June 12, honoring the day in 1898 that they had first declared their independence."},{"round":5,"name":"Recife, Pernambuco, Brazil","lat":-8.0476,"lon":-34.877,"country":"Brazil","continent":"South America","story":"Fernando Martins de Bulhões, born August 15, 1195, in Lisbon. He joined the Augustinians at 15, then the Franciscans at 25. He took the name Anthony. He ended up as a preacher in Padua, Italy, and he became famous. People travelled to hear his sermons. \n\nIn 1231, he became extremely ill. He sensed he was near the end of his life. He was in a friend's house, when he had a vision ... the infant Jesus appeared in his arms.\n\nHis friend saw a glowing light in his room and came in, and he saw the same image. Anthony passed away June 13, 1231, age 35. The Catholic Church canonized him one year later, and he became Saint Anthony. In Portugal and Brazil he became the patron saint of finding lost things ... lost items, lost people, and lost husbands. And often, images or statues of him include the baby Jesus in his arms.\n\nIn the 1940s, Brazil was developing its own St. Valentine's Day. Saint Anthony had a reputation for being a matchmaker, and so the eve of St. Anthony's feast day was selected for the celebration. Happy Dia dos Namorados, Brazil! \n\nA Brazilian woman who wants to get married, but isn't finding her match, might ask St. Anthony for help. Politely at first. But then, if he doesn't deliver, she punishes him.\n\nShe turns the statue upside down. Or she ties a string around his neck and lowers him head-first into a well. If he's really not cooperating? She steals the baby Jesus from his arms. As ransom. Deliver a husband, Anthony, and you can have baby Jesus back."}],"2026-06-13":[{"round":1,"name":"Tangier, Morocco","lat":35.7595,"lon":-5.834,"country":"Morocco","continent":"Africa","story":"Ibn Battuta, born February 24, 1304, in Tangier. He was part of a respected Muslim family of legal scholars and judges. His relatives worked as qadis (Islamic judges who interpreted religious law). He grew up educated, literate, and surrounded by religion and law. \n\nWe don't know much about his childhood ... almost everything we know comes from a book called Rihla (رحلة or 'The Journey'), a history he dictated and was written down. Today, June 13, 1325 (2 Rajab 725 AH), at age 21, he left home alone, riding a donkey, to make a pilgrimage to Mecca (the Hajj). Muslims hope to complete this journey at least once in their lifetime, and he expected the trip to take a year or two. \n\nHe joined a caravan in Tlemcen. \"I braced my resolution to quit all my dear ones, female and male, and forsook my home as birds forsake their nests.\""},{"round":2,"name":"Alexandria, Egypt","lat":31.2001,"lon":29.9187,"country":"Egypt","continent":"Africa","story":"For almost a year, Ibn Battuta traveled east along the coast of North Africa. He passed through Tunis, Alexandria, and Cairo. In each city he stayed with scholars, prayed at mosques, and listened to stories of places further on.\n\nIn Alexandria a holy man named Sheikh Burhanuddin looked at him and said, \"It seems to me that you are fond of foreign travel. You must visit my brother in India, my brother in Sind, my brother in China. Give them my greetings.\" Ibn Battuta wrote it down. But he had no plans to go to any of those places.\n\nA few weeks later, staying with a holy man named Sheikh al-Murshidi in a small Egyptian town, he had a dream ... a great bird carried him to Mecca, and then beyond, to lands he could not name. He told the sheikh about his dream, and the sheikh interpreted it ... Ibn Battuta would complete his pilgrimage, but his journey would not end there.\n\nSomewhere in Egypt ... we honestly don't know exactly when, Ibn Battuta set himself a rule. He would never travel the same road twice.\n\nHe arrived in Mecca in October 1326 and completed his hajj. Time to return? I imagine the moment of his decision, as he turned to look to the west, towards home. \n\nHe went east instead."},{"round":3,"name":"Delhi, India","lat":28.7041,"lon":77.1025,"country":"India","continent":"Asia","story":"Two years after leaving Turkey, Ibn Battuta crossed the Hindu Kush mountains into India. He was 29. He had been traveling for nine years.\n\nThe Sultan of Delhi, Muhammad bin Tughlaq, took him in. He gave him a salary, a house with servants, and the position of chief judge of the city. Ibn Battuta got married. He had a daughter.\n\nHe stayed a year ... then two, then seven.\n\nAn Indian poet named 'Isami wrote about travelers who roamed the earth without ever settling down ... until they reached India. There, he wrote, they finally stopped. He was probably writing about Ibn Battuta.\n\nBut the Sultan had wild mood swings. He was brilliant, erratic, impulsive, and wildly unpredictable. Ibn Battuta veered between trusted advisor and potential treasonous spy. It wasn't safe. In 1342, the sultan made him an envoy to China ... probably to get rid of him.\n\nWould Ibn Battuta have stayed longer? It seems likely. He had to leave his wife, his daughter, and the only home he had built in the past 17 years on the road.\n\nHe never saw any of them ever again."},{"round":4,"name":"Konya, Turkey","lat":37.8746,"lon":32.4932,"country":"Turkey","continent":"Asia","story":"Over the next four years, Ibn Battuta traveled through Persia and made his way back to the Mediterranean. He didn't have a specific destination in mind. He was simply traveling wherever the caravans went. In 1330, he took a boat from Syria across to the southern coast of what is now Turkey. Then he traveled inland, town by town.\n\nIn every town, there was a brotherhood. They were craftsmen ... leatherworkers, weavers, blacksmiths. They worked their normal jobs all day. At sunset, they brought their wages to a building they had built together. They used the money to buy food. Then they went to the city gates ... \n\nIf a traveler arrived without a place to sleep, the brotherhood took him in. They fed him. They gave him a bed. They asked for nothing in return. Then the next morning, they did it again. And again.\n\nThe brotherhood was called the Akhi (singular) or Akhiyya (collectively). The word 'Akhi' literally means 'my brother' in Arabic. Ibn Battuta almost couldn't believe it. He stayed in their lodges in more than 25 different towns. \"Nowhere in the world will you find men so eager to welcome strangers\", he wrote, \"so prompt to serve [free] food and to satisfy the wants of others.\""},{"round":5,"name":"Quanzhou, Fujian, China","lat":24.8741,"lon":118.6757,"country":"China","continent":"Asia","story":"The further east Ibn Battuta traveled, the stranger the world became.\n\nBy the time he reached China in 1345 ... things had started to get really weird. He landed at Quanzhou. The harbor was full of Chinese junks (huge, multi-masted ocean-going sailing ships, the largest in the world). Each one was bigger than anything he had ever seen at sea.\n\nWhen he entered a city, Chinese officials painted his portrait. They kept records of every foreigner who passed through, so if a crime was committed they could match the face to the painting. Ibn Battuta sat for several of these. He traveled inland to Hangzhou, the largest city he had ever seen. Merchants there didn't use coins ... they used these strange pieces of paper as currency, and somehow, everyone agreed that counted as money. Ibn Battuta could not get over it.\n\nIn the winter, people heated their homes with rocks. They dug these flammable, black rocks out of the ground and lit them on fire. Coal. He had never seen a flammable rock before.\n\nAnd then, he realized he had reached the other end of the world. \n\nHe turned around, and started home. In total, Ibn Battuta crossed ~40 modern countries and covered ~75,000 miles (120,000 km) over the course of 30 years. He traveled farther than any known traveler before the modern age."}],"2026-06-14":[{"round":1,"name":"Knoxville, Tennessee","lat":35.9606,"lon":-83.9207,"country":"United States","continent":"North America","story":"Pat Summitt, born June 14, 1952, on a Tennessee dairy farm. She had three older brothers who taught her basketball in the family barn. She was exceptional. Her high school didn't have a girls' team, so her parents moved to the neighboring town. \n\nShe was a dominant player. In college she had 1,045 career points and made the US national team in 1973. When she graduated, the University of Tennessee hired her to be the coach of the women's basketball team. She was barely older than the players she was coaching. \n\nThe budgets were tiny. She coached, she drove the team bus, and she did the team's laundry. In her first season the team went 16 and 8. Over the course of the next 38 years, she won a total of 1,098 games, including 8 national championships. She coached the 1984 US Olympic team to gold. In 2000, she was named Naismith Coach of the Century.\n\nIn 2011, at 59 years old, she was diagnosed with Alzheimer's. She held a press conference, surrounded by her team. She said she was continuing, and she did, for one more year. When she stepped down in 2012, her team stood by her and cried. That year, President Obama awarded her the Presidential Medal of Freedom. She passed away in 2016, at 64."},{"round":2,"name":"Paris, France","lat":48.8566,"lon":2.3522,"country":"France","continent":"Europe","story":"In June 1667, a French physician named Jean-Baptiste Denys was treating a 15-year-old boy wracked by fever. The dominant medical treatment at the time was bloodletting, which is a terrible idea. Denys wondered if maybe they should put blood back in, instead. So he pumped 12 ounces of lamb's blood through a tube into the boy's arm.\n\nSomehow, the boy survived. We have no idea why. Probably because the tube got clogged before too much actually got through.\n\nA mentally ill man named Antoine Mauroy was the next test subject. He died after a few attempts. The only reason Jean-Baptiste didn't go to jail was because the trial revealed that Mauroy's wife had been quietly poisoning him with arsenic. France banned transfusions, a ban that held for 150 years.\n\nIn 1818, an English obstetrician named James Blundell brought the practice back, this time human-to-human. He did ten transfusions in five years. Five worked, and five didn't. He couldn't figure out why.\n\nThe answer came 83 years later, when an Austrian physician named Karl Landsteiner discovered that human blood comes in different types (A, B, AB, and O) and that you shouldn't mix them. It triggers a life-threatening immune response. But if you match the type, transfusions become reliably safe. \n\nSo, today, June 14 (1868), we celebrate Karl's birthday with World Blood Donor Day! Human blood, carefully matched? Life-saving. Random sheep blood? Really, really bad."},{"round":3,"name":"Amsterdam, Netherlands","lat":52.3676,"lon":4.9041,"country":"Netherlands","continent":"Europe","story":"Caspar van Hilten, born ~1574, in Bruges, a Flemish trading town. As a young man, Caspar traveled with the Dutch army collecting reports from soldiers and foreigners. He was collecting whatever news was interesting, and writing it up for the generals.\n\nIn his forties, Caspar moved to Amsterdam, just as the city was becoming the commercial center of Europe. Traders at the new stock exchange were hungry for news from distant ports, courts, and battlefields. Caspar already had an information network built from his years with the Dutch army. Now he had customers. He partnered with a printer named Joris Veseler.\n\n~Today, June 14(ish), 1618, the two of them ran off a single folded sheet they called \"Current Events from Italy, Germany, etcetera.\" (Courante uyt Italien, Duytslandt, &c.) Merchants, diplomats, and traders bought it for updates from across Europe. It was the world's first modern newspaper. \n\nThe timing was perfect. The Thirty Years' War had just begun, and Europe was sliding into chaos. Demand for news exploded, as suddenly everyone needed constant updates about armies, alliances, and trade.\n\nThe paper was also unique in how it presented the information ... short, factual updates with minimal commentary. It wasn't trying to persuade. Its goal was to inform. 400 years later, it feels like we're still trying to figure that part out."},{"round":4,"name":"Frankfurt, Germany","lat":50.1109,"lon":8.6821,"country":"Germany","continent":"Europe","story":"Alois Alzheimer, born June 14, 1864, in a small wine-trading town called Marktbreit, in Bavaria. He was a quiet boy. At 10 he was sent away to one of the best schools in the area. Alois lived there for 9 years and came home on holidays. In 1883, at 19, he started medical school. \n\nFor his PhD, he studied the ceruminous gland ... you know, the gland that produces earwax. He graduated at 24, and was offered a job as a traveling doctor for a wealthy family. It was a weird custom at the time ... if you had a mentally ill relative, you would hire a young doctor to travel with you and help care for them. It was prestigious, and he did it for 5 months. That experience changed his life. \n\nInstead of going on to be a regular doctor, he chose to work at an asylum.\n\nIn April 1894, Alois married a wealthy widow named Cecilie. Her late husband had been a diamond merchant ... he was now wealthy, and he could study or work on anything he wanted. He chose to stay at the asylum. Cecilie passed away unexpectedly in 1901, and Alois was left with three small children. His sister helped him raise his family. \n\nThat same year, a 51-year-old woman named Auguste was admitted to the asylum. She couldn't remember her own name. Alois studied her, and documented everything meticulously. She was frightened. \"I have lost myself,\" she told him. \n\nWhen she passed away, he studied her brain and saw things no one had ever described before. Twisted, tangled fibers strangling the brain. He published his findings, but few took notice at the time. \n\nAlois passed away in 1915 from heart failure. He was 51. His original notes about Auguste sat forgotten in an archive for 94 years, until a psychiatrist found them in 1995. They didn't teach us anything new about Alzheimer's. But they revealed a lot about the calm, patient doctor who tried as best he could."},{"round":5,"name":"Ryazan, Ryazan Oblast, Russia","lat":54.6292,"lon":39.7364,"country":"Russia","continent":"Europe","story":"Andrey Markov, born on June 14, 1856, in Ryazan, Russia. He was a sickly child who used crutches until he was 10. When his father took a job managing a princess's estate, the family moved to St. Petersburg. Andrey did poorly in every subject ... except math. His teachers described him as a difficult student.\n\nHe enrolled at St. Petersburg University in 1874 and basically never left. He became an expert in probability. In 1906 he published a paper introducing what we now call a \"Markov chain\". His idea was that if you are given a sequence (of numbers or words), you can predict what's next in the sequence. \n\nTo test his theory, Andrey sat down with a novel (Eugene Onegin by Pushkin) and counted the first 20,000 letters. He found 43% were vowels, 57% were consonants. Then he determined which vowels were likely to come after which consonants, and vice versa. The patterns weren't just sorta predictable ... they were obvious.\n\nMarkov discovered that, in sequences, what comes next often depends on what came before. If this is sounding a little like how AI works today, you're (absolutely) right! Sometimes I wonder if our brains are just Markov chain calculators. If I wrte a sntnce lk ths, you can probably still read it. Your brain is constantly guessing what comes next."}],"2026-06-15":[{"round":1,"name":"Chicago, Illinois","lat":41.8781,"lon":-87.6298,"country":"United States","continent":"North America","story":"Margaret Abbott, born June 15, 1878, in Calcutta, to an American family that moved to Chicago when she was young. She grew up at the Chicago Golf Club and became one of the best amateur golfers in the city.\n\nIn 1899, Margaret and her mother, Mary, sailed to Paris. The plan was art ... Margaret wanted to study under Rodin and Degas. While they were there, in 1900, Margaret entered a women's golf tournament. Ten players, nine holes. She shot a 47 and won. Her mother entered too, and tied for seventh. Margaret was handed a porcelain bowl. A nice prize from a Paris tournament.\n\nIt turns out the \"nice\" tournament Margaret entered was the Olympics. But the 1900 Olympic games were a disorganized mess, spread across five months and tangled up with the World's Fair. There were no medals, no opening ceremony, barely any mention of the word \"Olympics.\" \n\nMargaret Abbott was the first American woman ever to win an Olympic event. She never found out. Historians pieced it together in the 1980s, and had to track down her family to tell them.\n\nTo this day, Margaret and Mary are the only mother and daughter to compete in the same event at the same Olympics."},{"round":2,"name":"Bath, England, United Kingdom","lat":51.3811,"lon":-2.359,"country":"United Kingdom","continent":"Europe","story":"Wilbert Awdry, born June 15, 1911, in Ampfield, a small village where his father served as the vicar (minister). When he was 6 the family moved to Box, in Wiltshire. They lived next to the parish church, near the Box Tunnel, on the Great Western railway.\n\nAt night, Wilbert could hear the trains from his bed ... the heavy chuff-chuff-chuff of a freight engine pushing hard against the slope, then the lighter sigh as it crested and rolled down the other side. His father, who loved railways, told him the engines were talking. \n\nThe struggling ones were saying \"I can't, I can't, I can't.\" The ones coming down the other side were saying \"I thought I could, I thought I could.\" \n\nWilbert became a vicar himself, like his father. By 1943 he was married, with a small son named Christopher. That winter Christopher caught measles and spent weeks in bed. To get him through it, Wilbert told him stories about trains. They talked. They had different personalities. And they worked hard. \n\nChristopher's questions kept coming, even after the measles passed. Wilbert's wife Margaret read what he'd been writing down and pushed him to send it to a publisher. In 1945, \"The Three Railway Engines\" came out. \n\nThe next year, Christopher wanted an engine of his own. Toys were scarce in postwar Britain, so Wilbert took an old broomstick, carved off a length, added a few scraps of wood, and built him a small blue train. Christopher asked what its name was. Wilbert said the first name that came into his head. \n\nThomas.\n\nThen he wrote a story to go with the toy."},{"round":3,"name":"Galway, Ireland","lat":53.2707,"lon":-9.0568,"country":"Ireland","continent":"Europe","story":"June 14 (yesterday), 1919, two men took off from a field outside St. John's, Newfoundland (orange pole), trying to become the first people to fly non-stop across the Atlantic. The Daily Mail had offered £10,000 for whoever did it first.\n\nJohn Alcock and Arthur Brown decided they were going to give it a try. They modified a Vickers Vimy World War I bomber, a plane with two seats and an open cockpit. Instead of bombs, they carried extra fuel.\n\nThe plane was so heavy it barely cleared the trees at the end of the field. The radio failed almost immediately. Then the electricity died, and so their heated suits stopped working. They were crossing the North Atlantic in an open cockpit with no radio, no heat, and instruments that were starting to ice over. They'd been in the air maybe two hours.\n\nThey were so worried about icing that Arthur climbed out four times to scrape ice off the fuel gauges with a jackknife (so the engines wouldn't starve). In the dark. Over the ocean. At 12,000 feet. Without a parachute.\n\nSometime around 2am, in between the disasters, they ate sandwiches.\n\n16 hours and 27 minutes after takeoff, today, June 15, 1919, they landed in a bog outside Clifden, Ireland. The first humans to fly across the Atlantic nonstop. In hindsight, it doesn't seem like £10,000 was enough."},{"round":4,"name":"Bergen, Norway","lat":60.3913,"lon":5.3221,"country":"Norway","continent":"Europe","story":"Edvard Grieg, born June 15, 1843, in Bergen. Edvard was small, sickly, and not particularly interested in school. His mother was an excellent pianist and started teaching him at six.\n\nAt 15, a famous Norwegian violinist named Ole Bull stopped by the family home and listened to Edvard play. Ole told his parents to send Edvard to the music school in Leipzig. They did.\n\nEdvard hated it. \"I left as stupid as when I entered.\" At 17, in his second year of music school, he caught tuberculosis. He survived, but his left lung was destroyed, and his spine permanently deformed. He would spend the rest of his life short of breath, exhausted, and needing constant rest.\n\nIn 1874, the great Norwegian playwright Henrik Ibsen wrote and asked Edvard to compose music for a strange new play called Peer Gynt. Edvard said no. Twice. He didn't like plays. But Ibsen was persistent, and Edvard finally agreed. \n\nWant to hear what he composed? Make sure your sound is on, then tap this text, and you'll hear Hall of the Mountain King."},{"round":5,"name":"Bay of Fundy, Nova Scotia, Canada","lat":45.0537,"lon":-65.675,"country":"Canada","continent":"North America","story":"Happy National Lobster Day!!\n\nIn 1998, a German researcher named Guido Krupp wanted to understand why some American lobsters keep growing for over 100 years. He tested them for an enzyme called telomerase, which rebuilds the protective caps on chromosomes that shorten as cells age. Krupp found it everywhere ... in the heart, the muscles, the skin. Lobsters make telomerase their whole lives.\n\nLobsters don't appear to age the way most animals do. They keep growing. They stay fertile. They show little decline. The largest American lobster ever recorded was caught off Nova Scotia in 1977. It was a meter long and 44 pounds, and estimated to be well over 100 years old. \n\nBut lobsters are not immortal. To grow, they have to molt. They crack open their shell and pull themselves out of it. The process takes enormous energy, and they emerge soft and exposed. As the lobster gets larger, the molt itself becomes more dangerous. Marine biologists estimate ~10% of adult lobsters die mid-molt, simply exhausted.\n\nThey don't die of old age. They die when they don't have the energy to keep growing."}],"2026-06-16":[{"round":1,"name":"Springfield, Illinois","lat":39.7817,"lon":-89.6501,"country":"United States","continent":"North America","story":"Abraham Lincoln spent much of his political career losing. He lost his first race for the Illinois legislature, lost a bid to become Speaker of the Illinois House, served just one term in Congress, lost two Senate races, and lost a vice-presidential nomination. He stepped away from politics.\n\nThe Kansas-Nebraska Act of 1854 brought him back. The Missouri Compromise had kept slavery out of the western territories for 34 years. The Kansas-Nebraska Act let it back in. Lincoln challenged Stephen Douglas, the powerful Illinois senator who had written and pushed for it.\n\nToday, June 16, 1858, more than a thousand delegates packed the Old State Capitol in Springfield, and they nominated Lincoln to challenge Douglas. Lincoln was getting ready to give his acceptance speech, and showed it to his advisors. It starts, \"A house divided against itself cannot stand. This government cannot endure permanently half slave and half free.\" \n\nHis advisors hated it. They told him it was too radical. Don't hand Douglas a weapon against you. Lincoln's answer, \"I would rather be defeated with this speech than to be victorious without it.\" \n\nHe lost. Douglas won re-election that November. But the seven Lincoln-Douglas debates were transcribed and reprinted in newspapers all over the North. Two years later, with the same message, he would win the presidency."},{"round":2,"name":"Lausanne, Switzerland","lat":46.5197,"lon":6.6323,"country":"Switzerland","continent":"Europe","story":"At the end of World War I, the world was exhausted and angry. The popular view was that Germany needed to pay. Britain's prime minister had just won an election on the campaign promise to \"squeeze them until the pips squeak.\" France wanted Germany so broken it could never invade them again. At the Versailles peace conference in 1919, they got their wish.\n\nGermany owed 132 billion gold marks, more than $500 billion in today's dollars. \n\nHyperinflation hit the German economy. In 1923, a loaf of bread that had cost 160 marks the year before now cost 200 billion. Savings became worthless overnight. The middle class was wiped out.\n\nBy 1932, the Great Depression had finished the job. And the Nazis had become the second-largest party. The Allies finally admitted they had pushed too hard.\n\nToday, June 16, 1932, they opened a conference here in Lausanne, Switzerland and agreed to cancel more than 90% of Germany's debt.\n\nIt was too late. Six months later, Hitler became Chancellor.\n\nAfter the second war, the Allies remembered. The US spent $13 billion ($170 billion in today's dollars) to rebuild Western Europe, Germany included. From 1850-1945, there were 8 major wars between the great powers of Western Europe.\n\nFrom 1945 - 2026? Zero.\n\nHelping their former enemies rebuild brought more peace than punishing them ever did."},{"round":3,"name":"Dothan, Alabama","lat":31.2232,"lon":-85.3905,"country":"United States","continent":"North America","story":"Henry Steagall was born in Alabama in 1873. He became a country lawyer, then a county prosecutor. In 1914, he was elected to Congress, representing southeastern Alabama. He won 14 consecutive elections, and would be in office for 28 years.\n\nIn the early 1930s, the American banking system was collapsing. Between 1929 and 1933, one-third of all American banks had failed. Thousands of people had lost their life savings.\n\nIf there was even a hint of weakness at a bank, customers would line up and take all their money out. Even healthy banks were failing. By March 1933 it was so bad that on his second day in office, Franklin Roosevelt closed every bank in America. For a week.\n\nHenry wanted the government to guarantee deposits. He'd been pitching it for a decade. Nobody in power wanted it. Especially not Franklin Roosevelt. FDR thought it was dangerous and threatened to veto.\n\nBut by 1933, Henry chaired the House Banking Committee. Nothing got to a vote without him. He refused to pass any banking bill without deposit insurance in it. Roosevelt threatened. Henry waited. Eventually Roosevelt folded, and today, June 16, 1933, the Banking Act of 1933 becomes law. Everyone's savings were now guaranteed by the Federal Government. \n\nBank failures dropped to almost nothing, overnight. Over 4,000 American banks failed in 1933. The following year, it was 9. Since June 16, 1933, no American with an FDIC-insured account has ever lost a penny."},{"round":4,"name":"Tortuguero National Park, Costa Rica","lat":10.5412,"lon":-83.502,"country":"Costa Rica","continent":"North America","story":"Archibald Carr, born June 16, 1909, in Mobile, Alabama, was a zoologist at the University of Florida. He loved turtles. He spent his life with them. In 1950 he took a boat to a tiny village on Costa Rica's Caribbean coast called Tortuguero, to study the turtles that came ashore to lay their eggs.\n\nThe 1950s were a really terrible time to be a turtle. They were being hunted to near extinction for their eggs and meat. Archie thought the species had maybe a decade left.\n\nHe started tagging them. Not with a radio-tag with GPS ... this was 1954. It was a little metal plate, stamped with his address and a promised reward for sending it in. When a fisherman caught a turtle, they mailed the tag back with where and when.\n\nArchie tagged thousands of turtles. Over nine years, 134 tags came back, most of them from fishermen in Nicaragua. The data proved what nobody had proved before ... green turtles return to the beach where they were born to lay their eggs. If you want to protect the turtle, you have to protect the beach.\n\nCosta Rica turned Tortuguero into a national park in 1975, and the world picked Archie's birthday, today, June 16, to be World Sea Turtle Day."},{"round":5,"name":"Harare, Zimbabwe","lat":-17.8292,"lon":31.0522,"country":"Zimbabwe","continent":"Africa","story":"Today is the International Day of the African Child.\n\nIn rural Zimbabwe, Angeline Murimirwa was in primary school when the school inspector came around to collect unpaid fees. Her teacher had a system. She would say, \"Oh Angie, I think you want to go to the bathroom right now.\" Angie would hide there until someone came to say it was safe to come back.\n\nHer mother had been pulled out of school at 9 years old. Her grandmother at 10. Angie was about to be the next.\n\nAt the end of primary school, Angie scored the highest exam marks her village school had ever seen. CAMFED (Campaign for Female Education), a small charity that was just getting established, picked Angie as one of their first students to get a full scholarship.\n\nAngie thrived. After she graduated, in 1998, she co-founded CAMA, an organization of alumni from the CAMFED organization. There were 400 of them at the founding meeting. Today CAMA has over 300,000 members, and provides 37% of CAMFED's workforce.\n\nIn January 2023, CAMFED made Angie its CEO. TIME named her one of the 100 most influential people in 2025.\n\n\"If I did it, you can do it.\nYou can do it better.\""}],"2026-06-17":[{"round":1,"name":"Reykjavík, Iceland","lat":64.1466,"lon":-21.9426,"country":"Iceland","continent":"Europe","story":"Happy National Day, Iceland! I love days like this, it feels like permission to tell any Icelandic story ... and there are so many to pick from.\n\nGuðríður Þorbjarnardóttir, born ~980 at Laugarbrekka, on the western tip of Iceland, the granddaughter of a freed slave. She lived on the edge of the known world ... then her family pushed past the edge, and sailed to Greenland.\n\nShe married a wealthy trader named Thorfinn Karlsefni. Around the year 1000, the two of them sailed west again, past Greenland, to a land the Norse called Vinland. It was North America. There, Guðríður gave birth to a son named Snorri ... the first child of European descent known to be born in the Americas, nearly five centuries before Columbus.\n\nThe settlement didn't last. Conflict broke out with the Native people who already lived there, and her family sailed back to Iceland. She converted to Christianity around this time, and her husband passed away a few years later.\n\nIf the old sagas are correct, she traveled to Rome. This would have been an extraordinary trip at the time ... thousands of miles across ocean and lands. Legend says she returned home, and lived out her years as a nun.\n\nIcelanders gave her a nickname, víðförla (\"the far-traveled\").\n\nFor centuries, people mostly dismissed these stories as legends. Then in 1960, archaeologists uncovered a Norse settlement at L'Anse aux Meadows in Newfoundland (orange pole). In 2021, scientists used evidence from an ancient solar storm to date the site precisely ... 1021."},{"round":2,"name":"Seville, Spain","lat":37.3891,"lon":-5.9845,"country":"Spain","continent":"Europe","story":"Álvar Núñez Cabeza de Vaca, born ~1490 in Jerez de la Frontera, Spain, into a noble family. His last name is a little odd ... it translates as \"Head of a Cow\". Centuries earlier, an ancestor supposedly marked a secret mountain pass with a cow skull, helping an army ambush its enemy ... and the name stuck forever.\n\nÁlvar grew up hearing stories of the New World and gold waiting across the ocean. Today, June 17, 1527, five ships sailed from Sanlúcar de Barrameda carrying about 600 men, including Álvar. They were excited for their future conquests ... \n\nA hurricane off Cuba sank two ships. The expedition landed in Florida. Their commander made a disastrous decision ... split the expedition in two. (am I the only one who has ever watched horror movies? never, ever split the party.) The ships sailed along the coast while the soldiers marched inland searching for gold. They never saw each other again ..."},{"round":3,"name":"Guadalajara, Jalisco, Mexico","lat":20.6597,"lon":-103.3496,"country":"Mexico","continent":"North America","story":"The team inland got lost in the swamps and forests. They got sick, and hungry. They ate their horses. Armor was melted down for tools. Finally, the survivors built a few rafts and launched them from the west coast of Florida ... right into more storms.\n\nOf the 600 men who left Spain, 4 survived. \n\nÁlvar and three others washed ashore near Texas, starving, and nearly naked. Over the next 8 years, they crossed North America, on foot, as captives, traders, and wanderers. They lived among Indigenous communities, learned new languages, and survived mostly because strangers fed them, sheltered them, and taught them how to live in a world very different from Spain. \n\nIn 1536, they finally reached Spanish settlements in Mexico. Álvar returned to Spain and wrote a book called La Relación (“The Account”), one of the earliest European descriptions of North America. He wrote about hunger. Fear. Survival. And the kindness shown to him by people the Spanish were expecting to rule.\n\nHe had sailed out to conquer. But the story he wrote when he came back wasn't about conquest ... it is about the debt and gratitude he felt to the strangers who fed him, even when they couldn't speak the same language."},{"round":4,"name":"Leeuwarden, Netherlands","lat":53.2012,"lon":5.7999,"country":"Netherlands","continent":"Europe","story":"Maurits Cornelis Escher, born June 17, 1898, in Leeuwarden, the Netherlands. He was the youngest son of a civil engineer, and he wanted to be an architect. There was just one problem ... he was absolutely terrible at school. Especially math. He dropped out of college, and changed his career to printmaking.\n\nFor the next 30 years Maurits made woodcuts. These were drawings carved into a plank of wood, like landscapes or villages. Mostly, they did not sell well. He struggled financially for decades.\n\nIn 1936, he visited the Alhambra in Granada, Spain. He stood in front of the Moorish tilework, with its repeating geometric patterns and interlocking shapes, and he couldn't stop looking. \"I am completely obsessed\", he wrote to his brother. The walls seemed alive with mathematics ... endlessly repeating, transforming, fitting together without gaps.\n\nMaurits began filling notebooks with geometric experiments. Birds became fish. Fish became lizards. Shapes transformed while still locking together perfectly. Staircases climbed in impossible directions. \n\nFor years, the art world mostly ignored him. The work was too mathematical, too strange, too intellectual. But scientists loved it. Mathematicians began writing him letters. Universities invited him to speak. By the 1960s, his impossible staircases and gravity-defying worlds were spreading everywhere.\n\nSchool said he was bad at math. But he ended up creating some of the most unforgettable geometry ever drawn."},{"round":5,"name":"Agra, India","lat":27.1767,"lon":78.0081,"country":"India","continent":"Asia","story":"Arjumand Banu Begum, born in 1593 in Agra, India. She was born into a noble family, and in 1612, she married Shah Jahan, giving her the title \"Mumtaz Mahal\" (\"Jewel of the Palace\"). She was 19. He was a prince with two other wives already ... marriages arranged for political alliances. Mumtaz Mahal was different.\n\nFor 19 years, she went everywhere with him. Court chronicles describe him consulting her on judgments, finances, and military strategy. She bore his children ... 14 of them, in 19 years.\n\nToday, June 17, 1631, she passed away in childbirth, in Burhanpur. She was 38.\n\nShah Jahan was devastated. Court chroniclers wrote that he withdrew from public life and spent months in mourning. When he finally reappeared, they said he seemed transformed by grief. The emperor who loved jewels, ceremony, and music abandoned many of the pleasures of court life. \n\nSoon afterward, work began on a mausoleum unlike anything the Mughal Empire had ever attempted. White marble was hauled from Rajasthan. Calligraphers, stonecutters, architects, and craftsmen arrived from across Asia. The tomb would sit beside the Yamuna River in Agra, perfectly symmetrical, crowned with a massive white dome.\n\nFor more than 20 years, 22,000 workers carved flowers into marble, set gemstones into stone, and built what we now call the Taj Mahal. It was not a palace. It was a tomb built by an emperor who couldn't get over his grief, for the woman he never stopped loving."}],"2026-06-18":[{"round":1,"name":"Baltimore, Maryland","lat":39.2904,"lon":-76.6122,"country":"United States","continent":"North America","story":"Donald Gray Triplett, born September 8, 1933, in Forest, Mississippi. Donald acted oddly as a young child. He could sing Christmas carols in perfect pitch after hearing them once ... when he was 2. He repeated \"chrysanthemum\" and \"trumpet vine\" for hours. He didn't like eye contact. \n\nDoctors recommended treatment. At 3, his parents sent him to an institution 50 miles away. They visited monthly. They drove home each time arguing about whether to take him back. When he was 5, they pulled him back home. They wrote Leo Kanner, the founding director of the first child psychiatry clinic in the US (at Johns Hopkins), asking for help. They brought him to Baltimore.\n\nHe could tell you what day of the week any date in history fell on. He could multiply complex numbers in his head almost instantly. Give him a string of random numbers, and he could repeat them back perfectly.\n\nIn 1943, Kanner published \"Autistic Disturbances of Affective Contact\", the first clear medical description of autism. Donald was Case #1.\n\nThe family went back home. When Donald graduated high school, his classmates filled his yearbook with notes calling him a great friend. He was in the school play. The town didn't talk about autism ... they just thought he was odd, kind, and a genius. \n\nHe graduated from Millsaps College with a degree in mathematics and French. He came back to Forest, took a job in the mailroom at the Bank of Forest, and worked there for 65 years, until he was 89. He loved to travel and visited 40 countries. He went to Hawaii 17 times.\n\nThat's it. That's the whole story. For much of the 20th century, people assumed autism meant isolation, institutionalization, or a life away from the rest of us. Donald spent 65 years at the same job, traveled the world, and lived independently into his 80s.\n\nThe first autistic person ever diagnosed was not a patient. He was a neighbor."},{"round":2,"name":"Syracuse, Sicily, Italy","lat":37.0755,"lon":15.2866,"country":"Italy","continent":"Europe","story":"Archimedes was one of the greatest mathematicians, scientists, and inventors of the ancient world. He was born ~287 BC, here in Syracuse, a wealthy Greek city-state. He was simply brilliant. Archimedes pioneered ideas that anticipated calculus ~2,000 years before Newton.\n\nIn 212 BC, after a three-year siege, Syracuse fell to the Romans. They found Archimedes in his courtyard, drawing figures in the sand. His last words, reportedly, were 'Noli turbare circulos meos' ... 'Do not disturb my circles.'\n\nHe wasn't alone in being lost in his own world.\n\nHenry Cavendish wanted to weigh the Earth. He needed to build a shed for the equipment. But building a shed required talking to the housekeeper, and that, he could not do. So he built a back staircase out of his house, so he could get to his shed without having to talk to anyone.\n\nIsaac Newton would forget to eat. Michelangelo slept in his boots. Beethoven moved homes sixty-eight times in Vienna. No landlord could live with him for long. Nikola Tesla sent his secretary home for wearing pearl earrings, which, for some reason, was just not ok. Alan Turing chained his tea mug to a radiator at Bletchley Park, so people would stop moving it. \n\nHappy Autistic Pride Day! Autism might feel modern. But it's not new. We just know what to look for now."},{"round":3,"name":"The Battle of Waterloo (Belgium)","lat":50.6806,"lon":4.4128,"country":"Belgium","continent":"Europe","story":"Today, June 18, 1815, the Battle of Waterloo ... one of the most famous battles in history. Napoleon had escaped exile and taken back control of France. The rest of Europe was not happy, and rallied their forces to remove him. Again. Two days earlier, Napoleon had defeated the Prussians at the Battle of Ligny. They were in retreat.\n\nHis next enemy was Arthur Wellesley, 1st Duke of Wellington. Wellington deployed his army on a ridge near Waterloo and waited. Napoleon attacked. The French had more experience, more guns, and the initiative. But Wellington wasn't trying to win. He was trying to hold on. Somewhere to the east, the defeated Prussians were marching toward Waterloo to help.\n\nNapoleon knew it. Wellington knew it. Napoleon needed to destroy Wellington before the two armies became one.\n\nFor hours the battle swung back and forth. Wellington's line bent but did not break. Then, at ~4pm, dark columns appeared on Napoleon's right flank. The Prussians had arrived. Tens of thousands of fresh soldiers poured into the fight. The French army collapsed.\n\nNapoleon surrendered a second time and was exiled to Saint Helena, never to return. The Battle of Waterloo wasn't a battle of strategy. It was a race against time. Napoleon lost. Wellington called it 'the nearest-run thing you ever saw in your life.'"},{"round":4,"name":"Algiers, Algeria","lat":36.7538,"lon":3.0588,"country":"Algeria","continent":"Africa","story":"Paul Neal \"Red\" Adair, born June 18, 1915, in Houston. Red dropped out after ninth grade to help the family. He found work on oil rigs, which was dangerous work. Wells blew out. Equipment caught fire. During World War II, he joined the Bomb Squad. He spent two years disarming unexploded ordnance in the Pacific.\n\nBack in Houston, he apprenticed with Myron Kinley and learned the basics of oil-well firefighting. Red worked there for 14 years.\n\nA fire needs three things: fuel, heat, and oxygen. For an oil-well fire, the fuel keeps coming ... it's an oil well. It might as well be infinite. The heat is impossible. But the oxygen? Maybe that can be interrupted. Even just for a moment.\n\nRed pioneered a rather odd solution to an oil-well fire ... explosives. A big enough blast displaces the oxygen. The fire starves, as the oxygen disappears. In 1959 he founded his own company, and in 1961, when a natural gas well in the Algerian Sahara caught fire, they called him.\n\nRed spent five months preparing, then drove a bulldozer with a 66-foot arm carrying 550 pounds of nitroglycerin to the base of the fire. Water sprays kept the machine from melting. He set the charge down, walked back to the detonator, and set it off. The fire went out in an instant.\n\nIn 1991, Red was 75. Iraqi forces retreating from Kuwait had set fire to more than 700 oil wells. The smoke turned the sky black for hundreds of miles. Experts predicted the fires would burn for 5 years. Red and his crew put out the last fire after 9 months. \n\n\"If you think it's expensive to hire a professional, wait until you hire an amateur.\""},{"round":5,"name":"Ternate, North Maluku, Indonesia","lat":0.79,"lon":127.3842,"country":"Indonesia","continent":"Asia","story":"Alfred Russel Wallace, born January 8, 1823, in rural Wales. Unlike most famous scientists, he wasn't wealthy. He left school at 14 and supported himself by collecting insects, birds, and plants for museums and private collectors. He spent 8 years in the jungles and islands of what's now Indonesia, gathering thousands of specimens, and thinking about where species come from.\n\nThen malaria struck. Feverish, in a hut on the island of Halmahera, Wallace suddenly saw an answer. Individuals born with useful traits leave more offspring. Over generations, those traits spread. Species change. He wrote it down and mailed it to the scientist he admired most ... Charles Darwin.\n\nToday, June 18, 1858, Darwin reads the letter. He was stunned. He had been working on the same theory for more than 20 years. He knew it challenged scientists and religion worldwide, and he worried about the reaction. He was also simply worried about being wrong. So he had continued researching, postponing publication.\n\nTwo weeks later, on July 1, Darwin's friends Charles Lyell and Joseph Hooker read Darwin's old notes and Wallace's new essay side by side at the Linnean Society of London. Neither author was there. Darwin was at the funeral of his infant son, who had died of scarlet fever three days earlier. Wallace was 8,000 miles away in Indonesia, chasing butterflies. He had no idea any of this was happening. \n\nA year later, Darwin published On the Origin of Species, and credited Wallace with having arrived at the same conclusions. Wallace, when he finally heard about it months later, wrote that he had been given \"more honour and credit than I deserve.\" He spent the rest of his life calling it Darwin's theory."}],"2026-06-19":[{"round":1,"name":"Galveston, Texas","lat":29.3013,"lon":-94.7977,"country":"United States","continent":"North America","story":"The Emancipation Proclamation took effect on January 1, 1863. It declared enslaved people in Confederate-held territory, including Texas, to be free. The Civil War ended in April, 1865.\n\nBut slavery persisted. With no Union troops to enforce it, Texas slaveholders basically ignored it. Slaveholders from other southern states forced enslaved people westward into Texas to keep them out of reach of the Union army. By 1865, the enslaved population in Texas had grown from ~182,000 to ~250,000.\n\nThe enslaved often knew they were technically free. Felix Haywood, interviewed in 1937 at age 92, recalled that he and fellow slaves knew exactly what had happened. But people who tried to escape risked punishment, or even death.\n\nToday, June 19, 1865 (Juneteenth), Major General Gordon Granger arrived in Galveston with 2,000 federal troops. He wasn't bringing news. He was bringing bayonets. The plantation owners were forced to comply.\n\nFreedom looked different for different people. Some stayed on plantations and signed wage contracts. Others set out in search of family members who they had been separated from years earlier. Thousands walked toward Louisiana, Mississippi, and Arkansas, hoping to find husbands, wives, parents, and children.\n\nSlavery as a system did not go down quietly. By 1866, Texas had passed new laws allowing unemployed freedpeople to be arrested as \"vagrants\". In other words, you couldn't leave the plantation. Congress and the Army dismantled many of those laws during Reconstruction. But over the following decades, Southern states built new systems designed to limit the freedoms emancipation had promised.\n\nFreedom arrived in Texas this day. Equity did not."},{"round":2,"name":"Dortmund, Germany","lat":51.5136,"lon":7.4653,"country":"Germany","continent":"Europe","story":"Friedrich Sertürner, born June 19, 1783, in Germany. His father died young. Friedrich never went to college. At 16, he became a pharmacy apprentice in Paderborn. In 1804, working alone in the back of the shop, he tried to figure out what was actually in opium.\n\nDoctors had been using opium for thousands of years. They knew it killed pain. They also knew it could kill people. But they didn't know why. And it was inconsistent ... one batch might barely work, the next could be dangerously powerful. There was no way to know ahead of time.\n\nFriedrich figured it out. After months of experiments, he isolated a set of white crystals from opium. To test his theory, he gave the crystals to some stray dogs. Then he tried it himself. Then he gave them to several friends. In hindsight, Friedrich, maybe do those tests one at a time, instead of all at once?\n\nThey nearly died. He had isolated the active ingredient. It was the first active drug compound ever isolated from a plant, and he named it morphium, after Morpheus, the Greek god of dreams. Morphine.\n\nWithin decades, chemists isolated quinine, caffeine, nicotine, atropine, and dozens more. Plants, it turned out, were chemical factories. Medicine stopped being herbs and started becoming chemistry."},{"round":3,"name":"Clermont-Ferrand, France","lat":45.7772,"lon":3.087,"country":"France","continent":"Europe","story":"Blaise Pascal, born June 19, 1623, in Clermont-Ferrand, France. His father hid the math books, because he was worried it would distract from his Latin lessons. But Blaise was fascinated by geometry. He drew shapes on the floor, invented his own names for them, and began teaching himself. When his father discovered him rediscovering Euclid's theorems, the math books came out.\n\nAt 18, he built the world's first mechanical calculator. He wanted to help his father, a tax commissioner, do his job faster. In his 20s, he and Pierre de Fermat worked out probability theory ... the future basis for risk, statistics, and insurance.\n\nBlaise was extremely practical. In 1662, he helped launch a network for horse-drawn coaches in Paris. They followed fixed routes, kept regular schedules, and charged the same fare to every passenger ... in other words, the first modern public transit system. \n\nHe's remembered for all these things ... but his sister remembered him for something else. She wrote about how generous he was. She said that when Blaise had money, he gave it away so readily that he often had little left for himself. Near the end of his life, he had given away nearly everything he had."},{"round":4,"name":"Monterrey, Nuevo León, Mexico","lat":25.6866,"lon":-100.3161,"country":"Mexico","continent":"North America","story":"The Underground Railroad (which wasn't underground, nor a railroad) was a secret network of routes, safe houses, and ordinary people who helped enslaved people escape to freedom. The goal was to get their passengers north. Canada was freedom. \n\nThere was another route. It ran south.\n\nJohn Horse was born into slavery in Florida, but he was living beyond the control of American slaveholders. Years later, fearing he and his family would be forced back into bondage, he led hundreds of freedom seekers across the Rio Grande into Mexico.\n\nMexico had abolished slavery in 1829 ... more than 35 years before the United States would. The Mexican government gave John and his followers some land in the high desert of Coahuila in exchange for defending the northern border. By 1852, they had a town. El Nacimiento de los Negros, \"Birthplace of the Blacks\" (orange pole).\n\n~100,000 people escaped slavery through the Underground Railroad to the north. Historians estimate perhaps as many as 10,000 escaped via the Southern Underground Railroad into Mexico. But these people don't show up in our history very often ... they left almost no paper trail."},{"round":5,"name":"Valparaíso, Chile","lat":-33.0472,"lon":-71.6127,"country":"Chile","continent":"South America","story":"Happy Albatross Day!\n\nYoung albatrosses leave the nest and might not touch land again for years. They mate for life. They patrol vast stretches of ocean looking for squid, fish, and anything that brings food to the surface. Whales can cause that. Ships too.\n\nIt was a perfect hunting strategy ... until longline fishing.\n\nA longline vessel drags a single fishing line, sometimes several miles long, with thousands of baited hooks attached. It's like casting 3,000 fishing rods at the same time. To an albatross, that looks like food. It dives, and it gets caught. Tens of thousands were being killed every year.\n\nThe fishermen didn't want to kill them. They wanted fish.\n\nThe solution actually turned out to be quite simple. Hooks that are slightly weighted sink below the surface, and the birds can't reach them. Conservation groups in South Africa tested this in local fisheries ... the death rate went from thousands of birds to ~ zero. It is >99% effective.\n\nOf the 22 species of albatross, 15 are threatened, and the #1 threat is longline fishing. Today, those same conservation groups are expanding, working directly with fishing fleets in Namibia, Brazil, Argentina, Peru, and Chile. \n\nTwo years from now, I hope I'm writing the story about how successful this has been, and the recovery that followed."}],"2026-06-20":[{"round":1,"name":"Ulm, Germany","lat":48.4011,"lon":9.9876,"country":"Germany","continent":"Europe","story":"Albert Einstein, born March 14, 1879, in Ulm, Germany. As a child, he was curious about everything. He wondered what it would be like to ride alongside a beam of light. He studied physics, challenged accepted ideas, and by his mid-30s had transformed our understanding of space, time, gravity, and light itself. He became one of the most famous scientists in the world. \n\nIn 1933, Adolf Hitler came to power. Einstein was Jewish and one of Germany's most prominent public figures. While visiting California, he learned that his Berlin apartment had been raided, his property seized, and his books burned. A Nazi publication printed his photograph under the words, \"Not yet hanged\". Einstein understood
