    if (g === null || g === undefined) return "—";
    return '<span class="' + (g >= 0 ? "delta-up" : "delta-down") + '">' +
      (g >= 0 ? "+" : "−") + Math.abs(g) + '</span>';
  }

  /* -------- The Passport -------- */
  out.push('<h3 class="geo-subhead">The Passport</h3>');
  if (geo.passport) {
    var pp = geo.passport;
    out.push('<div class="panel strip"><span class="strip-title">Stamps collected</span>' +
      '<span class="num" style="font-size:22px;font-weight:700;color:var(--accent)">' + pp.countryCount +
      ' countries</span><span style="color:var(--muted)">' + pp.continentCount +
      ' of 7 continents</span><span style="color:var(--dim)">' + pp.singleVisitCount +
      ' seen exactly once</span></div>');
    out.push('<div class="pass-grid">' + pp.countries.map(function (c) {
      if (c.avg === null) {
        return '<span class="pass-chip thin" title="' + esc(c.country) + ': 1 round, group avg ' +
          c.rawAvg + '"><b>' + esc(c.country) + '</b><sub>×' + c.rounds + '</sub></span>';
      }
      var rgb = geoRGB(c.avg);
      return '<span class="pass-chip" style="background:rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] +
        ',0.12)" title="' + esc(c.country) + ': ' + c.rounds + ' rounds, ' + c.plays +
        ' scored attempts"><b>' + esc(c.country) + '</b><i>' + c.avg + '</i><sub>×' + c.rounds +
        '</sub></span>';
    }).join("") + '</div>');
    out.push('<div class="missing-row">One chip per country faced; the number is the group’s average round score there (needs 2+ rounds — single-visit countries stay grey).</div>');
    if (pp.rarest) {
      var rr = pp.rarest;
      out.push('<div class="geo-note">Rarest stamp: <b>' + esc(rr.country) + '</b> — one round, ever (' +
        esc(rr.name) + (rr.dateLabel ? ", " + esc(rr.dateLabel) : "") +
        (rr.round ? ", R" + rr.round : "") + '), and the group averaged <b>' + rr.avg + '</b> on it. ' +
        (rr.avg < 50 ? 'Some places you visit once and never speak of again.'
          : rr.avg < 75 ? 'A respectable showing for a place we will never see again.'
          : 'Nailed it on the only try. Retiring undefeated.') + '</div>');
    }
  } else {
    out.push('<div class="missing-row">Country classification pending — passports at the front desk.</div>');
  }

  /* -------- The Comfort Radius -------- */
  if (geo.distance) {
    var di = geo.distance;
    out.push('<h3 class="geo-subhead">The Comfort Radius</h3>');
    out.push('<div class="scroll"><table class="dist-table geo-t"><thead><tr><th class="pname">Player</th>' +
      di.buckets.map(function (b) { return '<th>' + esc(b.label) + '</th>'; }).join("") +
      '<th>Decay</th></tr></thead><tbody>');
    di.players.forEach(function (r) {
      out.push('<tr><td class="pname"><span class="who">' + dot(r.color) + esc(r.player) + '</span></td>' +
        r.cells.map(function (c) { return heatTD(c.avg, c.count); }).join("") +
        (r.slope === null
          ? '<td class="num dim-cell" title="needs 15+ located rounds">—</td>'
          : '<td class="num">' + slopeStr(r.slope) + '</td>') + '</tr>');
    });
    out.push('<tr class="group-row"><td class="pname"><span class="who">The Group</span></td>' +
      di.buckets.map(function (b) { return heatTD(b.group.avg, b.group.count); }).join("") +
      '<td class="num">' + (di.groupSlope === null ? "—" : slopeStr(di.groupSlope)) + '</td></tr>');
    out.push('</tbody></table></div>');
    out.push('<div class="missing-row">Average round score by distance from home turf (42.32°N 72.63°W, western Massachusetts); subscript = rounds. Decay = least-squares slope in points per 1,000 km, shown once a player has 15+ located rounds.</div>');
    if (di.flattest || di.steepest) {
      var vparts = [];
      if (di.steepest) vparts.push('<b>' + esc(di.steepest.player) + '</b>’s accuracy decays ' +
        Math.abs(di.steepest.slope).toFixed(1) + ' pts per 1,000 km from home — the steepest curve in the group.');
      if (di.flattest) vparts.push('<b>' + esc(di.flattest.player) + '</b> barely notices (' +
        slopeStr(di.flattest.slope) + ' per 1,000 km) and plays like a local everywhere.');
      out.push('<div class="geo-verdict">' + vparts.join(" ") + '</div>');
    }
  }

  /* -------- Hemispheres -------- */
  if (geo.hemispheres) {
    var hs = geo.hemispheres;
    out.push('<h3 class="geo-subhead">Hemispheres</h3>');
    out.push('<div class="scroll"><table class="hemi-table geo-t"><thead><tr>' +
      '<th class="pname">Hemisphere</th><th>Group avg</th><th>Rounds</th></tr></thead><tbody>');
    [hs.ns.a, hs.ns.b, hs.ew.b, hs.ew.a].forEach(function (side) {
      out.push('<tr><td class="pname">' + esc(side.label) + 'ern</td>' +
        heatTD(side.avg, side.count) + '<td class="num">' + side.count + '</td></tr>');
    });
    out.push('</tbody></table></div>');
    var hemiNotes = [];
    if (hs.ns.best) hemiNotes.push('Smallest north–south dropoff: <b>' + esc(hs.ns.best.player) +
      '</b> (' + deltaSpan(hs.ns.best.gap) + ': ' + hs.ns.best.bAvg + ' south vs ' + hs.ns.best.aAvg + ' north)');
    if (hs.ns.worst) hemiNotes.push('biggest: <b>' + esc(hs.ns.worst.player) + '</b> (' +
      deltaSpan(hs.ns.worst.gap) + ')');
    if (hs.ew.best) hemiNotes.push('East–west swing, most eastern-friendly: <b>' + esc(hs.ew.best.player) +
      '</b> (' + deltaSpan(hs.ew.best.gap) + ')');
    if (hs.ew.worst) hemiNotes.push('most western-dependent: <b>' + esc(hs.ew.worst.player) + '</b> (' +
      deltaSpan(hs.ew.worst.gap) + ')');
    if (hemiNotes.length) out.push('<div class="geo-note">' + hemiNotes.join('; ') +
      '. Gaps need 5+ rounds on each side of the line.</div>');
  }

  /* -------- Climate Zones -------- */
  if (geo.climate) {
    out.push('<h3 class="geo-subhead">Climate Zones</h3>');
    out.push('<div class="scroll"><table class="clim-table geo-t"><thead><tr>' +
      '<th class="pname">Band</th><th>Latitude</th><th>Group avg</th><th>Rounds</th><th class="pname">Best in band</th></tr></thead><tbody>');
    geo.climate.bands.forEach(function (b) {
      out.push('<tr><td class="pname">' + esc(b.label) + '</td><td class="num">' + esc(b.range) + '</td>' +
        heatTD(b.avg, b.count) + '<td class="num">' + b.count + '</td>' +
        (b.best
          ? '<td class="pname"><span class="who">' + dot(b.best.color) + esc(b.best.player) +
            '</span> <span style="color:var(--dim)">' + b.best.avg + ' over ' + b.best.count + '</span></td>'
          : '<td class="pname dim-cell">—</td>') + '</tr>');
    });
    out.push('</tbody></table></div>');
    out.push('<div class="missing-row">Bands by absolute latitude: tropics below 23.4°, temperate to 66.6°, polar beyond. Best-in-band needs 5+ rounds there.</div>');
  }

  /* -------- The Island Problem -------- */
  if (geo.islands && geo.islands.show) {
    var il = geo.islands;
    out.push('<h3 class="geo-subhead">The Island Problem</h3>');
    out.push('<div class="panel strip"><span class="strip-title">Islands vs mainland</span>' +
      '<span class="num" style="font-size:22px;font-weight:700;color:var(--accent)">' +
      (il.islandAvg === null ? "—" : il.islandAvg) + '<span style="font-size:13px;color:var(--dim);font-weight:400"> on islands (' +
      il.islandRounds + ')</span></span>' +
      '<span class="num" style="font-size:22px;font-weight:700">' +
      (il.mainlandAvg === null ? "—" : il.mainlandAvg) + '<span style="font-size:13px;color:var(--dim);font-weight:400"> on the mainland (' +
      il.mainlandRounds + ')</span></span>' +
      (il.islandAvg !== null && il.mainlandAvg !== null
        ? '<span class="strip-note">' + (il.islandAvg < il.mainlandAvg
            ? 'Surround a place with water and this group loses ' +
              Math.round((il.mainlandAvg - il.islandAvg) * 10) / 10 + ' points a round.'
            : 'Somehow better at sea. Nobody predicted this.') + '</span>'
        : '') + '</div>');
    if (il.players.length) {
      out.push('<div class="scroll"><table class="isl-table geo-t"><thead><tr>' +
        '<th class="pname">Player</th><th>Island avg</th><th>Mainland avg</th><th>Gap</th></tr></thead><tbody>');
      il.players.forEach(function (r) {
        out.push('<tr><td class="pname"><span class="who">' + dot(r.color) + esc(r.player) + '</span></td>' +
          heatTD(r.islAvg, r.islN) + heatTD(r.mainAvg, r.mainN) +
          '<td class="num">' + deltaSpan(r.gap) + '</td></tr>');
      });
      out.push('</tbody></table></div>');
    }
    out.push('<div class="missing-row">Method: a location counts as an island if its country is on an embedded list of island nations and territories (Japan, the UK, Iceland, Tonga, Cape Verde…) or its name matches Island/Isle/Île/Atoll/Archipelago or a well-known island like Hawaii or Sicily. Everything else is mainland. ' +
      il.islandRounds + ' island rounds across ' + il.islandLocCount + ' island locations so far.</div>');
  }

  /* -------- Second Homes & Kryptonite -------- */
  if (geo.homes && geo.homes.length) {
    out.push('<h3 class="geo-subhead">Second Homes &amp; Kryptonite</h3>');
    out.push('<div class="scroll"><table class="homes-table geo-t"><thead><tr>' +
      '<th class="pname">Player</th><th class="pname">Second home</th><th>Avg</th>' +
      '<th class="pname">Kryptonite</th><th>Avg</th></tr></thead><tbody>');
    geo.homes.forEach(function (h) {
      function tcell(t) {
        if (!t) return '<td class="pname dim-cell">—</td><td class="num dim-cell">—</td>';
        return '<td class="pname">' + esc(t.label) +
          (t.kind === "continent" ? ' <span style="color:var(--dim);font-size:10px">(continent)</span>' : '') +
          '</td>' + heatTD(t.avg, t.count);
      }
      out.push('<tr><td class="pname"><span class="who">' + dot(h.color) + esc(h.player) + '</span></td>' +
        tcell(h.best) + tcell(h.worst) + '</tr>');
    });
    out.push('</tbody></table></div>');
    out.push('<div class="missing-row">Best and worst territory per player, minimum 3 rounds there; a continent stands in when no single country has the sample. The kryptonite column is not legal advice.</div>');
  }

  /* -------- The Round-Five Conspiracy -------- */
  if (geo.roundPos) {
    var rp = geo.roundPos;
    out.push('<h3 class="geo-subhead">The Round-Five Conspiracy</h3>');
    out.push('<div class="scroll"><table class="r5-table geo-t"><thead><tr>' +
      '<th class="pname">Round</th><th>Weight</th><th>Avg distance from home</th><th>Group avg</th></tr></thead><tbody>');
    rp.rows.forEach(function (r) {
      out.push('<tr><td class="pname">Round ' + r.round + '</td><td class="num">×' + r.mult + '</td>' +
        '<td class="num">' + (r.avgKm === null ? "—" : r.avgKm.toLocaleString() + " km") + '</td>' +
        heatTD(r.avgScore, r.count) + '</tr>');
    });
    out.push('</tbody></table></div>');
    if (rp.verdict) out.push('<div class="geo-verdict">' + esc(rp.verdict) + '</div>');
    if (rp.totalKm > 0) out.push('<div class="geo-note">Odometer: the puzzle has dragged this group ' +
      rp.totalKm.toLocaleString() + ' km round-to-round so far — ' + rp.laps +
      ' laps around the planet, no meals served.</div>');
  }

  /* -------- The Rematch -------- */
  if (geo.rematch) {
    var rm = geo.rematch;
    out.push('<h3 class="geo-subhead">The Rematch</h3>');
    if (rm.countries.length) {
      out.push('<div class="scroll"><table class="rem-table geo-t"><thead><tr>' +
        '<th class="pname">Country</th><th>Visits</th><th>First visit</th><th>Return visits</th><th>Δ</th></tr></thead><tbody>');
      rm.countries.forEach(function (c) {
        out.push('<tr><td class="pname">' + esc(c.country) + '</td><td class="num">' + c.visits + '</td>' +
          heatTD(c.firstAvg, c.firstN) + heatTD(c.returnAvg, c.returnN) +
          '<td class="num">' + deltaSpan(c.delta) + '</td></tr>');
      });
      out.push('</tbody></table></div>');
    }
    out.push('<div class="geo-verdict">' + esc(rm.verdict) + ' <span style="color:var(--dim)">(first-visit rounds: ' +
      rm.firstN + ', return rounds: ' + rm.returnN + '; table needs 4+ rounds on each side)</span></div>');
  }

  out.push('<h3 class="geo-subhead">Geo superlatives</h3><div class="awards">');
  geo.superlatives.forEach(function (a) {
    out.push('<div class="panel award">' +
      '<span class="a-title">' + esc(a.title) + '</span>' +
      '<span class="a-holder">' + (a.color ? dot(a.color) : "") + esc(a.holder) + '</span>' +
      '<span class="a-value">' + esc(a.value) + '</span>' +
      '<span class="a-desc">' + esc(a.desc) + '</span></div>');
  });
  out.push('</div>');

  var cv = geo.coverage;
  out.push('<div class="missing-row">Coverage: locations for ' + cv.coveredDays + ' of ' + cv.playDays +
    ' tracked days · ' + cv.roundsScored + ' scored rounds across ' + cv.uniqueLocations +
    ' distinct locations.</div>');
  out.push('</section>');
  return out.join("");
}

function render(stats, geo) {
  var app = document.getElementById("app");
  if (!app) return;

  if (!stats || stats.empty) {
    app.innerHTML =
      '<header class="masthead">' +
        '<div class="kicker">The Official Ledger of</div>' +
        '<h1 class="serif">Tappers</h1>' +
        '<div class="subtitle serif">a maptap almanac</div>' +
      '</header>' +
      '<div class="panel empty">' +
        '<h2 class="serif">No data yet</h2>' +
        '<p>The almanac is waiting for its first scores.</p>' +
        '<p class="hint">Run a refresh to pull the group’s maptap plays from Messages, then reopen this page.</p>' +
      '</div>';
    return;
  }

  var html = [];

  /* Masthead */
  html.push(
    '<header class="masthead">' +
      '<div class="kicker">The Official Ledger of</div>' +
      '<h1 class="serif">Tappers</h1>' +
      '<div class="subtitle serif">a maptap almanac</div>' +
      '<div class="meta-row">' +
        '<span><b>' + esc(stats.firstDateLabel) + '</b> — <b>' + esc(stats.latestDateLabel) + '</b></span>' +
        '<span><b>' + stats.totalGames + '</b> games tracked</span>' +
        '<span><b>' + stats.totalPlayers + '</b> players</span>' +
      '</div>' +
    '</header>');

  /* Today */
  var t = stats.today;
  html.push('<section id="today"><div class="sec-head">' +
    '<span class="sec-title">' + (t.provisional ? "Today" : "Latest Day") + ' · ' + esc(t.dateLabel) + '</span>' +
    (t.provisional ? '<span class="badge live">In progress — not yet official</span>' : '<span class="badge">Final</span>') +
    '</div><div class="today-list">');
  if (t.entries.length === 0) {
    html.push('<div class="panel today-card"><span class="today-time">No scores posted for this puzzle yet.</span></div>');
  }
  t.entries.forEach(function (e, i) {
    var isLeader = e.rank === 1;
    var chips = e.rounds.map(function (r, ri) {
      var em = e.emojis[ri] || "";
      return '<span class="chip ' + chipClass(r) + '"><span class="chip-e">' + esc(em) +
             '</span><span class="chip-n">' + r + '</span></span>';
    }).join("");
    html.push('<div class="panel today-card' + (isLeader ? " leader" : "") + '">' +
      '<div class="today-top">' +
        '<span class="today-rank">' + e.rank + '</span>' +
        '<span class="today-name">' + dot(e.color) + esc(e.player) + '</span>' +
        (isLeader ? '<span class="leader-tag">' + (t.provisional ? "leads" : "won the day") + '</span>' : "") +
        '<span class="today-time">' + esc(e.time) + '</span>' +
        '<span class="today-final">' + e.final + '</span>' +
      '</div><div class="chips">' + chips + '</div></div>');
  });
  html.push('</div>');
  if (t.flagged.length) {
    html.push('<div class="missing-row">Excluded today: ' + t.flagged.map(function (f) {
      return esc(f.player) + " (" + f.final.toLocaleString() + " — out of range)";
    }).join(", ") + '</div>');
  }
  if (t.missing.length) {
    html.push('<div class="missing-row">Yet to post: ' + t.missing.map(function (n) {
      return '<span class="pill">' + dot(stats.colorOf[n]) + esc(n) + '</span>';
    }).join("") + '</div>');
  } else {
    html.push('<div class="missing-row">Full house — all ' + stats.totalPlayers + ' have posted.</div>');
  }
  html.push('</section>');

  /* Leaderboard */
  var gmins = [], gmaxs = [];
  stats.leaderboard.forEach(function (r) {
    if (r.games) { gmins.push(r.worst); gmaxs.push(r.best); }
  });
  var gmin = gmins.length ? Math.min.apply(null, gmins) : 0;
  var gmax = gmaxs.length ? Math.max.apply(null, gmaxs) : 1000;
  var bestAvg = null;
  stats.leaderboard.forEach(function (r) { if (r.avg !== null && (bestAvg === null || r.avg > bestAvg)) bestAvg = r.avg; });

  html.push('<section id="leaderboard"><div class="sec-head">' +
    '<span class="sec-title">Leaderboard</span>' +
    '<span class="sec-sub">sorted by average final · official tallies through ' + esc(stats.officialCutoffLabel) + '</span>' +
    '</div><div class="scroll"><table class="lb-table"><thead><tr>' +
    '<th class="pname">Player</th><th>Games</th><th>Avg</th><th>Median</th><th>Best</th><th>Worst</th>' +
    '<th>Wins</th><th>Podiums</th><th>Streak</th><th>Longest</th><th>Part.</th><th>Form</th>' +
    '</tr></thead><tbody>');
  stats.leaderboard.forEach(function (r) {
    var flagMark = r.hasFlagged ? ' <span class="flag-mark" title="Has an excluded out-of-range game — see footnotes">✳</span>' : "";
    html.push('<tr>' +
      '<td class="pname"><span class="who">' + dot(r.color) + esc(r.player) + flagMark + '</span>' +
      (r.joinedLabel ? '<span class="joined">since ' + esc(r.joinedLabel) + '</span>' : "") + '</td>' +
      '<td class="num">' + r.games + '</td>' +
      '<td class="num' + (r.avg !== null && r.avg === bestAvg ? " top-avg" : "") + '">' + fmtNum(r.avg) + '</td>' +
      '<td class="num">' + fmtNum(r.median) + '</td>' +
      '<td class="num">' + fmtNum(r.best) + '</td>' +
      '<td class="num">' + fmtNum(r.worst) + '</td>' +
      '<td class="num">' + r.wins + '</td>' +
      '<td class="num">' + r.podiums + '</td>' +
      '<td class="num">' + (r.curStreak > 0 ? r.curStreak + "d" : "—") + '</td>' +
      '<td class="num">' + (r.longStreak > 0 ? r.longStreak + "d" : "—") + '</td>' +
      '<td class="num">' + (r.participation === null ? "—" : Math.round(r.participation * 100) + "%") + '</td>' +
      '<td>' + sparkSVG(r.series, r.color, gmin, gmax) + '</td>' +
      '</tr>');
  });
  html.push('</tbody></table></div></section>');

  /* Superlatives */
  html.push('<section id="superlatives"><div class="sec-head">' +
    '<span class="sec-title">Superlatives</span>' +
    '<span class="sec-sub">awards computed nightly; no appeals process</span></div>');
  if (stats.roundAvgs && stats.roundAvgs[0] !== null) {
    var maxR = Math.max.apply(null, stats.roundAvgs);
    var floorR = Math.min(40, Math.min.apply(null, stats.roundAvgs) - 10);
    html.push('<div class="panel strip"><span class="strip-title">The round-five problem</span><div class="rbars">' +
      stats.roundAvgs.map(function (v, i) {
        var hpx = Math.max(6, Math.round((v - floorR) / Math.max(1, maxR - floorR) * 46));
        return '<div class="rbar"><span class="bv">' + Math.round(v) + '</span>' +
               '<span class="bar" style="height:' + hpx + 'px"></span><small>R' + (i + 1) + '</small></div>';
      }).join("") +
      '</div><span class="strip-note">Group average by round. Rounds one through four hold the line; round five is where scores go to die.</span></div>');
  }
  html.push('<div class="awards">');
  stats.superlatives.forEach(function (a) {
    html.push('<div class="panel award">' +
      '<span class="a-title">' + esc(a.title) + '</span>' +
      '<span class="a-holder">' + (a.color ? dot(a.color) : "") + esc(a.holder) + '</span>' +
      '<span class="a-value">' + esc(a.value) + '</span>' +
      '<span class="a-desc">' + esc(a.desc) + '</span></div>');
  });
  html.push('</div></section>');

  /* Trends */
  html.push('<section id="trends"><div class="sec-head">' +
    '<span class="sec-title">Form Guide</span>' +
    '<span class="sec-sub">7-day rolling average final score</span></div>' +
    '<div class="legend">' + stats.names.filter(function (n) { return stats.trend.series[n]; })
      .map(function (n) { return "<span>" + dot(stats.colorOf[n]) + esc(n) + "</span>"; }).join("") +
    '</div><div class="panel chart-panel">' + trendSVG(stats) + '</div></section>');

  /* Head-to-head */
  var hp = stats.h2h.players;
  html.push('<section id="h2h"><div class="sec-head">' +
    '<span class="sec-title">Head to Head</span>' +
    '<span class="sec-sub">row wins–losses vs column, on days both posted (official days only)</span></div>' +
    '<div class="scroll"><table class="h2h-table"><thead><tr><th class="rowh"></th>' +
    hp.map(function (n) { return "<th>" + dot(stats.colorOf[n]) + esc(n) + "</th>"; }).join("") +
    '</tr></thead><tbody>');
  hp.forEach(function (a) {
    html.push('<tr><th class="rowh">' + dot(stats.colorOf[a]) + esc(a) + '</th>');
    hp.forEach(function (b) {
      if (a === b) { html.push('<td class="h2h-none">—</td>'); return; }
      var c = stats.h2h.grid[a][b];
      var tot = c.w + c.l;
      if (tot + c.t === 0) { html.push('<td class="h2h-none">·</td>'); return; }
      var bgc = "transparent";
      if (tot > 0 && c.w !== c.l) {
        var lean = Math.abs(c.w / tot - 0.5) * 2;
        var alpha = (0.06 + 0.22 * lean).toFixed(2);
        bgc = c.w > c.l ? "rgba(74,222,128," + alpha + ")" : "rgba(248,113,113," + alpha + ")";
      }
      var tt = esc(a) + " " + c.w + "–" + c.l + " vs " + esc(b) + (c.t ? " (" + c.t + " tied)" : "");
      html.push('<td style="background:' + bgc + '" title="' + tt + '">' + c.w + "–" + c.l + '</td>');
    });
    html.push('</tr>');
  });
  html.push('</tbody></table></div></section>');

  /* Records */
  html.push('<section id="records"><div class="sec-head">' +
    '<span class="sec-title">Records Board</span>' +
    '<span class="sec-sub">standing until further notice</span></div><div class="rec-grid">');
  stats.records.forEach(function (r) {
    html.push('<div class="panel award">' +
      '<span class="a-title">' + esc(r.label) + '</span>' +
      '<span class="a-holder">' + (r.color ? dot(r.color) : "") + esc(r.holder) + '</span>' +
      '<span class="a-value">' + esc(r.value) + '</span>' +
      '<span class="a-desc">' + esc(r.detail) + '</span></div>');
  });
  html.push('</div></section>');

  /* Geography */
  html.push(geoSectionHTML(geo));

  /* Emoji tiers */
  html.push('<section id="emoji"><div class="sec-head">' +
    '<span class="sec-title">The Emoji Scale</span>' +
    '<span class="sec-sub">what the game hands out at each altitude, observed empirically</span></div>' +
    '<div class="emoji-grid">');
  stats.emojiTiers.filter(function (e) { return e.count >= 2; }).forEach(function (e) {
    var left = e.min, width = Math.max(1, e.max - e.min);
    html.push('<div class="panel em-row">' +
      '<span class="em-e">' + esc(e.emoji) + '</span>' +
      '<span class="em-count">' + e.count + '×</span>' +
      '<span class="em-track"><span class="em-range" style="left:' + left + '%;width:' + width + '%"></span></span>' +
      '<span class="em-stats">' + e.min + '–' + e.max + ' · x̄ ' + Math.round(e.avg) + '</span></div>');
  });
  html.push('</div>');
  if (stats.rareEmojis.length) {
    html.push('<div class="rare-line"><b>Rare sightings</b> (seen once): ' +
      stats.rareEmojis.map(function (e) {
        return '<span class="re">' + esc(e.emoji) + '</span> ' + e.first.score +
               ' <span style="color:var(--dim)">(' + esc(e.first.player) + ", " + esc(e.first.date.slice(5).replace("-", "/")) + ')</span>';
      }).join(" · ") + '</div>');
  }
  html.push('</section>');

  /* Footnotes */
  var flaggedNote = "Scores outside 0–1000 are excluded from all numbers";
  if (stats.flaggedPlays.length) {
    flaggedNote += " — notably " + stats.flaggedPlays.map(function (f) {
      return esc(f.player) + "’s " + f.final.toLocaleString() + " on " + esc(f.dateLabel) +
        (f.final === 99992 ? " (not a possible daily score — the game has capped at 1,000 since 2024; best theory is the app’s lifetime-total share, a feature that shipped that very morning)" : "");
    }).join("; ") + ". Excluded games appear only in footnotes and asterisks (✳).";
  } else {
    flaggedNote += ".";
  }
  html.push('<section class="notes" id="notes"><div class="sec-head">' +
    '<span class="sec-title">Methodology &amp; Fine Print</span></div><ol>' +
    '<li>Source: the group’s own iMessage shares in “Tappers” (and side chats). If you didn’t post it, it didn’t happen.</li>' +
    '<li>First share counts. Later re-shares of the same day’s puzzle are recorded but ignored (' + stats.totalReshares + ' so far).</li>' +
    '<li>' + flaggedNote + '</li>' +
    '<li>Official tallies (wins, podiums, streak records, head-to-head) run through ' + esc(stats.officialCutoffLabel) +
      (stats.provisional ? "; the current day is shown live but not yet counted." : ".") + '</li>' +
    '<li>Daily winner is the highest final that day; ties are shared wins.</li>' +
    '<li>Final score = R1 + R2 + 2×R3 + 3×R4 + 3×R5, out of 1,000. Rounds 4 and 5 pay triple — a late collapse costs three times as much.</li>' +
    '<li>Averages and records include every counted game, including the in-progress day.</li>' +
    '<li>Join dates differ — participation is measured from each player’s first posted game, so nobody is punished for a late invitation.</li>' +
    '<li>Average-based awards require at least 5 games; improvement awards require 8.</li>' +
    '<li>Emoji tiers shown are inferred from our own data; under the hood the game grades each round on a 46-rung ladder from 🤮 to 🎯 (one rung ≈ 2.2 points — and yes, 🔥 outranks 🏅).</li>' +
    (geo && !geo.empty
      ? '<li>Locations come from maptap’s own daily puzzle data, archived the day each puzzle runs.</li>' +
        '<li>Location coverage: ' + geo.coverage.coveredDays + ' of ' + geo.coverage.playDays +
          ' tracked days. Geography stats use only days where scores and locations both exist; round scores are matched to that day’s five locations.</li>' +
        '<li>Countries and continents are read from each place name where possible, with a point-in-polygon fallback against maptap’s own world map. The map itself is drawn from embedded Natural Earth outlines — no network required.</li>' +
        '<li>Distance stats (comfort radius, decay, odometer, round-position mileage) measure great-circle distance from the group’s home turf in western Massachusetts (42.32°N, 72.63°W). Decay slopes are least-squares fits, quoted only for players with 15+ located rounds.</li>' +
        '<li>“Island” is decided by an embedded list of island nations and territories plus place-name matching (Island, Isle, Île, Atoll, Archipelago, and well-known islands such as Hawaii or Sicily); everything else counts as mainland. Crude, documented, and applied evenly.</li>'
      : '') +
    '</ol></section>');

  /* Footer */
  html.push('<footer><div class="fleuron">❦</div>' +
    '<p>Data through ' + esc(fmtStamp(stats.generatedAt)) + ' · refreshes automatically each day · maptap.gg</p></footer>');

  app.innerHTML = html.join("");
}

/* ================================= boot ================================== */
if (typeof document !== 'undefined') {
  (function () {
    var data = (typeof window !== 'undefined') ? window.MAPTAP_DATA : null;
    var locs = (typeof window !== 'undefined') ? window.MAPTAP_LOCATIONS : null;
    try {
      render(computeStats(data), computeGeoStats(data, locs));
    } catch (err) {
      var app = document.getElementById("app");
      if (app) {
        app.innerHTML = '<div class="panel empty"><h2 class="serif">Something went sideways</h2><p>' +
          esc((err && err.message) || err) + '</p><p class="hint">Try running a refresh; if it persists, the data format may have changed.</p></div>';
      }
    }
  })();
}
</script>
</body>
</html>
