. He could never return home.\n\nHe settled in Princeton, New Jersey, and spent the rest of his life in the United States. In addition to everything we know he did for science, he also worked relentlessly for refugees. He wrote hundreds of letters of recommendation, signed affidavits, raised money, and helped families escape Europe. \n\n\"As long as I have any influence, I shall use it in behalf of those who are persecuted.\""},{"round":2,"name":"Amman, Jordan","lat":31.9539,"lon":35.9106,"country":"Jordan","continent":"Asia","story":"Omar Yaghi, born September 9, 1965, in a Palestinian refugee camp in Amman, Jordan. They had fled their village between Jaffa and Jerusalem during the 1948 Arab–Israeli War and ended up in Jordan with almost nothing. Omar grew up in a crowded refugee neighborhood. The family shared a single room with a cow. Water arrived rarely, and Omar had to be up at dawn to make sure they got some.\n\nAs a boy, he wandered into a library and became fascinated by diagrams of molecules. At 15, he left for the United States. He spoke little English, but he worked odd jobs and got through community college. As his English improved, so did his grades. He advanced in science, and 10 years after entering the US, he earned a PhD in chemistry. \n\nMost scientists want to discover new materials. Omar wanted to design them. In the 1990s, he developed metal-organic frameworks (or MOFs), ... structures filled with microscopic pores. MOFs can capture carbon dioxide, store hydrogen, separate gases, and even pull water directly from dry desert air.\n\nScientists around the world began building on his work. Tens of thousands of research papers followed. Today, MOFs are among the most studied materials in modern chemistry. Omar won the 2025 Nobel Prize in Chemistry for inventing them."},{"round":3,"name":"Chernivtsi, Ukraine","lat":48.2915,"lon":25.9403,"country":"Ukraine","continent":"Europe","story":"Happy World Refugee Day!\n\nMila Kunis, born August 14, 1983, in Chernivtsi, then part of the Soviet Union. When she was seven, her parents decided to leave everything behind and start over in America. They arrived in Los Angeles with suitcases and $250. It was the legal maximum emigrants were allowed to take out of the country.\n\nMila spoke almost no English. She later described the experience as being \"blind and deaf\". Her father took whatever work he could find ... painting houses, driving a cab. Her mother started at the bottom of a drugstore and worked her way up. \n\nMila struggled with English. Her parents decided the best way to help her practice was to enroll her in acting classes. Holy smokes, what a decision that would be.\n\nAt 14, she auditioned for a new television show called That '70s Show. The age requirement was 18. When asked how old she was, she told the producers she \"would be 18\" ... and, I guess that's technically true? Eventually, she would be 18. They hired her. \n\nIn 2022, Russia invaded Ukraine and millions of people were forced from their homes. Mila watched from the United States. She knows exactly what it feels like when a family packs up whatever they can carry and goes in search of a new home. She and her husband Ashton Kutcher raised more than $30 million for displaced Ukrainians."},{"round":4,"name":"Hargeisa, Somaliland","lat":9.5624,"lon":44.077,"country":"Somalia","continent":"Africa","story":"Hussein Abdi Kahin, born March 23, 1983, in Somalia. When he was four, his father was killed during the civil war. Hussein grew up herding goats and helping his family. When he was ~9 years old, a stranger told him she was taking him to Europe to live with relatives. Instead, the truth was that he was being kidnapped, and flown to Britain using another child's passport, under the name Mohamed Farah.\n\nHussein grew up with the name Mo Farah. At first, he spoke no English. He was forced to work as a domestic servant, caring for younger children and doing household chores. His passport was taken away. He was told that if he caused trouble, he would be sent away. School became an escape, and a physical education teacher named Alan Watkinson noticed Hussein ... Hussein could run. Fast.\n\nEventually, Hussein opened up to Alan, and after learning the truth, Alan helped connect him with social services. That led to foster care and a chance to build a new life. \n\nHussein kept running. He won school races. Then national championships. Then European titles. In 2012 and 2016, he won four Olympic gold medals and became one of the most celebrated distance runners in the world, and was knighted. \n\nFor decades, he carried a story he was afraid to tell. In 2022, he told the whole thing to the BBC in a documentary. His real name. How he had been trafficked to Britain. His family in Somalia, who had thought he was dead. \n\n\"I often think about the other Mohamed Farah, the boy whose place I took on that plane. I really hope he's OK.\""},{"round":5,"name":"Douala, Cameroon","lat":4.0511,"lon":9.7679,"country":"Cameroon","continent":"Africa","story":"Cindy Ngamba, born September 7, 1998, in Cameroon. When she was ~11, her family sent her to the UK to live with relatives and get an education. She grew up in England. She went to school there, made friends, built a life, and found boxing. \n\nAt first, it was just a way to stay active. But she was good. Really good. The gym became a second home, and before long she was spending hours training after school. By her late teens, she was winning amateur bouts and dreaming of the Olympics. She won three national titles, in three different weight categories. And yet she couldn't compete for Great Britain. She wasn't a British citizen.\n\nWithout citizenship, she couldn't represent the country she called home. At one point, immigration authorities detained her ... she was struggling to stay in the only home she ever knew.\n\nIn 2016, the International Olympic Committee created the \"Refugee Olympic Team\". It is specifically for people like Cindy. A team for athletes who have no country.\n\nAt the 2024 Paris Olympics, Cindy qualified to compete. She fought her way to the semifinals, and she won Bronze. Cindy was the first athlete in the history of the Olympics to win a medal without the flag of a home country."}],"2026-06-21":[{"round":1,"name":"Evansville, Indiana","lat":37.9716,"lon":-87.5711,"country":"United States","continent":"North America","story":"My Dad was born here, in Evansville, Indiana, in 1932. His family was poor but they managed. He joined the army in the 1950s and served as a medic. After, he went to school and became a doctor (anesthesiologist). My mom was a nurse. She was singing Christmas carols in July, and my dad decided he had to meet that woman.\n\nEducation was important in our house. At dinner, my older brothers and I would try to answer the nightly math problems in our heads. They went to school and became electrical engineers. They're both brilliant.\n\nI remember when I got accepted to college ... I wanted to be like them. So I was going to be an engineer too. My dad, who was not a man of many words, said, \"John, I don't think that's your path.\" I did it anyway.\n\nA couple of years later, I dropped out. I tried working. I hated my job. I went back to school. Really, all I wanted to do was play, and build, video games. \n\nI was a senior in (my third attempt at) college, and I was working on the side making games when my side-gig offered me a full time job. Making games. \n\nI called my parents. I talked to Mom first. Her reply was something like, \"No! Talk to your Father.\" She handed the phone over. I explained to him all about it. What I was going to do. Where I was headed. This is 25+ years ago, and I remember his words exactly. \n\n\"Chase your dreams, son.\"\n\nI could hear my mom freak out in the background. He quickly followed with, \"You might want to give me a day or two, ok?\"\n\nI owe a tremendous amount to both my parents for their support along the way. But that moment changed my life, and I am so thankful for it. Happy Father's Day, dad."},{"round":2,"name":"Aswan, Egypt","lat":24.0889,"lon":32.8998,"country":"Egypt","continent":"Africa","story":"Eratosthenes was the chief librarian of Alexandria. He was a mathematician, a poet, and a philosopher. And he was good at these things. But his peers had a nickname for him ... Beta. Second-best. \n\nAround 240 BC, Eratosthenes heard a story from the south. In the city of Syene (modern-day Aswan), people said that at noon on the summer solstice, the sun shone straight down a deep well. No shadow. No angle. The light reached the water at the bottom.\n\nOn the next solstice, Eratosthenes placed a stick in the ground in Alexandria and measured its shadow. The sun wasn't directly overhead ... the angle was ~7.2 degrees. 1/50th of a circle.\n\nIf the Earth is round, and Syene and Alexandria lay roughly north and south of each other, then the distance between them must be 1/50th of the planet's circumference.\n\nHe hired surveyors to walk that distance and count their steps. Then he multiplied that by 50. The result was 250,000 stadia (~39,375km, ~24,465 miles). The Earth is ~40,000 km around. No one realized it at the time, but Eratosthenes had estimated the circumference of the Earth within just 2%.\n\nThe next measurement meaningfully better (that we know of) wouldn't happen for ~1,000 years (in 820 AD by Al-Ma'mun). Good job, Beta. MapTap officially revises your nickname to Alpha. Apologies it took 2,266 years to fix this."},{"round":3,"name":"Riga, Latvia","lat":56.9496,"lon":24.1052,"country":"Latvia","continent":"Europe","story":"Eugenie Peterson, born May 12, 1899, in Riga. At 15, she read Rabindranath Tagore (the first Asian writer to win the Nobel Prize in Literature) and became fascinated with India. She didn't have any way to get there ... but when a banker proposed marriage, she accepted, on condition he pay for the trip first. He agreed. \n\nShe spent months traveling the country and fell in love. She eventually returned to Europe, but the marriage didn't happen. India kept calling to her. She sold everything valuable she owned, and returned to India for good. She became an actress, and changed her name to Indra Devi.\n\nIndra wanted to study yoga with Tirumalai Krishnamacharya (the father of modern yoga). He refused. She was foreign. She was a woman. His students were Indian men. Tirumalai eventually relented, convinced she would quit within a few days.\n\nShe didn't. Indra trained for months, mastering postures, breathing exercises, and yoga philosophy. Over time, Tirumalai's skepticism faded. He eventually encouraged her to teach others. \n\nHer life changed again. Indra opened yoga schools in Shanghai and Hollywood. She was one of the first teachers to bring yoga out of India. She introduced thousands of people to a practice that most Westerners had never seen. \n\nHappy International Day of Yoga! The girl fascinated by India would end up spending the rest of her life helping the rest of the world discover it too."},{"round":4,"name":"Sennar, Sudan","lat":13.55,"lon":33.6,"country":"Sudan","continent":"Africa","story":"In 1827, Muhammad Ali, the ruler of Egypt, was trying to improve relations with France. He decided to send a giraffe. Totally normal.\n\nThere was one problem ... giraffes are enormous, fast, and rather difficult to catch. They managed to catch a baby female ... still nursing. She was taken down the Nile to Egypt, then loaded onto a ship bound for France. She was too tall for the cargo hold, so a hole was cut through the deck above her neck. They shipped her along with two cows, to provide milk for her during the journey.\n\nAfter crossing the Mediterranean and arriving in Marseille, officials faced a new problem ... how do you get a giraffe across France? Why, you walk, of course. All 560 miles (900 km).\n\nThey walked with her through villages, vineyards, and crowded town squares. The cows traveled with her the entire way, providing milk whenever she needed it. Everywhere she went, crowds gathered. Children climbed onto rooftops. Farmers left their fields. People lined the streets. She arrived in Paris in July 1827.\n\nParis completely lost its mind.\n\nMore than 100,000 people came to see her. Girafomania swept France. Hairstyles grew taller and more elaborate. Dressmakers filled shop windows with spotted fabrics. Newspapers, artists, and writers could not stop talking about her. She lived there, apparently quite happily, for 18 years. \n\nHappy World Giraffe Day!"},{"round":5,"name":"Apra Harbor, Guam, United States","lat":13.4443,"lon":144.6504,"country":"United States","continent":"North America","story":"1898. The Spanish-American War has been raging for over a month. Fighting was underway in Cuba and the Philippines. The cruiser USS Charleston was steaming toward Manila. Along the way, it was instructed to capture the island of Guam, a small Spanish possession in the Pacific. \n\nJune 20, 1898, the Charleston entered Apra Harbor and fired several shells toward Fort Santa Cruz. The Americans expected resistance. Instead, nothing happened. The fort didn't fire back. No alarm was raised. The governor, Juan Marina, didn't know that Spain and America were at war. \n\nHe assumed the warship was paying a ceremonial visit. The cannon fire was a salute. He wanted to return the courtesy, but they didn't have any ammunition. So he sent a delegation by rowboat ... a port official, a naval officer, and an interpreter, to apologize for the island's poor manners.\n\nUS Captain Henry Glass had to break the news ... no, we're at war. And you are now prisoners of war.\n\nGuam's garrison consisted of just 54 soldiers, many of them elderly. They surrendered today, June 21, 1898. Captain Glass appointed Francisco Portusach, the only American citizen on the island, as temporary governor. Then he left and sailed on toward Manila."}],"2026-06-22":[{"round":1,"name":"London, England, United Kingdom","lat":51.5074,"lon":-0.1278,"country":"United Kingdom","continent":"Europe","story":"Cicely Saunders, born June 22, 1918, in Barnet, just north of London. She trained as a nurse during World War II, but a back injury prevented her from working the long shifts the job required. She retrained as a medical social worker, and in 1947, she was assigned to a patient named David Tasma.\n\nDavid was a Polish refugee dying of inoperable cancer. Most of his family had been lost during the war, and he was alone. Cicely visited him every day, and they spent hours talking. She told him about her dream of creating a home where people at the end of life would be treated with dignity, comfort, and compassion.\n\nDavid passed away later that year. In his will, he left her everything he had, £500, along with a message, \"I'll be a window in your home.\" She'd say later that this was the moment she realized her dream could be more than a dream.\n\nShe needed the authority and medical knowledge to change how dying patients were treated. At 33, she enrolled in medical school. She graduated with honors at 39 and spent the next decade studying pain management and the needs of terminally ill patients.\n\nShe developed the idea of \"total pain\" ... the belief that physical pain, distress, and isolation are all connected. In 1967, she opened St. Christopher's Hospice in London. It completely changed end-of-life care.\n\nFor centuries, medicine had focused on curing disease. Cicely showed that caring for people when a cure was no longer possible was just as important. Over the past 50 years, St. Christopher's became a model that was replicated worldwide.\n\nDavid got his wish. Inside St. Christopher's is a window dedicated to him."},{"round":2,"name":"Cleveland, Ohio","lat":41.4993,"lon":-81.6944,"country":"United States","continent":"North America","story":"Today, June 22, 1969, the Cuyahoga River caught fire. A spark from a passing train ignited an oil slick. This wasn't the first time. The river caught fire in 1868, 1883, 1887, 1912, 1922, 1930, 1936, 1941, 1948, 1952, and this time, 1969. It barely made local coverage. People were just used to it. \n\nTime Magazine ran an article that August, and described the Cuyahoga as a river that \"oozes rather than flows\". It went national. People who had never been to Cleveland suddenly knew that an American river had been flammable for 100 years.\n\nMayor Carl Stokes (Cleveland's first Black mayor, and the first Black mayor of any major US city) had been pushing for federal pollution money. He led a press tour of the river. He testified to Congress.\n\nThe political timing was perfect. Senator Edmund Muskie had been drafting water pollution legislation for years and couldn't get it through. Three years later, the federal Environmental Protection Agency (1970) was created. Then the Clean Water Act (1972) was passed, and a billion-dollar federal cleanup of the Cuyahoga began.\n\nThe river hasn't burned since. Which seems like a weirdly obvious thing to say? Rivers aren't supposed to catch fire in the first place."},{"round":3,"name":"Olympia, Washington","lat":47.0379,"lon":-122.9007,"country":"United States","continent":"North America","story":"I've made a lot of little games for fun. I hand them to my wife to play and see what she thinks. She'll politely play it, then normally, she puts the phone down, and turns to me and says, \"I'm never playing that again.\"\n\nHappy Birthday MapTap! My wife liked this one from the start. Her first game was today, June 22nd, 2024.\n\nThe past year I've added a ton to MapTap: leaderboards, practice games, groups, an iOS app, the moon (with the correct phase! <-- I'm unreasonably proud of that one), versus mode, higher-detail maps, and now it is in 12 languages. It's been quite a year.\n\nThere's so much more to do! Soon, there will be a way for people to make their own MapTap games to send to each other, tons more content, and an Android app!\n\nThings MapTap doesn't have? Ads. Notifications (\"Come back and play!\") Email reminders. Or really reminders of any kind at all. The internet has plenty of these things already.\n\nIf you're enjoying it, would you consider supporting it? MapTap+ lets you create groups, unlocks the ability to play prior days, and the best-of maps. Tap the menu above. It's in there. \n\nBut most of all, thank you for playing. I think the world is weirder, and kinder, than most people know. See you tomorrow for another five stories?\n\nJohn"},{"round":4,"name":"Nasiriyah, Iraq","lat":31.057,"lon":46.2573,"country":"Iraq","continent":"Asia","story":"Happy National Kissing Day! When did kissing originate?\n\nThe oldest archaeological evidence comes from ancient Mesopotamia, in what is now Iraq. More than 4,500 years ago, an ancient text describes a woman being kissed by her lover. By ~2500 BC, kissing was already so ordinary that nobody bothered to explain what it was.\n\nIf people were kissing 4,500 years ago, how much older is the behavior itself? It predates writing. Does it predate language? Civilization? \n\nResearchers started reaching further back. Chimpanzees press their lips together when they're making up after a fight. Bonobos and orangutans kiss too. A 2025 study traced the habit all the way back to a common ancestor we share with the other great apes ... an animal that lived ~20 million years ago.\n\nBut why press two mouths together in the first place? One idea is that kissing grew out of the way mothers once fed infants. They would chew food until it was soft, then pass it to their child, mouth to mouth. Apes still do it. Humans did too for most of our history.\n\nKissing is older than cities, older than farming, older than language ... if our recent research is correct, kissing is older than humanity. We were kissing before we were walking on two feet."},{"round":5,"name":"Manaus, Amazonas, Brazil","lat":-3.119,"lon":-60.0217,"country":"Brazil","continent":"South America","story":"Happy World Rainforest Day!\n\nThis is Richard Evans Schultes, born January 12, 1915, in Boston, Massachusetts. As a boy, he spent long afternoons exploring local woods and collecting plants. He enrolled at Harvard intending to study medicine, but a botany class changed everything. Instead of becoming a doctor, he decided to spend his life studying the relationship between people and plants.\n\nIn 1941, Richard went to the Colombian Amazon to study poisons. He expected to stay a few months. He stayed for 13 years.\n\nHe traveled mostly on foot and by canoe. And he covered tens of thousands of miles through some of the most remote rainforest on Earth. He lived with Indigenous communities, learned their languages, built trust with them, and documented how they treated disease.\n\nHe learned about the sources of curare, the blowgun poison hunters had used for centuries. Years later, it became a muscle relaxant used in modern surgery. He collected 24,000 plant specimens (300 completely new to science) and filled notebooks with indigenous knowledge that had never been written down ... knowledge that existed nowhere else on Earth.\n\n\"Each time one of the medicine men dies, it is as if a library has burned down.\""}],"2026-06-23":[{"round":1,"name":"Hollywood, California","lat":34.0983,"lon":-118.3267,"country":"United States","continent":"North America","story":"Hedwig Kiesler, born November 9, 1914, in Vienna. At 5, she took her music box apart to see how it worked. At 18 she became a film star (Ecstasy, 1933). She married Friedrich Mandl, the third-richest man in Austria. He was a weapons dealer, and wanted a glamorous wife to accompany him to dinners and receptions. He controlled every aspect of her life, and she planned her way out. \n\nIn 1937, she put on all her jewelry for a dinner party ... and then never went home. She fled to Paris, then Hollywood, and reinvented herself as Hedy Lamarr. She became MGM's biggest star. But between scenes, she retreated to her trailer and sketched ideas, tinkered with designs, and worked on inventions. \n\nWhen World War II broke out, Hedy wanted to help the Allies. She knew radio-controlled torpedoes could be jammed and she invented a solution. Frequency-hopping. The tricky bit was how to sync both ends. She teamed up with composer George Antheil, who'd once synchronized a roomful of player pianos. They used player-piano rolls ... strips of perforated paper hopping across 88 frequencies, one for each piano key. They patented it in 1942 and gave it to the Navy for free.\n\nThe Navy wasn't interested. They asked her to help sell war bonds, instead. Which she did, raising millions.\n\nDecades later, frequency-hopping and other spread-spectrum techniques have become essential to modern wireless communication. Her patent is now recognized as one of the earliest milestones on the road to technologies like GPS, Bluetooth, Wi-Fi, and mobile phones."},{"round":2,"name":"Richmond, Virginia","lat":37.5407,"lon":-77.436,"country":"United States","continent":"North America","story":"Happy International Women in Engineering Day!\n\nThis is Gladys West, born October 27, 1930, in Dinwiddie County, Virginia. She grew up picking tobacco on her family's farm. Her high school gave a full college scholarship to the top two students in every class ... so she made sure she was one of them.\n\nIn college, she studied mathematics. Women in math in the 1950s were rare. Black women studying math was almost unheard of. In 1956 the Navy hired her at its proving ground in Dahlgren. She was the second Black woman they'd ever hired and one of only four Black employees on the whole base.\n\nShe was assigned to study the shape of the Earth. Our planet isn't a perfect sphere. It bulges at the middle and sags at the poles. Gravity across Earth is uneven from one place to the next. \n\nFor decades Gladys fed satellite readings into an IBM mainframe and refined the math, correction by correction. By 1986, her model of the Earth's true shape was one of the most accurate ever made. That model is what lets a satellite know exactly where you're standing. \n\nToday, her work is foundational to GPS. Every time you check your location on a map, Gladys's math is right there. \"[I wasn't] thinking, 'What impact is this going to have on the world?' I was thinking, 'I've got to get this right.'\""},{"round":3,"name":"Mannheim, Germany","lat":49.4875,"lon":8.466,"country":"Germany","continent":"Europe","story":"Bertha Ringer, born May 3, 1849, in Pforzheim, Germany. In 1872, she married Karl Benz, an inventor who spent years trying to build a reliable car. She helped finance his work with her dowry. In 1885, Karl completed the Patent-Motorwagen, a three-wheeled vehicle with a one-cylinder gasoline engine. It worked. It also sat in his workshop while Karl worried about public reception. They weren't selling.\n\nOn August 5, 1888, Bertha left a note on the dining table saying she was going to her mother's, and left. She loaded her two teenage sons into the Motorwagen, left Mannheim where they were living, and aimed for her mother's house in Pforzheim. 66 miles south, on unpaved roads. \n\nIf this trip happened to you, you'd call it a disaster. The fuel line clogged. She cleared it with a hairpin. The brakes wore through; she stopped at a cobbler and had him attach leather strips to the brake shoes, basically inventing brake linings on the spot. When the engine struggled uphill, she deduced that a lower gear ratio would help. Karl would later add one. She bought fuel at a pharmacy in Wiesloch ... the first filling station in history.\n\nBy the time she reached Pforzheim, she had completed the world's first long-distance automobile journey. She sent Karl a telegram to let him know she made it. And then she shared with him all the improvements needed before ordinary people would buy it.\n\n\"She was much more courageous than me.\""},{"round":4,"name":"Thunder Bay, Ontario, Canada","lat":48.3809,"lon":-89.2477,"country":"Canada","continent":"North America","story":"Elsie MacGill, born March 27, 1905, in Vancouver, British Columbia. Her mother was British Columbia's first female judge. She enrolled at the University of Toronto and became the first woman in Canada to earn an electrical engineering degree. She graduated in 1927, then went to the University of Michigan, becoming the first woman in North America (and maybe the first in the world?) to earn a master's degree in aeronautical engineering. \n\nThe morning after her graduation party, she woke up unable to move her legs. Polio. Doctors told her she would never walk again. She spent three years in a wheelchair at her parents' home and eventually taught herself to walk with two metal canes. She went back to work.\n\nIn 1938, she was hired as Chief Aeronautical Engineer at the Canadian Car and Foundry plant here in Fort William (now Thunder Bay), Ontario. When World War II came, she oversaw the production of Hawker Hurricane fighter planes. She designed ski landing gear and de-icing systems so the planes could operate in the Canadian winter. Her factory grew to 4,500 workers, about half of them women. They called her \"Queen of the Hurricanes.\""},{"round":5,"name":"Riyadh, Saudi Arabia","lat":24.7136,"lon":46.6753,"country":"Saudi Arabia","continent":"Asia","story":"Hayat Sindi, born November 6, 1967, in Mecca. She decided early on that she wanted to be a scientist. At 21, she persuaded her family to let her go to Britain to study. She arrived alone, knowing few people and speaking little English. She spent her first year learning the language and preparing for her university tests. \n\nShe earned a degree in pharmacology from King's College London, and in 2001 became the first Saudi woman to earn a doctorate in biotechnology from the University of Cambridge.\n\nMost researchers work to make medical technology more advanced. Hayat wanted to take tests out of the modern labs and into the hands of people far from reliable electricity, refrigeration, and trained technicians. \n\nIn 2007 she co-founded a nonprofit, Diagnostics For All, to build diagnostic tests on paper. Her first test checked for liver damage. Normally, finding the enzymes from a damaged liver means a vial of blood, a lab, and a trained technician ... a test that runs tens to hundreds of dollars.\n\nShe wanted to bring the tests to the patient, rather than the patients to the lab. She engineered a strip of paper to react to those enzymes. One drop of blood, a color change, and an answer in moments. She reduced the price of this test by more than 99%, and made it available far away from a hospital setting.\n\nAs her reputation grew, she became a prominent voice for science and education across the Middle East. In January 2013, here in Riyadh, Hayat became one of the first women ever appointed to Saudi Arabia's Shura Council, the assembly that advises the king and helps shape the country's laws."}],"2026-06-24":[{"round":1,"name":"Tacoma, Washington","lat":47.2529,"lon":-122.4443,"country":"United States","continent":"North America","story":"Today, June 24, 1947, Kenneth Arnold was flying a small, private plane near Mount Rainier. He spotted nine shiny, crescent-shaped objects darting across the sky. He described their movement, \"like a saucer would if you skipped it across the water\" ... which quickly got shortened into \"flying saucers\". Arnold's sighting made front-page news across the country.\n\nArnold was a successful businessman and pilot. He was a credible witness. But no one could explain what he saw. And in the 80 years since, there have been more instances we can't explain. \n\nIn July 1952, radar operators and pilots reported unidentified objects over Washington, DC. Fighter jets were scrambled repeatedly. The sightings appeared on multiple radar screens and were witnessed by experienced observers. No solid explanation has ever been given.\n\nIn 1976, Iranian Air Force pilots pursuing a brilliant object over Tehran reported radar contacts and unexplained instrument failures. In 1986, the crew of Japan Air Lines Flight 1628 over Alaska described enormous illuminated objects pacing their 747 for nearly an hour. In 2004, U.S. Navy pilots off the California coast encountered the now-famous \"Tic Tac\" object, tracked by multiple sensors and observed visually by trained aviators. \n\nWhat are we seeing? In a lot of cases, they can be explained away. But in a few, they're literally the name. Unidentified Flying Objects."},{"round":2,"name":"Liège, Belgium","lat":50.6326,"lon":5.5797,"country":"Belgium","continent":"Europe","story":"On ~June 24, 1374, in the German city of Aachen, people stepped into the streets and began to dance. Not in a good way. This wasn't a festival, and there was no music. They danced alone and in crowds, men and women and children, convulsing and leaping and screaming about visions of demons. It was uncontrollable.\n\nAnd then it spread. Week by week it moved town by town across the Rhine... Cologne, Maastricht, Utrecht, Metz, and Liège, and into what is now Belgium, where it took some of its deepest hold. The chroniclers who watched it happen called it St. John's Dance.\n\nIn modern times, we're pretty confident this happened. It was recorded across multiple regions, independently, at the same time. So what was it?\n\nThere's been 600 years of hypotheses. Perhaps ergot, the moldy-rye fungus that causes hallucinations and convulsions, had spread through the region. Except ergot also chokes off your blood supply, and you can't dance for days on a body shutting down.\n\nThe explanation most historians now favor is the strangest one ... mass psychogenic illness. The region had been suffering floods, famine, and plague. People held a deep belief that sinners could be cursed ... and that belief, in enough frightened people, made itself come true.\n\nToday is the Feast of Saint John, and today, we remember this event as St. John's Dance."},{"round":3,"name":"Verona, Italy","lat":45.4384,"lon":10.9916,"country":"Italy","continent":"Europe","story":"Henry Dunant, born May 8, 1828, in Geneva, Switzerland. His family was deeply involved in charity work. But he decided he wanted to be in business. By 1859, he was trying to expand his company in Algeria, and he wanted to ask Napoleon III for help. Napoleon was busy commanding an army in northern Italy, so Henry followed him there.\n\nToday, June 24, 1859, he arrived near here just as one of the century's bloodiest battles was ending. Nearly 300,000 soldiers had fought. Tens of thousands lay wounded with no one to care for them. Henry forgot about the deal. For days, he organized villagers to tend the wounded of every side. \n\nHe couldn't forget what he had seen. He wrote a book, 'A Memory of Solferino', and mailed it to every powerful person he could think of. It proposed a new, volunteer aid force to help in situations like these. Within four years, his idea had become the International Committee of the Red Cross. \n\nHenry's business collapsed. Bankrupt and disgraced, he was pushed out of the organization he had founded. He vanished into a Swiss village. 25 years later, a journalist found him there, old and poor, and the world realized the founder of the Red Cross was still alive. In 1901, he shared the first Nobel Peace Prize. \n\nHe never spent the Nobel money on himself. He gave it all away to charity, and he continued living simply the rest of his life."},{"round":4,"name":"Bandung, West Java, Indonesia","lat":-6.9175,"lon":107.6191,"country":"Indonesia","continent":"Asia","story":"June 24, 1982, Captain Eric Moody is flying a British Airways 747 over Indonesia, when his plane flies through a cloud of volcanic ash. This, it turns out, is not good for an airplane. He reached for the intercom, and announced \"Good evening, ladies and gentlemen. This is your captain speaking. We have a small problem. All four engines have stopped. We are all doing our damnedest to get them going again.\"\n\nVolcanic ash had entered the engines and melted in the combustion chambers. Then, that molten glass cooled and coated the inside of the turbine. Airflow ... well, didn't. Captain Moody was suddenly flying the world's heaviest, unpowered glider. But, it's still an airplane. From 37,000 feet, he knew he'd lose ~30 feet per second, so, he had ~20 minutes before gravity won.\n\nAs the plane descended, the glassy particles that had welded themselves to the turbine blades began to crack and break off. About 13 minutes later, the crew had gotten the engines going again. With the whole gravity thing solved, there was a new problem. The windscreen had been sandblasted by the ash ... it was now opaque. Oh, and it was late evening. Everything was dark.\n\nCaptain Moody successfully landed the plane in Jakarta ~45 minutes after the whole incident began. Everyone walked off. No injuries. \n\nWe don't fly planes through volcanic ash any more."},{"round":5,"name":"Cusco, Peru","lat":-13.5167,"lon":-71.9789,"country":"Peru","continent":"South America","story":"The word \"solstice\" comes from Latin for \"sun stands still\". In the days around June 21, the sun barely seems to move. It rises and sets in almost the same spot. For those in the Southern Hemisphere, this is the winter solstice. And ~500 years ago, the Inca Empire (1438–1532) watched this happen anxiously. They were worried the Sun might not return.\n\nBut by June 24, with the days starting to get longer, the Inca would celebrate. Each June in Cusco (which they believed was the center of the universe), the King (known as the Sapa Inca, the Son of the Sun) kindled a new sacred flame by focusing sunlight through a polished golden disk onto a piece of cotton. The fire was carried to the Temple of the Sun and used to relight the ceremonial fires across Cusco.\n\nWhen Spain conquered the Inca in 1532, this ritual was banned. For ~400 years, the festival survived mostly in one book, published in Lisbon in 1609, written from memory by a man named Garcilaso de la Vega. He was the son of a Spanish conquistador and an Inca princess.\n\nIn 1944, the ceremony was reconstructed from Garcilaso's account. An actor, Faustino Espinoza Navarro, composed the script in their ancient language, played the Sapa Inca himself, and performed the rituals at Sacsayhuamán (the great fortress above Cusco). \n\nThat tradition continues. Today, thousands of performers and hundreds of thousands of spectators gather beneath the ancient walls of Sacsayhuamán. And together they will pray for the Sun to return for another year."}],"2026-06-25":[{"round":1,"name":"Newport, Rhode Island","lat":41.4901,"lon":-71.3128,"country":"United States","continent":"North America","story":"Happy Seafarer's Day!\n\nThis is Joshua Slocum, born February 20, 1844, in rural Nova Scotia. He ran away as a teenager. He worked as a sailor for decades, working his way up from deckhand to captain. He commanded merchant ships all over the world, married, and raised a family.\n\nBy the 1890s engines were replacing sail on the trade routes, and Joshua's whole career went obsolete around him. He lost ships. At 51, near the end of his career, he was almost broke.\n\nA friend offered him a boat. It was called the Spray, but most people called it a wreck. Joshua rebuilt it by hand over thirteen months, plank by plank, for $553.62 ... just about every dollar he had left. In April 1895 he sailed out of Boston, alone.\n\nHe was gone more than 3 years. He started east and crossed the Atlantic. But when he ran into pirates near Gibraltar, he turned around, and crossed the Atlantic the other way, towards South America. He fought through the Strait of Magellan, then the Pacific. The Spray was balanced so finely it could hold its own course when he slept.\n\nHe reached Newport in June 1898, the first person ever to sail around the world alone. 46,000 miles (74,000 km). No engine. No radio (it hadn't been invented yet). Perhaps the most insane thing about this whole story is Joshua never learned to swim."},{"round":2,"name":"Panama City, Panama","lat":8.9824,"lon":-79.5199,"country":"Panama","continent":"North America","story":"Dougal Robertson, born January 29, 1924, in Edinburgh, Scotland. During World War II, his first wife and infant son passed away from illness. He remarried and became a dairy farmer.\n\nIn 1971, Dougal and his wife decided to sell the farm, buy a boat, and sail around the world with their 4 children. They spent more than a year sailing through the Atlantic and Pacific, visiting remote islands and crossing vast stretches of open ocean.\n\nJune 15, 1972, about 200 miles west of the Galápagos, a pod of killer whales attacked and damaged their ship. The boat sank in under 2 minutes.\n\nThey launched a small, inflatable life raft and a 9-foot dinghy. They grabbed what supplies they could before their boat sank, which wasn't a lot.\n\nFood became scarce. They caught fish and turtles. They collected rainwater whenever storms passed. 16 days in, the life raft gave out ... everyone into the dinghy. Dougal ran it like a captain, assigning routines and rations for everyone.\n\nNorth of the equator, the trade winds blow from the northeast. South of the equator, from the southeast. Right where they meet, near the equator, they cancel each other out, and the air has nowhere to go but up. Sailors called that band the 'doldrums', because a ship could get stuck there for weeks, going nowhere.\n\nHe sailed towards it. The doldrums are also a place where it is much more likely to rain, and that decision probably saved them. The rain brought the fresh water they needed to stay alive.\n\nThey stored up so much dried meat and water they were ready to start rowing for Panama. That day, they were found by a Japanese fishing boat. 38 days lost at sea.\n\n\"We pledged not to eat each other.\""},{"round":3,"name":"Cape Horn, Chile","lat":-55.9833,"lon":-67.2667,"country":"Chile","continent":"South America","story":"(this didn't fit next to Chile, had to move the text over here)\n\nMary Ann Brown, born April 6, 1837, in Massachusetts. When she was 16, she married Joshua Patten. He was a clipper captain, and he was gone a year at a stretch. Most captains' wives stayed ashore. Not Mary. The owners of his ship, Neptune's Car, let her come along.\n\nHer first voyage was from New York to San Francisco to China to London and then back home. 17 months in total. She learned everything she could while on board, and she had a gift for navigation. In July 1856, they sailed from New York for San Francisco again, racing two other clippers the whole way.\n\nThis trip didn't go well. Josh caught the first mate sleeping on watch. He was relieved of duty. It turned out the second mate couldn't read a chart. And then, as they reached Cape Horn (some of the most difficult waters on Earth), Josh collapsed with fever. He was delirious and in and out of consciousness.\n\nThat left one person aboard who could navigate. Mary. She was 19, and eight months pregnant.\n\nThe first mate tried to turn the crew, telling them to give up and put into a port in Chile. The crew stood by Mary.\n\nFor the next 18 days she fought the ship through the storms of the Horn, and she nursed Josh. After Cape Horn, she navigated them up the coast, calculating their position with her sextant. She commanded the crew, kept the logbook, and did her best to take care of her husband.\n\nNovember 15, 1856, she sailed through the Golden Gate and into San Francisco Bay. The harbor pilot offered to navigate the ship to dock ... she declined. She finished the job herself."},{"round":4,"name":"Babylon (modern day Iraq)","lat":32.5364,"lon":44.42,"country":"Iraq","continent":"Asia","story":"Happy National Handshake Day!\n\nThe oldest handshake anyone has found is carved into a slab of Assyrian stone. ~845 BC, Shalmaneser III, king of Assyria, grips the right hand of Marduk-zakir-shumi I, king of Babylon. This carving was the seal on their alliance ... two rulers, right hands clasped, as equals. The handshake looks exactly like one you might do today.\n\nWhere does the handshake come from? No one really knows. It's very likely to be much, much older than this ~2,900 year-old carving. The leading theory is that it started as proof you weren't armed. You extend your open right hand, showing there is no weapon in it. The other person does the same thing.\n\nBut it isn't universal. In Japan you bow, and the depth of the bow says everything. Across India and Nepal you press your palms together and say namaste. And in parts of Tibet, the old greeting is to stick out your tongue ... supposedly to prove you weren't the reincarnation of a cruel king who was said to have a black one."},{"round":5,"name":"Nukuʻalofa, Tonga","lat":-21.1394,"lon":-175.2047,"country":"Tonga","continent":"Oceania","story":"In 1965, six boys at St Andrew's, an Anglican boarding school in Nukuʻalofa, were bored, sick of school, and sure they could do better on their own. So one night they \"borrowed\" a 24-foot fishing boat, loaded a few bananas and a sack of coconuts, and set out for Fiji. Or maybe New Zealand. Whichever came first.\n\nLuke Veikoso, Sione Fataua, Tevita Fatai Latu, Tevita Siolaʻa, Kolo Fekitoa, and Sione Filipe Totau were 13 to 17 years old, and none of them knew how to sail. But really ... how hard can it be?\n\nThey hit a storm on their first night. The sail and the rudder were both broken. They drifted 8 days with almost nothing to eat and no water, until they landed at ʻAta, an uninhabited island.\n\nWe've all read 'Lord of the Flies', right? These 6 apparently hadn't. They built. They caught wild chickens, planted a garden, and hollowed out tree trunks to collect rainwater. They kept a fire burning for 15 months (it went out once in the rain). When one boy broke his leg, the others splinted it and covered his chores. For arguments they made a rule ... whoever was angry walked to the far side of the island until he cooled off, then came back and apologized.\n\nIn September 1966 an Australian fisherman, Peter Warner, sailed past and noticed scorched patches on the cliffs. A boy swam out to meet his boat ... \"We are from Tonga!\" he shouted. Their families had given up hope. Funerals had been held. They were friends for the rest of their lives."}],"2026-06-26":[{"round":1,"name":"Glasgow, Scotland","lat":55.8642,"lon":-4.2518,"country":"United Kingdom","continent":"Europe","story":"William Thomson, born June 26, 1824, in Belfast. His father was a math teacher and recognized William was a prodigy right away. William enrolled at the University of Glasgow at age 10. He was a physics professor by 22.\n\nBy his thirties, he was already one of Britain's leading scientists ... helping lay the foundations of thermodynamics, working out an absolute scale of temperature, and making discoveries about heat, energy, and electricity.\n\nMost scientists of the era studied nature. William liked solving problems. He had a reputation for cracking challenges other people called impossible. In the 1850s, perhaps the biggest challenge was stretching a telegraph cable across the Atlantic. Every attempt failed. The signal vanished before it reached America. Engineers thought it was impossible. \n\nWilliam showed the signal was still there, just incredibly faint. He invented instruments sensitive enough to hear the whisper of what was left. In 1866, after more than a decade of setbacks, a permanent cable finally linked the two continents. Messages that once took weeks now arrived in minutes.\n\nWhen Queen Victoria made him a lord, he chose his title from the small river that flowed past his laboratory in Glasgow. We mostly remember him as Lord Kelvin."},{"round":2,"name":"Berlin, Germany","lat":52.52,"lon":13.405,"country":"Germany","continent":"Europe","story":"After World War II, the Allies split Germany into four zones. Berlin was inside the Soviet zone, but it was also split in the same way. The plan was to rebuild both the city and the country, and reunite it. Instead the alliance fell apart ... the West moved toward capitalism, the Soviets toward communism, and neither would let go of Berlin.\n\nOn June 24, 1948, the Soviets cut all access into West Berlin. They wanted to unite Berlin as a single city under Soviet control. And since the city was deep in the Soviet zone, cutting access was going to be a quick way to force the issue. \n\n~2 million people lived in the city at the time. To survive, they needed about 4,500 tons of supplies a day. Everyone agreed that was impossible by air. But it was the only option. And today, June 26, the US started flying planes of supplies every day into Berlin. The pace picked up. Every day became every hour. Then every hour became every minute. At peak, planes were landing less than a minute apart, day and night, in any weather.\n\nOne of the pilots was Gail Halvorsen. After landing a plane, Gail saw ~30 kids watching from outside the fence. He had two sticks of gum in his pocket ... he broke them into pieces, and passed them to the kids. A girl asked how they'd know which plane was his. \"I'll wiggle my wings\", he said.\n\nFrom then on, Gail wiggled his wings on every approach. He tied chocolate bars to handkerchiefs, and dropped them on his approach. The kids called him Uncle Wiggly Wings. Word got back to America, and people mailed in candy by the ton. Gail ended up dropping 23 tons of it over Berlin on a quarter-million parachutes.\n\nEleven months later, the Soviets gave up and lifted the blockade."},{"round":3,"name":"Toronto, Canada","lat":43.6532,"lon":-79.3832,"country":"Canada","continent":"North America","story":"Edith (Edie) Windsor, born June 20, 1929, in Philadelphia. Her family was poor ... they had lost everything in the Depression. Edie loved math. She earned a master's from NYU and went to work programming some of the first computers. In 1951 she got married ... but the marriage ended within a year. She was honest with her husband. She told him she wanted to be with women.\n\nIn 1963, she met a young psychologist named Thea Spyer. They went back to Thea's apartment and danced all night. In 1967, Thea proposed ... with a circular diamond brooch instead of a ring, because a ring would have been a problem. Edie worked at IBM, and wearing a ring would invite questions she couldn't answer.\n\nIn 1977, Thea was diagnosed with multiple sclerosis. Her condition worsened. Eventually, she was paralyzed. By 2007, Thea was a quadriplegic. The news from the doctors was not good. After 40 years together, they suddenly faced that they had perhaps a year left. \n\nThea still wanted to get married. But in 2007, it was still illegal in New York. They flew to Toronto and married there.\n\nThea passed away in 2009. She left everything she had to Edie.\n\nFederal law did not recognize their marriage. So neither did the IRS. The IRS billed Edie $363,053 in estate taxes. If they had been legally married, she would owe nothing. Edie sued.\n\nToday, June 26, 2013, the US Supreme Court ruled in her favor, and exactly two years later, June 26, 2015, the Court made same-sex marriage legal across the country."},{"round":4,"name":"Accra, Ghana","lat":5.6037,"lon":-0.187,"country":"Ghana","continent":"Africa","story":"Smallpox is one of the oldest, and most deadly diseases humans have ever faced. It left scars on Egyptian mummies. It killed about a third of everyone who caught it. Survivors were often blind and disfigured. For thousands of years there was nothing to be done.\n\nThe names we remember for beating it are European. Edward Jenner, an English country doctor, gets the credit for the vaccine in 1796. His idea was to give someone a mild dose, so the body learns to fight the rest. But that idea was much, much older than Edward.\n\nOnesimus was born in West Africa in the late 1600s. He was captured, made a slave, and sent to Boston in the early 1700s. Cotton Mather, a minister, bought him. Years later, Mather asked Onesimus if he had smallpox. Onesimus answered \"Yes and No\", and showed him a scar on his arm. He explained the process ... take fluid from a mild case, make a small cut, put in a drop.\n\nThat was ~1716 (33 years before Jenner was born). Smallpox hit Boston in 1721. On June 26, 1721, a doctor named Zabdiel Boylston decided to try it, including on his son. 247 people were inoculated ... 6 died (~2%). But in the Boston outbreak, 14% of those who caught smallpox would perish, and those inoculated were protected. \n\nOnesimus hadn't invented any of it. He'd learned it back home, in West Africa. We don't know how far back the knowledge went. Likely generations. Maybe centuries."},{"round":5,"name":"Port Vila, Vanuatu","lat":-17.7333,"lon":168.3273,"country":"Vanuatu","continent":"Oceania","story":"The Sa people live on the southern half of Pentecost Island, in the South Pacific nation of Vanuatu. For at least 500 years, during the yam harvest (April - June), the men of the Sa have climbed a ~100 foot (30 meter) tower of wood and vines, said a prayer, and jumped headfirst. Directly over the ground. The only thing they had to slow them down was two fresh vines lashed to their ankles, measured to stop them inches above the dirt. They call the ritual the Naghol.\n\nAccording to Sa legend, a woman invented it. Her name was Melu. Her husband, Tamalie, was apparently terrible. One day, Melu ran into the jungle. He chased her. She climbed the tallest banyan tree she could find, lashed two vines around her ankles, and waited. When Tamalie came up the tree, Melu jumped. He jumped too ... without the vines. Husband problem solved.\n\nIn 1979, a few Oxford students who'd seen a BBC documentary about it decided to use elastic cords and jump off the Clifton Suspension Bridge in Bristol ... in tuxedos. A New Zealander named A.J. Hackett heard about that, and decided to bungee-jump off the Eiffel Tower, today, June 26, 1987. He opened the world's first commercial bungee site in Queenstown the next year."}],"2026-06-27":[{"round":1,"name":"Göttingen, Germany","lat":51.5413,"lon":9.9158,"country":"Germany","continent":"Europe","story":"Sophie Germain, born April 1, 1776, in Paris. Her father was a successful silk merchant. In 1789, the French Revolution made the streets of Paris dangerous. Sophie was 13, and she stayed inside. What does a bored 13-year-old do while the French Revolution is going on outside? Why, she reads her father's library, of course. Her biggest interest was math.\n\nHer parents hated this plan. To stop her studying at night, they took away her candles, her fire, even her clothes. She studied anyway, wrapped in blankets, until they found her one morning asleep at her desk. She taught herself Latin and Greek so she could read Newton and Euler.\n\nWhen Paris opened an elite engineering school, the École Polytechnique, women were not allowed to attend. Sophie got the lecture notes anyway. She studied them alone and submitted her work under a man's name, Monsieur LeBlanc. The papers were so impressive that Joseph-Louis Lagrange, one of the most famous mathematicians in Europe, asked to meet the student. He expected a young man. Instead, he found Sophie. He became her champion.\n\nShe went on to produce the most important advancement on Fermat's Last Theorem in more than a century. She became the first woman to win a prize from the French Academy of Sciences.\n\nCarl Friedrich Gauss, based here at the University of Göttingen in Germany, admired her work so much that he arranged for his university to award her an honorary doctorate. She passed away before it could be conferred (today, June 27, 1831).\n\n\"A woman, because of her sex, encounters infinitely more obstacles than men ... yet [when she] overcomes these and penetrates that which is most hidden, she doubtless has the most noble courage, extraordinary talent, and superior genius.\""},{"round":2,"name":"Kyiv, Ukraine","lat":50.4501,"lon":30.5234,"country":"Ukraine","continent":"Europe","story":"In 2017, most businesses in Ukraine ran their taxes through a program called M.E.Doc. You generated reports and filed with the government. On June 27, 2017, it pushed out an update, and thousands of customers installed it, the way they had many times before.\n\nThe update was poisoned with malware. Once inside the network it moved fast, stealing passwords and jumping machine to machine. Within hours, banks, airports, government offices, supermarkets, and power companies across Ukraine were going dark. Screens showed a ransom note demanding Bitcoin. \n\nThe malware was called NotPetya. It pretended to ask for money but wasn't really asking for anything. It scrambled data in ways that could never be undone ... paying changed nothing. It was clearly aimed at being as disruptive as possible to Ukraine.\n\nIt did not stay in Ukraine. In hours it was everywhere. FedEx parcels stopped moving. Factories and hospitals went offline. Maersk, the company that moves ~20% of everything shipped on Earth, simply stopped. 49,000 laptops were wiped. All 147 of its domain controllers were infected.\n\nThe recovery team discovered every backup was gone too. They needed just one clean copy to rebuild from, and there wasn't one ... until someone remembered Ghana. The office there had lost power during the attack. One server was off the network and powered down. It was still clean. \n\nA staffer flew the drive from Accra to Lagos, handed it to a colleague boarding a flight to London, and they carried the entire surviving identity of a global shipping empire in their hand luggage. From that one server, they rebuilt 4,000 servers and 45,000 PCs. \n\nIn total, NotPetya is estimated to have done ~$10b in global damage."},{"round":3,"name":"Brisbane, Australia","lat":-27.4698,"lon":153.0251,"country":"Australia","continent":"Oceania","story":"Today, June 27, 2006, the first TED Talk is published on YouTube. I think that makes today TED Talk Day! Sadly, I am the only person I know who celebrates TED Talk Day. Probably because I made it up.\n\nThis is one of the most entertaining TED Talks. Tom Thum, born April 1 (or maybe 2), 1985, in Brisbane. Tom couldn't sit still. He started in graffiti art first, then breakdancing, and finally, beatboxing. In 2003, he was a freshman earning a psychology degree, when he thought 'What am I doing here? I'm a hyperactive graffiti writer in a room full of aspiring cops.'\n\nSo he dropped out and bet everything on the one thing he was great at. Two years later he won a world beatbox team title in Leipzig. He spent five years touring the world with Tom Tom Crew (2007 - 2012), a hip-hop circus of acrobats and musicians. \n\nPeople asked him if he was making a living beatboxing. He replied, I'm making a 'not dying'. Between tours, he lived back with his parents in Brisbane.\n\nIn May 2013, he did TEDx ...  and it is one of the most watched TED Talks ever. Tap this text to jump over to it."},{"round":4,"name":"Utqiagvik (Barrow), Alaska","lat":71.2906,"lon":-156.7886,"country":"United States","continent":"North America","story":"The Arctic sunshine can be brutal. Snow reflects sunlight in every direction. It can do real harm, too. A condition called snow blindness can last for days, where the cornea gets an actual sunburn from over-exposure.\n\nThe Inuit people carved a solution. These goggles, called iggaak, have been found across Siberia, Canada, Alaska, and Greenland. They work by letting in a limited amount of light. The narrow opening has another side effect ... it sharpens your vision too. If you've ever been to the eye doctor, sometimes they hold up a disc full of holes and, when you look through it, your vision sharpens.\n\nIn other words, it improves your long-distance vision by narrowing the aperture. Like a camera lens. Iggaak are remarkably sophisticated optical devices ... made without optics. They're carved from ivory, bone, antler, or wood, and shaped to fit snug against the face. \n\nHappy National Sunglasses Day! Modern sunglasses are only about 100 years old. But the Inuit first solved this problem nearly 2,000 years ago."},{"round":5,"name":"Djibouti City, Djibouti","lat":11.5721,"lon":43.1456,"country":"Djibouti","continent":"Africa","story":"Happy Independence Day, Djibouti!\n\nToday, June 27, 1977, Djibouti became independent from France. The outlook wasn't especially promising ... The country was mostly desert. It had few natural resources. The total population was under half a million. And the neighborhood is pretty unfriendly ... larger and more powerful countries on all sides.\n\nBut Djibouti sits in an ideal location, next to the Bab-el-Mandeb Strait. This is a narrow waterway between the Red Sea and the Indian Ocean. Ships traveling between Europe and Asia pass through, and Djibouti is a convenient port. It is also a convenient place to ship goods to its neighbors, like Ethiopia, one of Africa's largest countries.\n\nIn the late 1800s, the French built a railway from the coast inland to Addis Ababa. Over time, that connection became vital. More than 90% of Ethiopia's trade moves through Djibouti's ports. Trains carry containers from the Ethiopian highlands to the sea. Ships carry them to the rest of the world.\n\nWhen Djibouti became independent in 1977, many people saw a small desert country with few obvious advantages. Nearly fifty years later, it has become one of the most strategically important crossroads in Africa."}],"2026-06-28":[{"round":1,"name":"Charleston, South Carolina","lat":32.7765,"lon":-79.9311,"country":"United States","continent":"North America","story":"In April 1775, fighting broke out between the American colonies and the British Empire. It was a strange sort of war ... most colonists weren't trying to create a new country. They considered themselves loyal British subjects, fighting against higher taxes and restrictions on self-government. Again and again, they petitioned the king, insisting their rights had been violated. They were not asking for independence.\n\nBy the summer of 1776, the fighting had been raging for more than a year. British forces had been driven out of Boston. They turned south, toward Charleston, the richest port below Virginia. Guarding the harbor was a half-built fort on Sullivan's Island, built from palmetto logs packed with sand. It looked like an easy victory.\n\nToday, June 28, 1776, nine British warships opened fire. Rather than splinter, the soft logs absorbed the cannonballs ... and the sand swallowed the rest. Low on powder, the defenders fired slowly, four guns at a time. They tore the fleet apart. By nightfall, the Royal Navy was retreating.\n\nJust 6 days later, Congress declared the colonies a new nation."},{"round":2,"name":"Athens, Greece","lat":37.9838,"lon":23.7275,"country":"Greece","continent":"Europe","story":"By 2011, Greece was drowning in debt. Years of heavy government borrowing, weak tax collection, and then the global financial crisis combined into an investor panic. Interest rates soared. Greece is part of the European Union ... if it defaulted, it might crack the euro itself. Europe and the IMF offered a rescue, but with hard conditions. Slash spending. Raise taxes. Overhaul the economy.\n\nTo many Greeks, it felt like bankers and politicians had made the mess, and everyone else was paying the bill. Wages had already dropped, unemployment was climbing, and services were being cut. Today, June 28, 2011, a general strike shut much of the country down. Protesters packed the square outside parliament. It got violent. \n\nInside, lawmakers debated an austerity package. Outside, people saw the vote as a choice between hardship and humiliation. The next day, the package passed (155 to 138). There were no celebrations. The crisis was far from over, and the worst of the pain still lay ahead.\n\nWas it the right call? It is 15 years later, and it is still debated. Greece never left the euro, the eurozone held, and by 2023 the country was growing faster than most of Europe. But the price was enormous. Greece went through a difficult depression. The economy shrank by 25%. Unemployment hit 27%. Hundreds of thousands of young Greeks left to find work abroad."},{"round":3,"name":"Port-au-Prince, Haiti","lat":18.5944,"lon":-72.3074,"country":"Haiti","continent":"North America","story":"Yvonne Sylvain, born June 28, 1907, in Port-au-Prince. Her father was a lawyer and diplomat, and she was the 6th of 7 children. Growing up, the dinner-table conversation was about politics and education. She trained as a teacher, and graduated with a degree in ~1929. She was also a painter, and by 1932 she was having regular exhibitions. \n\nIn 1935, her mother died. Yvonne said the helplessness she felt caused her to change the course of her life. She decided to switch careers, and become a doctor. At 28, she became the first woman ever admitted to the University of Haiti's medical school. 5 years later, she became the first woman in Haiti to graduate with a medical degree.\n\nShe specialized in obstetrics and gynecology at the General Hospital in Port-au-Prince. She published research on Haiti's high infant mortality, trying to understand and improve the conditions for mothers and babies. Later, she returned to the University of Haiti, this time as a professor. She spent the rest of her career teaching and training doctors, including the dozens of women who came after her."},{"round":4,"name":"Vientiane, Laos","lat":17.9757,"lon":102.6331,"country":"Laos","continent":"Asia","story":"Between 1964 and 1973, the US dropped more than 2 million tons of bombs on Laos ... more than it had dropped in all of World War II, combined. A planeload fell every ~8 minutes, day and night, for 9 years. It made Laos the most heavily bombed country in history.\n\nAlmost no one in America knew. The US and Laos were not at war. Congress had never approved it. Most of Congress didn't even know about it. The CIA ran one of the world's most intense bombing campaigns in complete secrecy. \n\nDaniel Ellsberg, a Harvard PhD economist, was working at the Pentagon. He was assigned to analyze the progress of the Vietnam War. He realized that not only was the US losing the war, but it was consistently lying to the public about it. And the war had expanded into neighboring Laos. He photographed his work, and leaked it to the New York Times. They began to publish it June 13, 1971. Today, June 28, 1971, Daniel turns himself in. \n\nThe government asked the Supreme Court to prohibit the NYT from publishing any further. June 30, 1971, the Supreme Court disagreed. Justice Hugo Black said the whole point of the First Amendment was to prevent the government from suppressing information. Even if it was information it didn't like."},{"round":5,"name":"Ouagadougou, Burkina Faso","lat":12.3714,"lon":-1.5197,"country":"Burkina Faso","continent":"Africa","story":"William (Bill) Campbell, born June 28, 1930, in Ramelton, a small village in Ireland. He grew up and studied one of the least glamorous fields in science ... parasites. Worms that live inside other creatures. \n\nHe studied zoology, then moved to the US to work at Merck. It wasn't flashy work, but farmers lose billions every year to parasitic worms and the existing treatments were not good.\n\nIn the 1970s, Bill began working with a compound discovered by a Japanese scientist, Satoshi Ōmura. Satoshi had discovered a bacterium that made a chemical deadly to parasites. Bill refined it into a new drug, ivermectin.\n\nThis worked incredibly well. And surprisingly, it also worked against parasites that caused human diseases, such as river blindness and lymphatic filariasis. These illnesses had plagued millions of people across Africa and parts of Asia, especially here in Burkina Faso.\n\nMerck donated the drug free of charge for these illnesses, \"As much as is necessary, for as long as necessary\". It was one of the largest pharmaceutical donations in history, and it has helped prevent blindness and disability for hundreds of millions of people.\n\nBill and Satoshi shared the 2015 Nobel Prize in Medicine."}],"2026-06-29":[{"round":1,"name":"Chicago, Illinois","lat":41.8781,"lon":-87.6298,"country":"United States","continent":"North America","story":"Vivian Maier, born February 1, 1926, in New York City. Her mother was French, her father was Austrian. We don't know a lot, but it seems like the marriage broke down early. Throughout her childhood, her mother moved back and forth between the US and France.\n\nIn her early 20s, she got her first camera, a Kodak Brownie box camera. It was about as basic as a camera could be. One shutter speed. No focus control. In 1952, she bought her first Rolleiflex. This was a waist-level camera you looked down on, instead of holding it up to your eye. There was a big advantage ... people didn't pay attention to her. She was looking down.\n\nShe spent the next 40 years as a nanny, mostly in Chicago. On her days off, she walked the city and photographed everything ... children, shop windows, her own face in a passing mirror. She took ~150,000 pictures. She showed them to no one. Thousands of rolls were never even developed.\n\nIn 2007, she was 81 years old, and she fell behind on her payments for a storage locker. The contents were auctioned off. John Maloof bought a box of her negatives for $380, for a book on his Chicago neighborhood. He set them aside. Two years later, he eventually developed them ... the same week Vivian Maier passed away.\n\nHe started posting her photographs online. Within a few years, galleries were calling Vivian one of the greatest street photographers of the twentieth century. Her photos are just extraordinary ... tap this link and her website will open in another page. I think you'll love them.\n\nHappy National Camera Day!"},{"round":2,"name":"Cupertino, California","lat":37.3229,"lon":-122.0322,"country":"United States","continent":"North America","story":"Steve Jobs announced the iPhone in January 2007. It was beautiful. It also barely worked at all.\n\nThe software was so unstable that the engineers had scripted a single safe path through the demo ... the exact order of taps Jobs had to follow, every time, or the phone would freeze in front of everyone. Engineers had backup phones to swap in mid-show in case one of them froze. They hard-coded the UI to show full strength signal bars, in case the connection died. And they sat in the fifth row and passed around a flask of scotch.\n\nCompetitors were not worried. Steve Ballmer, who ran Microsoft, laughed. \"Five hundred dollars? That is the most expensive phone in the world, and it doesn't have a keyboard.\" The leadership at BlackBerry were certain nobody would type on glass. Nokia thought the price was simply much too high. It didn't stand a chance.\n\nToday, June 29, 2007, it went on sale. People had slept on the sidewalk for days. The top end phone cost $599, and Apple sold 270,000 of them in the first thirty hours.\n\nBlackBerry's stock fell from about $148 a share to under $7. Nokia sold its phone business to Microsoft ... then soon after, Microsoft wrote off nearly all of it.\n\nApple has sold more than 3 billion iPhones since it was introduced."},{"round":3,"name":"Perth, Australia","lat":-31.9523,"lon":115.8613,"country":"Australia","continent":"Oceania","story":"In 2009, educators from around the world gathered in Belfast, Northern Ireland, for a conference on early childhood education. One was Gillian McAuliffe, from Perth, Australia. She complained that children there rarely played in mud. Perth sits on sandy soil, and many parents disliked the idea of kids getting dirty.\n\nBishnu Bhatta from Nepal was there. He laughed a little at that problem. Nepal had plenty of mud. The issue was that children couldn't afford to play in it. They didn't have spare clothes to ruin. They needed to protect the few clothes they owned so they could attend school.\n\nBack in Australia, Gillian told the story to her students. They were stunned. Together, they raised about $1,000 in just a few weeks and sent it to Nepal.\n\nThe money bought clothes, and a meal with meat for orphaned children who hadn't had one in months. Then Bishnu took them out to a muddy field. Nobody wanted to jump in at first ... so he jumped in himself. That was all it took ... children piled in right behind him and began splashing around.\n\nSoon after, children in Australia and Nepal celebrated a \"Mud Day\" together, thousands of miles apart. No speeches. No politics. Just children running, slipping, laughing, and completely covering themselves. The idea spread. Today, June 29, International Mud Day is celebrated around the world.\n\nI think this might be my favorite holiday ever. I am hard pressed to think of anything that exudes more joy than seeing a child unreservedly playing in mud."},{"round":4,"name":"Lahore, Pakistan","lat":31.5497,"lon":74.3436,"country":"Pakistan","continent":"Asia","story":"Margaret Bourke-White, born June 14, 1904, in the Bronx. Her father was fascinated by technology and often took things apart to understand how they worked. He introduced her to photography when she was young, and she learned how cameras worked, how film was developed, and how careful observation mattered. He passed away suddenly when she was 18.\n\nShe graduated from Cornell in 1927, and became a photographer. She was the first staff photographer at Fortune Magazine, and the first female photographer of LIFE ... In 1936 her picture of a Montana dam ran on the cover of the very first issue of LIFE.\n\nShe was one of the first female war photographers. She flew on combat missions, crossed oceans with troops, and photographed battles from North Africa to Germany. In 1945, she photographed the newly liberated Buchenwald concentration camp. Her images helped show the world what had happened there.\n\nShe photographed Gandhi at his spinning wheel, the refugee crisis that resulted from the partition of India and Pakistan, and the rebuilding of Europe. By the end of her career, she had photographed some of the defining moments of the 20th century.\n\n\"Nothing attracts me like a closed door. I cannot let my camera rest until I have pried it open.\""},{"round":5,"name":"Baikonur, Kazakhstan","lat":45.92,"lon":63.342,"country":"Kazakhstan","continent":"Asia","story":"In 1971, the Soviet Union launched humanity's first space station. It was called Salyut 1. Getting there was difficult. The first crew reached the station, but couldn't get the docking mechanism to seal properly. Georgy Dobrovolsky, Viktor Patsayev, and Vladislav Volkov, aboard Soyuz 11, successfully docked and boarded Salyut 1 on June 7.\n\nFor 23 days they lived in orbit. They exercised, ran experiments, and proved that humans could stay in space for weeks at a time. When they left, they were heroes. They had set a world record for the longest spaceflight in history.\n\nSoyuz 11 undocked and began its return to Earth. About 100 miles (160 km) above the planet, explosive bolts separated the spacecraft's modules when one small valve was jarred open. The capsule began to depressurize. Air rushed into space.\n\nThis capsule was tiny. Engineers had decided the crew would fly without pressure suits. The three men had perhaps 30 seconds of useful consciousness. They knew something was wrong, and they knew they had only moments to fix it ...\n\nToday, June 29, 1971, their capsule landed in Kazakhstan. Recovery crews opened the hatch expecting celebration. Tragically, all three had died in space. Evidence suggests Viktor Patsayev had tried to reach the leaking valve. He simply ran out of time.\n\nThis is the only time humanity has ever lost someone in space. Astronauts have been killed during launch, during re-entry, and on the ground. But only Georgy, Viktor, and Vladislav have died beyond Earth's atmosphere, exposed to the vacuum of space.\n\nSince this accident, every Soviet launch has required pressure suits. America adopted this in 1988, after the loss of the Challenger Space Shuttle."}],"2026-06-30":[{"round":1,"name":"Anglesey, Wales, United Kingdom","lat":53.2787,"lon":-4.1427,"country":"United Kingdom","continent":"Europe","story":"If civilization ended, and you need to make something simple ... like, say, a toaster ... how long would it take? In 2009, Thomas Thwaites, a design student in London, set out to build one from scratch. He bought the cheapest toaster he could find (for £3.94), and took it apart. \n\nInside were 404 separate pieces, made of dozens of materials. But there were just 5 core materials: steel, copper, mica, nickel, and plastic. He went to work. He dug iron ore out of an old mine in the Forest of Dean and smelted it in his mother's backyard, following instructions from a 15th-century book.\n\nHe went to the Scottish Highlands for mica. He came here, to Anglesey, where the water inside an abandoned copper mine is still so acidic that it dissolves copper from the surrounding rock. He hauled jugs of it home and pulled the metal out with electricity. He used the copper to cast the pins of the plug.\n\nNine months and nearly 2,000 miles later, he had a toaster. Sort of. It was lumpy and looked kind of like a sloppy cake. It had cost him a total of £1,187 to build.\n\nHe plugged it in. It worked for about 5 seconds, then melted.\n\nFor his next project, I suggest he makes an iPhone."},{"round":2,"name":"Mount Rushmore, South Dakota","lat":43.8791,"lon":-103.4591,"country":"United States","continent":"North America","story":"In the 1860s, American settlers pushed west toward the Montana gold fields. Many traveled the Bozeman Trail, which cut straight through Lakota hunting grounds. Fighting broke out, and the US Army moved in to protect the travelers.\n\nThe Lakota, Northern Cheyenne, and Northern Arapaho fought back. They attacked forts, ambushed soldiers, and they made the trail impassable. It went badly enough that the United States decided it wasn't worth the fight.\n\nThe Fort Laramie Treaty of 1868 guaranteed the Black Hills to the Lakota. It was one of the few treaties in American history where the United States largely accepted Native terms ... the Army withdrew, the trail closed, and the Lakota agreed to peace. \n\nSix years later, gold was found in the Black Hills. The government offered to buy the land ... but the Lakota refused. The US Army invaded, won the war, and captured the territory. 50 years later, in 1925, this area was chosen for a new monument. For the Lakota, this land is sacred. They call the hills Pahá Sápa. The mountain selected for the monument is known to the Lakota as the Six Grandfathers. We call it Mount Rushmore.\n\nThe Lakota took their case to court. It took decades. Today, June 30, 1980, the Supreme Court ruled that the Black Hills had been stolen, and awarded the Lakota millions in compensation. With interest, that settlement is now worth more than $1 billion.\n\nIt is sitting in an account, untouched. The Lakota don't want money. For 160 years, their position has been consistent. The Black Hills were never for sale."},{"round":3,"name":"Mérida, Yucatán, Mexico","lat":20.9674,"lon":-89.5926,"country":"Mexico","continent":"North America","story":"~66 million years ago, an asteroid six to nine miles wide struck the coast of what is now the Yucatán Peninsula, near the town of Chicxulub. It hit with the force of billions of nuclear bombs and ended ~ three-quarters of all life on Earth, including the dinosaurs. The impact itself killed everything within a few hundred miles.\n\nDust and soot from the impact filled the sky. Debris blocked sunlight for months to years, collapsing photosynthesis and the food chains that relied on it.\n\nWhat would happen today? Humanity would probably survive. But civilization probably wouldn't. In the last 50 years, we've become a far harder species to kill off ... at least by an asteroid."},{"round":4,"name":"Krasnoyarsk, Siberia, Russia","lat":56.0153,"lon":92.8932,"country":"Russia","continent":"Europe","story":"On the morning of June 30, 1908, over the Siberian wilderness (orange pole), witnesses saw a fireball they described as brighter than the sun. Moments later, a shockwave exploded across the region, knocking people off their feet and shattering windows miles away. The land was so remote that almost no one investigated.\n\nThat summer, the night skies over Europe refused to go dark. In London and Paris, people read newspapers outdoors at midnight and photographers worked without lamps. We think it was because of this explosion, blasting dust and ice high into the atmosphere.\n\nNearly 20 years passed before Russian mineralogist Leonid Kulik finally reached the site, expecting a giant crater. There wasn't one. Instead, he found more than 80 million trees flattened across 800 square miles, splayed outward. At the very center, a stand of trees still stood upright ... stripped of branches and bark, but rooted in place. The asteroid had exploded in the atmosphere, and the force went downward and out. \n\nIt was small, perhaps 160 feet (50 m) across, and it had detonated miles above Siberia with the force of a large nuclear weapon. But almost no one was injured ... because luckily, it happened over a forest the size of a city, instead of an actual city."},{"round":5,"name":"Santa Cruz de Tenerife, Canary Islands, Spain","lat":28.4636,"lon":-16.2518,"country":"Spain","continent":"Europe","story":"Brian Harold May, born July 19, 1947, in Hampton, just west of London. His father, Harold, was a tinkerer, and when Brian wanted an electric guitar the family couldn't afford, the two of them built one together, carving it from the wood of an old fireplace. Brian played it with a coin instead of a pick, called it the Red Special, and never stopped playing it.\n\nHe was a serious student, too. He won a scholarship to grammar schoo
