em carefully, placing something tiny inside, and seeing if a pearl would grow. \n\nThe answer was no. They kept trying ... for 5 years. Then a red tide (an algae) swept through and killed nearly every oyster they had. They started over. \n\nToday, July 11, 1893, Ume hauled up one of the surviving baskets, opened an oyster, and found it ... a small half-sphere of pearl. \n\nUme passed away suddenly when she was 32. Kōkichi became a single dad of 5 children. He never gave up ... it would take another 12 years to master the technique. \n\nWhat was the key insight? Kōkichi believed (and he was right) that you can persuade an oyster to make a pearl. How? By carefully placing a tiny bit of an oyster shell (mother-of-pearl) into the oyster. \n\nBy the early 1920s, he'd mastered it. Kōkichi could reliably produce high-quality pearls in huge volumes, and pearls that had once been among the rarest luxuries on Earth had suddenly become affordable to millions of people."},{"round":4,"name":"Nanjing, Jiangsu, China","lat":32.0603,"lon":118.7969,"country":"China","continent":"Asia","story":"Ma He, born ~1371, in Yunnan, China. His childhood was disrupted by war. In 1381, when Ming forces conquered Yunnan, Ma was captured. Captured boys were often castrated, and sent to serve in the household of a prince. Ma proved to be smart, capable, and fiercely loyal. Over the course of years, he became one of the prince's most trusted advisors.\n\nIn 1402, Prince Zhu Di seized the throne after a civil war and became Emperor. He granted Ma He the imperial surname Zheng, a rare honor that marked him as one of the emperor's most trusted servants.\n\nChina was rich, powerful, and largely unknown beyond Asia. Zhu Di wanted the world to know who ruled the Middle Kingdom. The Emperor assembled a vast fleet, carrying diplomats, soldiers, translators, doctors, craftsmen, and treasure. 317 ships with ~28,000 men. At the time, it was the largest naval expedition in history.\n\nToday, July 11, 1405, the fleet sets sail. Zheng was put in charge. He didn't make one journey ... over the course of 7 voyages, the fleet reached India, Arabia, and the coast of Africa. They came back with ambassadors, treaties ... and animals, including a giraffe. Many Chinese believed it was a qilin, a mythical creature whose appearance signaled the reign of a wise ruler.\n\nI think the scale of his fleet is almost impossible to imagine. 28,000 people is the size of a town. If men consumed just 1 kg (2.2 lbs) of food per day, that's 28 metric tons. A day. A six-month voyage would need thousands of tons of provisions. And it must have been an awe-inspiring sight to see Zheng sailing in with hundreds of ships. It would be nearly 200 years before another fleet could compare (the Spanish Armada)."},{"round":5,"name":"Niamey, Niger","lat":13.5127,"lon":2.1126,"country":"Niger","continent":"Africa","story":"Happy World Population Day!\n\nThe population of Earth began to skyrocket in the 1950s. It took thousands of years to get to 1 billion people on the planet (1804), then just 123 years to get to 2 billion (1927). In recent history, humanity has grown by another billion people every ~12 years.\n\nBut current projections show a dramatic change. 9 billion is expected in ~2037. 10 billion? Well ... it's unclear if we'll get to 10 billion. \n\nWhy is growth slowing down? There's a high correlation between education and lower birthrates. When girls go to school, families shrink. Everywhere, in every culture. India has gone from 6 children per woman to 2. South Korea fell from 6 children per woman to less than 1. Brazil fell from 6 to under 2.\n\nThere are still areas with very high birth rates, like here in Niger. About 6 children are born per woman. It also has one of the lowest literacy rates ... ~1 in 4 women can read.\n\nThe United Nations now expects the world's population to peak later this century. Japan's population peaked in 2008 and has been shrinking ever since. China's population has been declining since 2022.\n\nThere used to be huge debates in the 1960s and 70s about whether the Earth could support 4 billion people. Apparently, it can. But as birth rates decline, and people live for longer, there's a new problem ... most countries built social benefits in a time when populations were growing. Social security, healthcare, retirement funds ... these all presume a working class population that is larger than the retired class.\n\nToday, Japan sells more adult diapers than baby diapers."}],"2026-07-12":[{"round":1,"name":"Stoke-on-Trent, England, United Kingdom","lat":53.0027,"lon":-2.1794,"country":"United Kingdom","continent":"Europe","story":"Josiah Wedgwood, born July 12, 1730, in Burslem, England, the youngest of 13 children. His father died when he was 9, and Josiah went to work in the family pottery. He caught smallpox. It left his right knee permanently damaged ... and a potter spends all day pushing the pedal of a kick wheel. He couldn't keep going. \n\nSo instead of making pottery, he started studying it. He became obsessed. New clays, new glazes, new firing temperatures ... thousands of trials, all recorded in a notebook. He even invented a device to measure the heat inside a kiln, and was elected to the Royal Society for it. His cream-colored tableware became the fashion of Britain, and when Queen Charlotte ordered a set he branded it (with her permission) \"Queen's Ware\".\n\nHe turned pottery into a machine for making people want things. He provided money-back guarantees. Free delivery. Showrooms. Royal endorsements. Illustrated catalogues. Historians call him the father of modern marketing.\n\nAnd then, in 1787, he pointed all of it at ending slavery. He produced a small medallion of an enslaved man in chains, kneeling, above the words \"Am I Not a Man and a Brother?\" He gave them away by the thousands. People wore them as brooches, bracelets, hairpins, pendants. If you've ever worn a pink ribbon or flown a pride flag, you know the idea ... today, we call it cause-marketing.\n\nIt worked. The medallion became the symbol of the British abolition movement and crossed the Atlantic. Josiah shipped a batch to Benjamin Franklin in Philadelphia. It is remembered as one of the first political campaigns ever built around a symbol."},{"round":2,"name":"Ferrara, Italy","lat":44.8378,"lon":11.6197,"country":"Italy","continent":"Europe","story":"Margherita Piazzola Beloch was born July 12, 1879, in Frascati, Italy, the daughter of one of Europe's most famous historians ... she chose math. At the time, it was a field that barely admitted women. She earned her degree from the University of Rome in 1908, with top honors, and devoted herself to geometry.\n\nFor more than 2000 years, geometry had run on two tools ... a ruler and a compass. This was enough to survey land, raise buildings, and map the heavens. But some problems can't be solved this way. No matter how cleverly you used a ruler and compass, you're just not going to get there.\n\nIn 1936, as a professor at the University of Ferrara, Margherita showed that a folded sheet of paper could do things a ruler and compass could not. With the right fold, you could solve problems like dividing any angle into 3 equal parts ... something mathematicians had struggled to do for thousands of years.\n\nIn the decades that followed, mathematicians turned paper folding into a serious field of its own, called origami math. This branch of geometry helps us design solar panels, spacecraft, medical devices, and robots.\n\nThere are only a handful of fundamental folds at the heart of it. One of them is hers. We call it the Beloch Fold."},{"round":3,"name":"Montreal, Quebec, Canada","lat":45.5019,"lon":-73.5674,"country":"Canada","continent":"North America","story":"William Osler, born July 12, 1849, in rural Ontario, Canada. His father was an Anglican minister, and William was expected to follow him into the church. Instead, he became fascinated by the natural world. He collected insects, studied plants, and filled notebooks with observations. Science won out over theology, and he enrolled in medical school.\n\nIn the 1800s, you learned to become a doctor by sitting in a lecture hall and listening to professors talk. Many graduated having spent no time with actual patients. William thought this was backwards. A doctor, he believed, should learn medicine the same way a sailor learns the sea ... by getting out and doing it.\n\nHe was one of the founding physicians of Johns Hopkins Hospital. There, William pushed students out of the classroom and into the hospital. He had them examine real patients, observe symptoms firsthand, and discuss cases at the bedside. \n\nOsler never discovered a disease, invented a drug, or performed a famous operation. And yet, his impact on modern medicine was massive. Today, nearly every physician is trained in a teaching hospital, learning from real patients.\n\n\"Listen to your patient, they are telling you the diagnosis.\""},{"round":4,"name":"Bila Tserkva, Ukraine","lat":49.795,"lon":30.131,"country":"Ukraine","continent":"Europe","story":"Lyudmila Pavlichenko, born July 12, 1916, in Bila Tserkva, Ukraine. As a teenager in Kyiv, she heard a neighbour's boy bragging about how good of a shot he was ... so she decided to join a shooting club to prove a girl could do it better.\n\nIn June 1941, Germany invaded the Soviet Union and Lyudmila, 24, volunteered for the infantry. The recruiters offered her a job as a nurse. She said she wanted a rifle.\n\nShe was assigned to helping defend Odessa and then Sevastopol. She recorded 309 confirmed kills, including 36 enemy snipers ... enemies that were hunting her as she hunted them. The Red Army called her \"Lady Death\".\n\nIn June 1942 a mortar blast caught her in the face, her 4th wound of the war, and the Soviets decided she was now worth more alive than at the front. They sent her to America.\n\nLyudmila became the first Soviet citizen received at the White House. She met Franklin Roosevelt, and made a lifelong friend of his wife, Eleanor. But the reporters didn't want to ask her about the war. They asked whether she wore makeup at the front, about the cut of her uniform, and whether a woman should be fighting at all.\n\nLyudmila finally lost patience. \"Gentlemen, I am 25 years old and I have killed 309 fascists. Don't you think you have been hiding behind my back for too long?\""},{"round":5,"name":"South Tarawa, Kiribati","lat":1.3382,"lon":173.0176,"country":"Kiribati","continent":"Oceania","story":"The Republic of Kiribati (you pronounce it \"keer-ee-bass\") became an independent nation today, July 12, 1979. It is a stretch of 33 islands on 3.5 million square kilometres of the Pacific Ocean. Almost the entire population lives on coral atolls that rise only a few feet above the sea. The average elevation is ~6 feet (2 meters). I think of nations as relatively permanent, but rising oceans threaten the existence of Kiribati. \n\nIn 2014, President Anote Tong made a backup plan. He bought ~5,500 acres on a Fijian island, 2,000 km away, and called it part of \"migration with dignity\". Somewhere for his people to go if the sea took their home. \n\nThe next president threw the plan out. Taneti Maamau won office rejecting the whole premise. Kiribati was not going to sink, and Kiribatians were not going to leave. They were going to raise the islands instead. The plan is to dredge sand and rock off the lagoon floor and pile it up until the island sits higher. The cost will be \"in the billions\".\n\nIt's unclear where the money would come from, or even if raising the islands is the right answer. Dredging the lagoon can damage the same coral reefs that created these islands in the first place. But it opens a completely different question ... we normally think of a country as a piece of land, and the people on it. But what if the people remain ... but the land doesn't? Does the nation stop existing?\n\nCountries like Tuvalu are already arguing that they should remain sovereign even if rising seas force their people elsewhere."}],"2026-07-13":[{"round":1,"name":"Little Rock, Arkansas, USA","lat":34.7465,"lon":-92.2896,"country":"United States","continent":"North America","story":"Rosetta Nubin, born March 20, 1915, in Arkansas. Her mother sang, preached, and played mandolin for the church. Rosetta picked up a guitar when she was 4. By 6, she was on the road, playing revivals across the South beside her mother ... people came to see the little girl who could really play.\n\nIn 1934 she married a preacher named Thomas Thorpe. The marriage didn't last, but she kept his last name. She became Sister Rosetta Tharpe. She moved north, to Chicago and then New York. She took gospel out of the church and into the nightclubs.\n\nThe electric guitar was a new instrument, and she played it like no one else. Loud. Fast. And distorted. She mixed hymns with blues and swing. The church was scandalized. The crowds were entranced. \n\nIn 1944 she recorded \"Strange Things Happening Every Day\" ... today, we think of it as one of the first rock and roll records ever made. A decade before the genre had a name.\n\nShe was a sensation. In 1951, more than 20,000 people bought tickets to watch her get married in a Washington ballpark, then stayed for the concert she played in her wedding dress.\n\nLittle Richard said she gave him his first real stage. Chuck Berry called his whole career \"one long Sister Rosetta Tharpe impersonation\". Johnny Cash said she was his favorite singer. Then rock and roll exploded, mostly under their names, and hers slipped out of the story. \n\nHappy International Rock Day! In 2018, Sister Rosetta Tharpe was inducted into the Rock and Roll Hall of Fame."},{"round":2,"name":"Budapest, Hungary","lat":47.4979,"lon":19.0402,"country":"Hungary","continent":"Europe","story":"Ernő Rubik, born July 13, 1944, in Budapest, in the last months of World War II. His father designed gliders, and Ernő grew up among drawings, tools, and mechanical problems. He studied architecture and became a professor of design.\n\nIn 1974, he started working on a cube, built from smaller cubes, that could twist in every direction. The idea was easy ... but the mechanism was not. Getting the pieces to grip one another and still turn freely was tricky. He worked it out with an interlocking core that held itself together from the inside.\n\nWith the cube completed, he painted each side a different color, to show how the pieces were moving. Then he scrambled the colors. He struggled with a new problem ... he couldn't get them back the way they started.\n\nA Rubik's Cube has about 43 quintillion possible arrangements (that's 18 zeros). It took him a month to solve it the first time.\n\nIt was sold in Hungary as the \"Magic Cube\", then went West, and sold as \"Rubik's Cube\". It was a huge hit, and more than 500 million of them have been sold. It is one of the best-selling toys in history.\n\nThe current world record for solving one is 3.13 seconds."},{"round":3,"name":"Montevideo, Uruguay","lat":-34.9011,"lon":-56.1645,"country":"Uruguay","continent":"South America","story":"Jules Rimet, born in 1873 in Theuley, a village in eastern France. He was the son of a grocer. When he was 11, the family ran out of money and moved to Paris. In 1897 he founded a football (soccer) club in Paris ... most clubs of the day were for gentlemen, but his club was open to anyone ... clerks, laborers, and the rich, all on the same team. \n\nHe trained as a lawyer, but poured his energy into organizing France's scattered clubs into something bigger. When World War I broke out, he served as an officer. After the war, he was more convinced than ever that nations needed reasons to meet that weren't war.\n\nIn 1921 he became president of a tiny organization called FIFA, Fédération Internationale de Football Association. At the time, the biggest football tournament in the world was the Olympics, and it was amateurs only. Jules wanted a real championship, open to every nation, and every player. \n\nBy 1928, the first tournament was being planned, to be hosted by Uruguay (two-time Olympic champions). But that was an ocean away ... only 4 European teams went.\n\nToday, July 13, 1930, in Montevideo, the first match of the first World Cup kicked off. France against Mexico. 13 teams in total had come. Uruguay won it all, beating Argentina in the final in front of more than 90,000 people. The trophy was, uh, a little smaller back then.\n\nJules stepped down in 1954, after 33 years. The little organization he'd taken over had grown from a few dozen nations to 85, and the tournament he created was becoming one of the biggest events on Earth."},{"round":4,"name":"Ulaanbaatar, Mongolia","lat":47.8864,"lon":106.9057,"country":"Mongolia","continent":"Asia","story":"Rock and roll has always been a borrower. The roots of rock come from gospel, blues, and country, but ever since it has borrowed from whatever it brushed up against ... jazz, folk, punk, funk, electronic ... and Mongolian throat singing.\n\nIn 2016, in Ulaanbaatar, four musicians and a producer took the morin khuur (a fiddle) and khoomei (throat singing, where one voice carries two notes at once), and made it into a heavy metal song. Omg my wife is going to love this one. They called it \"hunnu rock\", after the Hun empire their ancestors built. They named the band The Hu, from the old Mongolian word for human.\n\nThen they put a video online. \"Wolf Totem\" was four guys out on the land, playing instruments most of the world had never seen, singing in a language almost no one outside Mongolia speaks, and yet, in 2019, it became the first song by a Mongolian band to top a Billboard chart.\n\nThe video has been watched more than 100 million times. Mongolia gave them the Order of Genghis Khan, the highest honor the country has ... the first band ever to receive it. Want to watch it? Tap this link, and YouTube will open it up."},{"round":5,"name":"Papeete, Tahiti","lat":-17.5516,"lon":-149.5585,"country":null,"continent":null,"story":"Tupaia, born ~1725 on Ra'iātea, in what is now French Polynesia. He was a high priest, a scholar, and a master Polynesian wayfinder. With no compass and no charts, Polynesian navigators crossed thousands of miles of open Pacific by reading the stars, the winds, the birds, and the way the waves bent around islands they couldn't yet see. \n\nIn 1769, James Cook on the HMS Endeavour anchored at Tahiti. Cook's botanist, Joseph Banks, met Tupaia and decided to take him back to England, writing that he might as well keep him \"as a curiosity\". Today, July 13, 1769, the Endeavour left Tahiti with Tupaia aboard.\n\nOfficially, Captain Cook commanded. But once they were in Polynesian waters, Tupaia knew the ocean in ways no European aboard did. Months later and thousands of miles away, in any weather, he could still point straight toward Tahiti.\n\nWhen the Endeavour reached New Zealand, Tupaia could speak with the Māori. Their language was a cousin of his own. The people Cook had sailed around the world to \"discover\" sat and talked with the Polynesian on his ship. He translated, negotiated, and kept first encounters from turning into violence.\n\nTupaia made a map for Cook. The problem was, Cook couldn't read it. Cook's maps were all top-down, like this globe. But Tupaia's map showed how to get from one island to another ... directions. Like \"Follow this star until the swell changes, then steer toward the sunrise.\" It sounds vague. For Tupaia, it wasn't. Those directions carried Polynesians across the open ocean for centuries."}]}};

/* ============================== computeStats ==============================
   Pure function: plays.json object in, stats object out. No DOM access. */
function computeStats(data) {
  if (!data || !Array.isArray(data.plays) || data.plays.length === 0) {
    return { empty: true, generatedAt: (data && data.generated_at) || null };
  }

  var MS_DAY = 86400000;
  function toUTC(iso) { return new Date(iso + "T00:00:00Z").getTime(); }
  function addDays(iso, n) { return new Date(toUTC(iso) + n * MS_DAY).toISOString().slice(0, 10); }
  function dayDiff(a, b) { return Math.round((toUTC(b) - toUTC(a)) / MS_DAY); }
  function avg(a) { var s = 0; for (var i = 0; i < a.length; i++) s += a[i]; return s / a.length; }
  function median(a) {

  var MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

  function fmtDate(iso) { return MONTHS[+iso.slice(5, 7) - 1] + " " + (+iso.slice(8, 10)); }
  function fmtDateFull(iso) { return MONTHS_FULL[+iso.slice(5, 7) - 1] + " " + (+iso.slice(8, 10)) + ", " + iso.slice(0, 4); }

  var PALETTE = ["#e8b44a", "#4fd1a5", "#f2708a", "#5db3f0", "#b69cfa", "#e07be0", "#3ec9c9", "#a8d94a"];

  unflagged.forEach(function (p) { (byDate[p.date] = byDate[p.date] || []).push(p); });
  var playDates = Object.keys(byDate).sort();
  var dayInfo = {};
  playDates.forEach(function (d) {
    var entries = byDate[d].slice().sort(function (a, b) { return b.final - a.final || a.shared_at.localeCompare(b.shared_at); });
    var max = entries[0].final, min = entries[entries.length - 1].final;
    entries.forEach(function (p) {

    });
    dayInfo[d] = {

  var P = {};
  names.forEach(function (n) {
    P[n] = { player: n, color: colorOf[n], games: 0, finals: [], byDateFinal: {}, dates: [],

    }

  });
  officialDates.forEach(function (d) {
    var info = dayInfo[d];

    info.losers.forEach(function (n) { if (P[n]) P[n].lastPlaces++; });

  });

  /* Streaks & participation */
  names.forEach(function (n) {
    var s = P[n];
    s.dates = s.dates.slice().sort();
    var longest = 0, cur = 0, run = 0, prev = null;
    s.dates.forEach(function (d) {
      run = (prev !== null && dayDiff(prev, d) === 1) ? run + 1 : 1;
      if (run > longest) longest = run;

    cur = (last && dayDiff(last, latestDate) <= 1) ? run : 0;

    s.best = s.finals.length ? Math.max.apply(null, s.finals) : null;
    s.worst = s.finals.length ? Math.min.apply(null, s.finals) : null;

  });

  var leaderboard = names.map(function (n) { return P[n]; }).sort(function (a, b) {
    if (a.games === 0 && b.games === 0) return a.player.localeCompare(b.player);

  });

  /* Today / latest day */
  var todayEntries = (dayInfo[latestDate] ? dayInfo[latestDate].entries : []).map(function (p) {
    return { player: p.player, final: p.final, rounds: p.rounds || [], emojis: p.emojis || [],
             rank: p._rank, time: p.shared_at ? fmtClock(p.shared_at) : "", color: colorOf[p.player] };
  });
  var postedToday = {};
  plays.forEach(function (p) { if (p.date === latestDate) postedToday[p.player] = 1; });
  var today = {
    date: latestDate, dateLabel: fmtDateFull(latestDate), provisional: provisional,
    entries: todayEntries,
    flagged: flaggedPlays.filter(function (p) { return p.date === latestDate; })
      .map(function (p) { return { player: p.player, final: p.final }; }),
    missing: names.filter(function (n) { return !postedToday[n]; })
  };

  /* Trend: 7-day rolling average per player */
  var trendDates = [];
  for (var d = firstDate; d <= latestDate; d = addDays(d, 1)) trendDates.push(d);
  var trendSeries = {};
  names.forEach(function (n) {

  });

  Object.keys(trendSeries).forEach(function (n) {

    dates: trendDates, series: trendSeries,

  };

  var active = names.filter(function (n) { return P[n].games > 0; });

  /* Generic pick helpers */
  function pickBest(rows, valFn, cmp) {

  award("The Standard", pickBest(qualified, function (s) { return s.avg; }, desc),

    .map(function (p) {

    }).filter(function (r) { return r.val > 0; }),

  var winStreaks = [];
  active.forEach(function (n) {

      function (p) { return p.val + " days"; },
      function () { return "no missed puzzles"; });

  var cheapWin = pickBest(officialDates.filter(function (dd) { return dayInfo[dd].entries.length >= 2; })
    .map(function (dd) { return { player: dayInfo[dd].winners[0], val: dayInfo[dd].max, date: dd }; }),
    function (r) { return r.val; }, asc);
  rec("Cheapest Win", cheapWin, function (p) { return p.val + ""; },
      function (p) { return "lowest score to still take " + fmtDate(p.holders[0].date); });

  var bestR5 = pickBest(unflagged.filter(function (p) { return p.rounds && p.rounds.length === 5; })
    .map(function (p) { return { player: p.player, val: p.rounds[4], date: p.date }; }),
    function (r) { return r.val; }, desc);
  rec("Best Round 5", bestR5, function (p) { return p.val + ""; },
      function (p) { return "in the graveyard round, " + fmtDate(p.holders[0].date); });

  /* Emoji tiers */
  var emap = {};
  unflagged.forEach(function (p) {
    if (!p.rounds || !p.emojis) return;
    p.rounds.forEach(function (r, i) {
      var e = p.emojis[i];
      if (!e) return;
      var m = emap[e] = emap[e] || { emoji: e, count: 0, min: 101, max: -1, sum: 0, first: null };
      m.count++; m.sum += r;
      if (r < m.min) m.min = r;
      if (r > m.max) m.max = r;
      if (!m.first) m.first = { player: p.player, date: p.date, score: r };
    });
  });
  var emojiTiers = Object.keys(emap).map(function (e) {
    var m = emap[e];
    return { emoji: m.emoji, count: m.count, min: m.min, max: m.max, avg: r1(m.sum / m.count), first: m.first };
  }).sort(function (a, b) { return b.avg - a.avg; });
  var rareEmojis = emojiTiers.filter(function (t) { return t.count === 1; })
    .sort(function (a, b) { return a.avg - b.avg; });

  return {
    empty: false,
    generatedAt: generatedAt,
    firstDate: firstDate, latestDate: latestDate,
    firstDateLabel: fmtDateFull(firstDate), latestDateLabel: fmtDateFull(latestDate),
    totalGames: unflagged.length, totalPlayers: names.length,
    provisional: provisional, officialCutoff: officialCutoff,
    officialCutoffLabel: fmtDateFull(officialCutoff),
    officialDayCount: officialDates.length, tieDays: tieDays,
    names: names, colorOf: colorOf,
    today: today,
    leaderboard: leaderboard.map(function (s) {
      return {
        player: s.player, color: s.color, games: s.games,
        avg: s.avg === null ? null : r1(s.avg),
        median: s.median, best: s.best, worst: s.worst,
        wins: s.wins, podiums: s.podiums,
        curStreak: s.curStreak, longStreak: s.longStreak,
        participation: s.participation,
        joined: s.joined, joinedLabel: s.joined ? fmtDate(s.joined) : null,
        hasFlagged: s.hasFlagged,
        series: s.dates.map(function (dd) { return s.byDateFinal[dd]; })
      };
    }),
    roundAvgs: roundAvgs,
    superlatives: superlatives,
    trend: trend,
    h2h: h2h,
    records: records,
    emojiTiers: emojiTiers,
    rareEmojis: rareEmojis,
    totalReshares: totalReshares,
    flaggedPlays: flaggedPlays.map(function (p) {
      return { player: p.player, date: p.date, dateLabel: fmtDateFull(p.date), final: p.final };
    })
  };
}

/* ============================ computeGeoStats ============================
   Pure function: (plays.json object, locations.json object) -> geography
   stats. Strict intersection join: a location only counts where a play's
   round actually scored it — play.rounds[i] scores days[date][i]. Weighted
   cost uses the game's own multipliers (1, 1, 2, 3, 3). Handles null,
   empty, and partially-enriched locations (country/continent may be null). */
function computeGeoStats(data, locations) {
  var MULT = [1, 1, 2, 3, 3];
  var MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  var MONTHS_FULL = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  function fmtDate(iso) { return MONTHS[+iso.slice(5, 7) - 1] + " " + (+iso.slice(8, 10)); }
  function fmtDateFull(iso) { return MONTHS_FULL[+iso.slice(5, 7) - 1] + " " + (+iso.slice(8, 10)) + ", " + iso.slice(0, 4); }
  function r1(x) { return Math.round(x * 10) / 10; }
  function num(x) { return typeof x === "number" && isFinite(x); }
  function pending(reason) { return { empty: true, reason: reason }; }

  if (!locations || typeof locations !== "object" || !locations.days ||
      typeof locations.days !== "object" || Array.isArray(locations.days)) {
    return pending("location data pending");
  }
  var locDayKeys = Object.keys(locations.days).sort();
  if (locDayKeys.length === 0) return pending("location data pending");
  if (!data || !Array.isArray(data.plays) || data.plays.length === 0) {
    return pending("no plays to pin to the map");
  }

  var plays = data.plays.filter(function (p) {
    return p && !p.flagged && p.date && p.rounds && p.rounds.length === 5;
  });
  var playsByDate = {};
  plays.forEach(function (p) { (playsByDate[p.date] = playsByDate[p.date] || []).push(p); });
  var playDayCount = Object.keys(playsByDate).length;
  if (playDayCount === 0) return pending("no plays to pin to the map");

  /* Roster + stable colors — same alphabetical palette as computeStats */
  var names = [], seen = {};
  Object.keys(data.players || {}).forEach(function (h) {
    var n = data.players[h];
    if (n && !seen[n]) { seen[n] = 1; names.push(n); }
  });
  plays.forEach(function (p) { if (p.player && !seen[p.player]) { seen[p.player] = 1; names.push(p.player); } });
  var PALETTE = ["#e8b44a", "#4fd1a5", "#f2708a", "#5db3f0", "#b69cfa", "#e07be0", "#3ec9c9", "#a8d94a"];
  var colorOf = {};
  names.slice().sort().forEach(function (n, i) { colorOf[n] = PALETTE[i % PALETTE.length]; });

  var CONT_ORDER = ["North America", "South America", "Europe", "Africa", "Asia", "Oceania", "Antarctica"];

  /* Home turf: western Massachusetts. All distance stats measure from here. */
  var HOME = { lat: 42.32, lon: -72.63 };
  var BUCKET_EDGES = [1500, 5000, 9000];
  var BUCKET_DEFS = [
    { label: "< 1,500 km", minKm: 0, maxKm: 1500 },
    { label: "1,500–5,000 km", minKm: 1500, maxKm: 5000 },
    { label: "5,000–9,000 km", minKm: 5000, maxKm: 9000 },
    { label: "> 9,000 km", minKm: 9000, maxKm: null }
  ];
  /* Island method: a fixed list of island nations/territories, plus place-name
     heuristics (Island/Isle/Île/Atoll/Archipelago and well-known islands). */
  var ISLAND_COUNTRIES = {
    "United Kingdom": 1, "Ireland": 1, "Iceland": 1, "Japan": 1, "Philippines": 1,
    "Indonesia": 1, "New Zealand": 1, "Tonga": 1, "Vanuatu": 1, "Fiji": 1, "Samoa": 1,
    "Comoros": 1, "Cape Verde": 1, "Madagascar": 1, "Sri Lanka": 1, "Maldives": 1,
    "Seychelles": 1, "Mauritius": 1, "Haiti": 1, "Dominican Republic": 1, "Cuba": 1,
    "Jamaica": 1, "Bahamas": 1, "Barbados": 1, "Trinidad and Tobago": 1, "Taiwan": 1,
    "Singapore": 1, "Bahrain": 1, "Malta": 1, "Cyprus": 1, "Greenland": 1,
    "Papua New Guinea": 1, "Solomon Islands": 1, "Timor-Leste": 1, "East Timor": 1,
    "Kiribati": 1, "Palau": 1, "Marshall Islands": 1, "Micronesia": 1, "Nauru": 1, "Tuvalu": 1
  };
  var ISLAND_NAME_RE = /\b(islands?|isle|isles|isla|île|îles|atoll|archipelago|hawaii|hawai|puerto rico|tasmania|sicily|sardinia|corsica|crete|svalbard|canary|azores|madeira|okinawa|hokkaido|bali|bermuda|galápagos|galapagos)\b/i;
  function isIsland(country, name) {
    if (country && ISLAND_COUNTRIES[country]) return true;
    return ISLAND_NAME_RE.test(String(name || ""));
  }
  function newSide() { return { sum: 0, count: 0 }; }
  function sideAvg(s) { return s.count ? r1(s.sum / s.count) : null; }

  /* new-aggregate holders (all filled in the join below) */
  var bucketAgg = BUCKET_DEFS.map(newSide);
  var eastAgg = newSide(), westAgg = newSide();
  var islAgg = newSide(), mainAgg = newSide();
  var climAgg = [newSide(), newSide(), newSide()];   /* tropics, temperate, polar */
  var CLIM_DEFS = [
    { label: "Tropics", range: "0–23.4°" },
    { label: "Temperate", range: "23.4–66.6°" },
    { label: "Polar", range: "66.6°+" }
  ];
  var countryAgg = {};             /* country -> {sum,count,entries,locs,byDate,first} */
  var islLocKeys = {};
  var rpAgg = [0, 1, 2, 3, 4].map(function () { return { kmSum: 0, kmN: 0, scSum: 0, scN: 0 }; });

  /* -------- intersection join -------- */
  var locMap = {}, locOrder = [];
  var perPlayer = {};              /* player -> geo aggregates */
  var contAgg = {};                /* continent -> {sum, count} */
  var scoredRounds = [];           /* one row per (play, round, location) */
  var dayGeo = {};                 /* date -> {pts:[{round,lat,lon}], finals:[]} */
  var covered = [], roundsScored = 0;
  var southAgg = { sum: 0, count: 0 }, northAgg = { sum: 0, count: 0 };

  locDayKeys.forEach(function (d) {
    var dayPlays = playsByDate[d];
    var entries = locations.days[d];
    if (!dayPlays || !dayPlays.length || !Array.isArray(entries)) return;
    var used = false;
    entries.forEach(function (e) {
      if (!e || typeof e !== "object") return;
      var rn = e.round;
      if (!num(rn) || rn !== Math.round(rn) || rn < 1 || rn > 5) return;
      if (!num(e.lat) || !num(e.lon)) return; /* region-only entry: skip gracefully */
      var name = (typeof e.name === "string" && e.name) ? e.name : "Unknown location";
      var country = (typeof e.country === "string" && e.country) ? e.country : null;
      var cont = (typeof e.continent === "string" && e.continent) ? e.continent : null;
      var key = name + "|" + e.lat + "|" + e.lon;
      var L = locMap[key];
      if (!L) {
        L = locMap[key] = { key: key, name: name, lat: e.lat, lon: e.lon,
          country: country, continent: cont, sum: 0, count: 0, min: 101, max: -1,
          costSum: 0, occ: [] };
        locOrder.push(L);
      }
      if (!L.country && country) L.country = country;
      if (!L.continent && cont) L.continent = cont;
      L.occ.push({ date: d, round: rn });
      var dg = dayGeo[d] = dayGeo[d] || { pts: [], finals: [] };
      dg.pts.push({ round: rn, lat: e.lat, lon: e.lon });

      var km = havKm(HOME, e);
      var island = isIsland(country, name);
      var bi = km < BUCKET_EDGES[0] ? 0 : km < BUCKET_EDGES[1] ? 1 : km < BUCKET_EDGES[2] ? 2 : 3;
      var absLat = Math.abs(e.lat);
      var ci = absLat < 23.436 ? 0 : absLat < 66.563 ? 1 : 2;
      if (island) islLocKeys[key] = 1;
      var entryScores = 0;

      dayPlays.forEach(function (p) {
        var sc = p.rounds[rn - 1];
        if (!num(sc) || sc < 0 || sc > 100) return;
        used = true;
        roundsScored++;
        entryScores++;
        L.sum += sc; L.count++;
        if (sc < L.min) L.min = sc;
        if (sc > L.max) L.max = sc;
        var cost = MULT[rn - 1] * (100 - sc);
        L.costSum += cost;
        scoredRounds.push({ player: p.player, name: name, date: d, round: rn,
                            score: sc, mult: MULT[rn - 1], cost: cost });
        var pg = perPlayer[p.player] = perPlayer[p.player] ||
          { player: p.player, locs: {}, rounds: 0, sumAll: 0, byCont: {},
            home: { sum: 0, count: 0 }, abroad: { sum: 0, count: 0 },
            buckets: BUCKET_DEFS.map(newSide), bands: [newSide(), newSide(), newSide()],
            north: newSide(), south: newSide(), east: newSide(), west: newSide(),
            isl: newSide(), mainl: newSide(), byCountry: {},
            sx: 0, sy: 0, sxy: 0, sxx: 0 };
        pg.locs[key] = 1; pg.rounds++; pg.sumAll += sc;
        var bk = pg.buckets[bi]; bk.sum += sc; bk.count++;
        bucketAgg[bi].sum += sc; bucketAgg[bi].count++;
        pg.sx += km; pg.sy += sc; pg.sxy += km * sc; pg.sxx += km * km;
        var bd = pg.bands[ci]; bd.sum += sc; bd.count++;
        climAgg[ci].sum += sc; climAgg[ci].count++;
        var rp = rpAgg[rn - 1]; rp.scSum += sc; rp.scN++;
        if (e.lat < 0) { southAgg.sum += sc; southAgg.count++; pg.south.sum += sc; pg.south.count++; }
        else { northAgg.sum += sc; northAgg.count++; pg.north.sum += sc; pg.north.count++; }
        if (e.lon < 0) { westAgg.sum += sc; westAgg.count++; pg.west.sum += sc; pg.west.count++; }
        else { eastAgg.sum += sc; eastAgg.count++; pg.east.sum += sc; pg.east.count++; }
        if (island) { islAgg.sum += sc; islAgg.count++; pg.isl.sum += sc; pg.isl.count++; }
        else { mainAgg.sum += sc; mainAgg.count++; pg.mainl.sum += sc; pg.mainl.count++; }
        if (country) {
          var cAgg = countryAgg[country] = countryAgg[country] ||
            { sum: 0, count: 0, entries: 0, locs: {}, byDate: {}, first: null };
          cAgg.sum += sc; cAgg.count++; cAgg.locs[key] = 1;
          var cd = cAgg.byDate[d] = cAgg.byDate[d] || { sum: 0, count: 0 };
          cd.sum += sc; cd.count++;
          var pcc = pg.byCountry[country] = pg.byCountry[country] || { sum: 0, count: 0 };
          pcc.sum += sc; pcc.count++;
        }
        if (cont) {
          var ca = contAgg[cont] = contAgg[cont] || { sum: 0, count: 0 };
          ca.sum += sc; ca.count++;
          var pc = pg.byCont[cont] = pg.byCont[cont] || { sum: 0, count: 0 };
          pc.sum += sc; pc.count++;
          if (cont === "North America") { pg.home.sum += sc; pg.home.count++; }
          else { pg.abroad.sum += sc; pg.abroad.count++; }
        }
      });
      if (entryScores > 0) {
        var rpe = rpAgg[rn - 1];
        rpe.kmSum += km; rpe.kmN++;
        if (country && countryAgg[country]) {
          countryAgg[country].entries++;
          if (!countryAgg[country].first) {
            countryAgg[country].first = { name: name, date: d, round: rn };
          }
        }
      }
    });
    if (used) {
      covered.push(d);
      dayGeo[d].finals = dayPlays.map(function (p) { return p.final; })
        .filter(function (f) { return num(f); });
    }
  });

  if (!covered.length || !roundsScored) {
    return pending("no plays overlap the archived locations yet");
  }

  var locs = locOrder.filter(function (L) { return L.count > 0; });
  locs.forEach(function (L) {
    L.avg = r1(L.sum / L.count);
    L.spread = L.max - L.min;
    L.occLabel = L.occ.length === 1
      ? fmtDate(L.occ[0].date) + " · R" + L.occ[0].round
      : L.occ.map(function (o) { return fmtDate(o.date) + " R" + o.round; }).join(", ");
  });

  /* -------- continent report card -------- */
  var contPresent = CONT_ORDER.filter(function (c) { return contAgg[c] && contAgg[c].count > 0; });
  Object.keys(contAgg).forEach(function (c) {
    if (contPresent.indexOf(c) === -1 && contAgg[c].count > 0) contPresent.push(c);
  });
  var hasContinents = contPresent.length > 0;
  var continentTable = null;
  if (hasContinents) {
    var rows = names.filter(function (n) { return perPlayer[n]; })
      .sort(function (a, b) {
        return (perPlayer[b].sumAll / perPlayer[b].rounds) - (perPlayer[a].sumAll / perPlayer[a].rounds);
      })
      .map(function (n) {
        var pg = perPlayer[n];
        return { player: n, color: colorOf[n],
          cells: contPresent.map(function (c) {
            var pc = pg.byCont[c];
            return pc && pc.count ? { avg: r1(pc.sum / pc.count), count: pc.count } : { avg: null, count: 0 };
          }) };
      });
    continentTable = {
      continents: contPresent,
      rows: rows,
      group: contPresent.map(function (c) {
        return { avg: r1(contAgg[c].sum / contAgg[c].count), count: contAgg[c].count };
      })
    };
  }

  /* -------- panel structures: passport, distance, hemispheres, climate,
              islands, second homes, round position, rematch -------- */
  var geoNames = names.filter(function (n) { return perPlayer[n] && perPlayer[n].rounds > 0; })
    .sort(function (a, b) {
      return (perPlayer[b].sumAll / perPlayer[b].rounds) - (perPlayer[a].sumAll / perPlayer[a].rounds);
    });

  var passCountries = Object.keys(countryAgg).map(function (c) {
    var ca = countryAgg[c];
    return { country: c, rounds: ca.entries, plays: ca.count,
             locs: Object.keys(ca.locs).length,
             avg: ca.entries >= 2 && ca.count > 0 ? r1(ca.sum / ca.count) : null,
             rawAvg: ca.count > 0 ? r1(ca.sum / ca.count) : null };
  }).sort(function (a, b) {
    return b.rounds - a.rounds || b.plays - a.plays ||
           (a.country < b.country ? -1 : 1);
  });
  var singles = passCountries.filter(function (c) { return c.rounds === 1; });
  var rarest = null;
  singles.forEach(function (c) {
    if (!rarest || (c.rawAvg !== null && c.rawAvg < rarest.avg)) {
      var f = countryAgg[c.country].first || {};
      rarest = { country: c.country, name: f.name || c.country, date: f.date || null,
                 dateLabel: f.date ? fmtDateFull(f.date) : "", round: f.round || null,
                 avg: c.rawAvg, plays: c.plays };
    }
  });
  var passport = passCountries.length ? {
    countryCount: passCountries.length,
    continents: contPresent.slice(),
    continentCount: contPresent.length,
    countries: passCountries,
    singleVisitCount: singles.length,
    rarest: rarest
  } : null;

  var distPlayers = geoNames.map(function (n) {
    var pg = perPlayer[n];
    var slope = null;
    if (pg.rounds >= 15) {
      var den = pg.rounds * pg.sxx - pg.sx * pg.sx;
      if (den > 0) slope = Math.round(((pg.rounds * pg.sxy - pg.sx * pg.sy) / den) * 1000 * 100) / 100;
    }
    return { player: n, color: colorOf[n], n: pg.rounds, slope: slope,
             cells: pg.buckets.map(function (b) { return { avg: sideAvg(b), count: b.count }; }) };
  });
  var slopers = distPlayers.filter(function (r) { return r.slope !== null; });
  var flattest = null, steepest = null;
  if (slopers.length >= 2) {
    slopers.forEach(function (r) {
      if (!flattest || Math.abs(r.slope) < Math.abs(flattest.slope)) flattest = r;
      if (!steepest || r.slope < steepest.slope) steepest = r;
    });
    if (steepest && steepest.slope > -0.5) steepest = null; /* not a meaningful decay */
  }
  var gSlope = null;
  if (roundsScored >= 15) {
    var gs = { sx: 0, sy: 0, sxy: 0, sxx: 0 };
    geoNames.forEach(function (n) {
      var pg = perPlayer[n];
      gs.sx += pg.sx; gs.sy += pg.sy; gs.sxy += pg.sxy; gs.sxx += pg.sxx;
    });
    var gden = roundsScored * gs.sxx - gs.sx * gs.sx;
    if (gden > 0) gSlope = Math.round(((roundsScored * gs.sxy - gs.sx * gs.sy) / gden) * 1000 * 100) / 100;
  }
  var distance = {
    home: HOME,
    buckets: BUCKET_DEFS.map(function (bdf, i) {
      return { label: bdf.label, minKm: bdf.minKm, maxKm: bdf.maxKm,
               group: { avg: sideAvg(bucketAgg[i]), count: bucketAgg[i].count } };
    }),
    players: distPlayers,
    groupSlope: gSlope,
    flattest: flattest ? { player: flattest.player, slope: flattest.slope, n: flattest.n } : null,
    steepest: steepest ? { player: steepest.player, slope: steepest.slope, n: steepest.n } : null
  };

  function hemiSplit(aAgg, bAgg, aKey, bKey, aLabel, bLabel) {
    var rows = [];
    geoNames.forEach(function (n) {
      var pg = perPlayer[n];
      if (pg[aKey].count < 5 || pg[bKey].count < 5) return;
      var aA = sideAvg(pg[aKey]), bA = sideAvg(pg[bKey]);
      rows.push({ player: n, color: colorOf[n], aAvg: aA, bAvg: bA,
                  aN: pg[aKey].count, bN: pg[bKey].count, gap: r1(bA - aA) });
    });
    rows.sort(function (x, y) { return y.gap - x.gap; });
    return {
      aLabel: aLabel, bLabel: bLabel,
      a: { label: aLabel, avg: sideAvg(aAgg), count: aAgg.count },
      b: { label: bLabel, avg: sideAvg(bAgg), count: bAgg.count },
      best: rows.length ? rows[0] : null,
      worst: rows.length > 1 ? rows[rows.length - 1] : null
    };
  }
  var hemispheres = {
    ns: hemiSplit(northAgg, southAgg, "north", "south", "North", "South"),
    ew: hemiSplit(westAgg, eastAgg, "west", "east", "West", "East")
  };

  var climate = { bands: [] };
  CLIM_DEFS.forEach(function (cd, i) {
    if (!climAgg[i].count) return;
    var best = null;
    geoNames.forEach(function (n) {
      var bd = perPlayer[n].bands[i];
      if (bd.count < 5) return;
      var a = sideAvg(bd);
      if (!best || a > best.avg) best = { player: n, color: colorOf[n], avg: a, count: bd.count };
    });
    climate.bands.push({ label: cd.label, range: cd.range,
                         avg: sideAvg(climAgg[i]), count: climAgg[i].count, best: best });
  });
  if (!climate.bands.length) climate = null;

  var islPlayers = geoNames.filter(function (n) { return perPlayer[n].isl.count >= 3; })
    .map(function (n) {
      var pg = perPlayer[n];
      var iA = sideAvg(pg.isl), mA = sideAvg(pg.mainl);
      return { player: n, color: colorOf[n], islAvg: iA, islN: pg.isl.count,
               mainAvg: mA, mainN: pg.mainl.count,
               gap: (iA !== null && mA !== null) ? r1(iA - mA) : null };
    }).sort(function (a, b) { return b.islAvg - a.islAvg; });
  var islands = {
    show: islAgg.count >= 4,
    islandRounds: islAgg.count, mainlandRounds: mainAgg.count,
    islandAvg: sideAvg(islAgg), mainlandAvg: sideAvg(mainAgg),
    islandLocCount: Object.keys(islLocKeys).length,
    players: islPlayers,
    best: islPlayers.length ? islPlayers[0] : null,
    worst: islPlayers.length > 1 ? islPlayers[islPlayers.length - 1] : null
  };

  var homes = geoNames.map(function (n) {
    var pg = perPlayer[n];
    var pool = Object.keys(pg.byCountry).filter(function (c) { return pg.byCountry[c].count >= 3; })
      .map(function (c) { return { label: c, kind: "country",
        avg: r1(pg.byCountry[c].sum / pg.byCountry[c].count), count: pg.byCountry[c].count }; });
    if (!pool.length) {
      pool = Object.keys(pg.byCont).filter(function (c) { return pg.byCont[c].count >= 3; })
        .map(function (c) { return { label: c, kind: "continent",
          avg: r1(pg.byCont[c].sum / pg.byCont[c].count), count: pg.byCont[c].count }; });
    }
    pool.sort(function (a, b) { return b.avg - a.avg; });
    return { player: n, color: colorOf[n], n: pg.rounds,
             best: pool.length ? pool[0] : null,
             worst: pool.length > 1 ? pool[pool.length - 1] : null };
  });

  var rpRows = rpAgg.map(function (rp, i) {
    return { round: i + 1, mult: MULT[i],
             avgKm: rp.kmN ? Math.round(rp.kmSum / rp.kmN) : null,
             avgScore: rp.scN ? r1(rp.scSum / rp.scN) : null,
             count: rp.scN };
  });
  var rpVerdict = null;
  (function () {
    var ek = rpAgg[0].kmSum + rpAgg[1].kmSum, ekn = rpAgg[0].kmN + rpAgg[1].kmN;
    var lk = rpAgg[3].kmSum + rpAgg[4].kmSum, lkn = rpAgg[3].kmN + rpAgg[4].kmN;
    var es = rpAgg[0].scSum + rpAgg[1].scSum, esn = rpAgg[0].scN + rpAgg[1].scN;
    var ls = rpAgg[3].scSum + rpAgg[4].scSum, lsn = rpAgg[3].scN + rpAgg[4].scN;
    if (!ekn || !lkn || !esn || !lsn) return;
    var earlyKm = Math.round(ek / ekn), lateKm = Math.round(lk / lkn);
    var earlySc = es / esn, lateSc = ls / lsn, drop = r1(earlySc - lateSc);
    if (lateKm > earlyKm * 1.25 && drop > 5) {
      rpVerdict = "Confirmed: the triple-weighted rounds average " + lateKm.toLocaleString() +
        " km from home vs " + earlyKm.toLocaleString() + " km for rounds 1–2, and the group gives up " +
        drop + " points of accuracy out there. The scoring system charges extra at exactly maximum jet lag.";
    } else if (lateKm > earlyKm * 1.25) {
      rpVerdict = "The late rounds do travel farther (" + lateKm.toLocaleString() + " vs " +
        earlyKm.toLocaleString() + " km) but the group's accuracy barely moves. Distance is not the excuse.";
    } else if (drop > 5) {
      rpVerdict = "The late rounds cost " + drop +
        " points, but they are not meaningfully farther from home. That one is on us, not the map.";
    } else {
      rpVerdict = "No conspiracy detected: rounds 4–5 are neither farther away nor much harder than rounds 1–2.";
    }
  })();
  var totalKm = 0;
  covered.forEach(function (d) {
    var pts = dayGeo[d].pts.slice().sort(function (a, b) { return a.round - b.round; });
    for (var i = 1; i < pts.length; i++) totalKm += havKm(pts[i - 1], pts[i]);
  });
  var roundPos = { rows: rpRows, verdict: rpVerdict,
                   totalKm: Math.round(totalKm), laps: Math.round(totalKm / 40075 * 10) / 10 };

  var rematch = null;
  (function () {
    var revisited = [], fSum = 0, fN = 0, rSum = 0, rN = 0;
    Object.keys(countryAgg).forEach(function (c) {
      var ca = countryAgg[c];
      var ds = Object.keys(ca.byDate).sort();
      if (ds.length < 2) return;
      var f = ca.byDate[ds[0]], rs = 0, rn2 = 0;
      for (var i = 1; i < ds.length; i++) { rs += ca.byDate[ds[i]].sum; rn2 += ca.byDate[ds[i]].count; }
      if (!f.count || !rn2) return;
      fSum += f.sum; fN += f.count; rSum += rs; rN += rn2;
      if (f.count >= 4 && rn2 >= 4) {
        revisited.push({ country: c, firstAvg: r1(f.sum / f.count), firstN: f.count,
                         returnAvg: r1(rs / rn2), returnN: rn2,
                         delta: r1(rs / rn2 - f.sum / f.count), visits: ds.length });
      }
    });
    if (!fN || !rN) return;
    revisited.sort(function (a, b) { return b.delta - a.delta; });
    var fAvg = r1(fSum / fN), rAvg = r1(rSum / rN);
    rematch = {
      countries: revisited.slice(0, 8),
      firstAvg: fAvg, firstN: fN, returnAvg: rAvg, returnN: rN,
      bestGain: revisited.length && revisited[0].delta >= 2 ? revisited[0] : null,
      worstDrop: revisited.length && revisited[revisited.length - 1].delta <= -2
        ? revisited[revisited.length - 1] : null,
      verdict: rAvg - fAvg >= 1
        ? "Return visits average " + rAvg + " vs " + fAvg + " the first time. The group does, technically, learn."
        : (fAvg - rAvg >= 1
          ? "Return visits average " + rAvg + " vs " + fAvg + " the first time. Familiarity breeds nothing."
          : "First visits and rematches score within a point of each other (" + fAvg + " vs " + rAvg +
            "). Memory is not a factor either way.")
    };
  })();

  /* -------- geo superlatives -------- */
  var MIN_N = 3;
  var geoSup = [];
  function push(title, holder, color, value, desc) {
    if (holder === null || holder === undefined || value === null || value === undefined) return;
    var h = String(holder), v = String(value), dd = String(desc);
    if (!h || !v || !dd) return;
    if (/NaN|undefined/.test(h + v + dd)) return;
    geoSup.push({ title: title, holder: h, color: color || null, value: v, desc: dd });
  }
  function bestOf(arr, valFn, cmp) {
    var best = null;
    arr.forEach(function (x) {
      var v = valFn(x);
      if (v === null || v === undefined || (typeof v === "number" && isNaN(v))) return;
      if (best === null || cmp(v, valFn(best)) < 0) best = x;
    });
    return best;
  }
  var hi = function (a, b) { return b - a; };
  var lo = function (a, b) { return a - b; };
  var qualLocs = locs.filter(function (L) { return L.count >= MIN_N; });

  var bestLoc = bestOf(qualLocs, function (L) { return L.avg; }, hi);
  if (bestLoc) push("Best Group Outing", bestLoc.name, null, bestLoc.avg + " avg",
    "Highest group average of any stop on the map (" + bestLoc.count + " scored rounds, " +
    bestLoc.occLabel + "). Everyone just knew.");

  var worstLoc = bestOf(qualLocs, function (L) { return L.avg; }, lo);
  if (worstLoc) push("The Unplaceable", worstLoc.name, null, worstLoc.avg + " avg",
    "Lowest group average anywhere (" + worstLoc.count + " attempts, " + worstLoc.occLabel +
    "). The atlas remains unbothered.");

  var nemesis = bestOf(qualLocs, function (L) { return L.costSum; }, hi);
  if (nemesis) push("Collective Nemesis", nemesis.name, null,
    "−" + Math.round(nemesis.costSum) + " pts",
    "Cost the group more weighted points than any other location (" + nemesis.count +
    " rounds, multipliers included). " + nemesis.occLabel + ".");

  var disaster = bestOf(scoredRounds, function (r) { return r.cost; }, hi);
  if (disaster) push("The Expensive Miss", disaster.player, colorOf[disaster.player],
    "−" + Math.round(disaster.cost) + " pts",
    "A " + disaster.score + " on round " + disaster.round + " (worth ×" + disaster.mult +
    ") at " + disaster.name + ", " + fmtDate(disaster.date) + ". The multiplier shows no mercy.");

  var travelMax = -1, travelers = [];
  names.forEach(function (n) {
    var pg = perPlayer[n];
    if (!pg) return;
    var c = Object.keys(pg.locs).length;
    if (c > travelMax) { travelMax = c; travelers = [n]; }
    else if (c === travelMax) travelers.push(n);
  });
  if (travelMax > 0) push("Globe Trotter", travelers.join(" & "),
    travelers.length === 1 ? colorOf[travelers[0]] : null,
    travelMax + " locations",
    "Has put a score on more of the map than anyone else, out of " + locs.length + " charted.");

  function havKm(a, b) {
    var R = 6371, toR = Math.PI / 180;
    var dLat = (b.lat - a.lat) * toR, dLon = (b.lon - a.lon) * toR;
    var s = Math.sin(dLat / 2), t = Math.sin(dLon / 2);
    var h = s * s + Math.cos(a.lat * toR) * Math.cos(b.lat * toR) * t * t;
    return 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
  }
  var haul = null;
  covered.forEach(function (d) {
    var pts = dayGeo[d].pts.slice().sort(function (a, b) { return a.round - b.round; });
    if (pts.length < 2) return;
    var km = 0;
    for (var i = 1; i < pts.length; i++) km += havKm(pts[i - 1], pts[i]);
    if (!haul || km > haul.km) haul = { date: d, km: km, finals: dayGeo[d].finals };
  });
  if (haul) {
    var haulAvg = haul.finals.length
      ? Math.round(haul.finals.reduce(function (a, b) { return a + b; }, 0) / haul.finals.length) : null;
    push("The Long Haul", fmtDateFull(haul.date), null,
      Math.round(haul.km).toLocaleString() + " km",
      "The most ground covered in a single puzzle, round to round." +
      (haulAvg === null ? "" : " Group average that day: " + haulAvg + ". Jet lag is real."));
  }

  var safest = bestOf(qualLocs, function (L) { return L.min; }, hi);
  if (safest) push("No Notes", safest.name, null, "floor of " + safest.min,
    "Even the group's weakest attempt here scored " + safest.min + " (" + safest.count +
    " rounds). Unanimity, for once.");

  var coinFlip = bestOf(qualLocs, function (L) { return L.spread; }, hi);
  if (coinFlip) push("The Coin Flip", coinFlip.name, null,
    coinFlip.min + "–" + coinFlip.max,
    "Widest spread at a single stop: someone knew it cold, someone was on the wrong continent.");

  if (southAgg.count >= MIN_N && northAgg.count >= MIN_N) {
    var sAvg = r1(southAgg.sum / southAgg.count), nAvg = r1(northAgg.sum / northAgg.count);
    push("Southern Exposure", "Below the equator", null, sAvg + " vs " + nAvg,
      "Group round average south vs north of the equator (" + southAgg.count + " vs " +
      northAgg.count + " rounds). " +
      (sAvg < nAvg ? "Geography class was apparently very Northern-Hemisphere-centric."
                   : "The group travels south surprisingly well."));
  }

  if (hasContinents) {
    var pairBest = null;
    names.forEach(function (n) {
      var pg = perPlayer[n];
      if (!pg) return;
      Object.keys(pg.byCont).forEach(function (c) {
        var pc = pg.byCont[c];
        if (pc.count < MIN_N) return;
        var a = pc.sum / pc.count;
        if (!pairBest || a > pairBest.avg) pairBest = { player: n, cont: c, avg: a, count: pc.count };
      });
    });
    if (pairBest) push("Continent Specialist", pairBest.player, colorOf[pairBest.player],
      r1(pairBest.avg) + " avg",
      "The group's best player–continent pairing: " + pairBest.count + " rounds across " +
      pairBest.cont + ". Book the flight.");

    var worstCont = null;
    contPresent.forEach(function (c) {
      if (contAgg[c].count < MIN_N) return;
      var a = contAgg[c].sum / contAgg[c].count;
      if (!worstCont || a < worstCont.avg) worstCont = { cont: c, avg: a, count: contAgg[c].count };
    });
    if (worstCont) push("The Problem Continent", worstCont.cont, null,
      r1(worstCont.avg) + " avg",
      "The group's weakest continent, on " + worstCont.count + " rounds of evidence.");

    var homeSum = 0, homeCount = 0, abroadSum = 0, abroadCount = 0;
    contPresent.forEach(function (c) {
      if (c === "North America") { homeSum += contAgg[c].sum; homeCount += contAgg[c].count; }
      else { abroadSum += contAgg[c].sum; abroadCount += contAgg[c].count; }
    });
    if (homeCount >= MIN_N && abroadCount >= MIN_N) {
      var hAvg = r1(homeSum / homeCount), aAvg = r1(abroadSum / abroadCount);
      push("Home Turf", "North America vs the world", null, hAvg + " / " + aAvg,
        "Group round average at home vs abroad (" + homeCount + " vs " + abroadCount +
        " rounds). " + (hAvg >= aAvg ? "The passport costs points." : "Better tourists than locals."));
    }

    var tourist = null;
    names.forEach(function (n) {
      var pg = perPlayer[n];
      if (!pg || pg.abroad.count < MIN_N) return;
      var a = pg.abroad.sum / pg.abroad.count;
      if (!tourist || a > tourist.avg) tourist = { player: n, avg: a, count: pg.abroad.count };
    });
    if (tourist) push("Passport Champ", tourist.player, colorOf[tourist.player],
      r1(tourist.avg) + " abroad",
      "Best average outside North America (" + tourist.count + " rounds). Sends postcards.");
  }

  /* -------- superlatives from the new panels -------- */
  function fmtSlope(s) { return (s < 0 ? "−" : "+") + Math.abs(s).toFixed(1) + " pts/1,000 km"; }

  if (distance.flattest) push("Flattest Curve", distance.flattest.player,
    colorOf[distance.flattest.player], fmtSlope(distance.flattest.slope),
    "The gentlest accuracy-vs-distance slope in the group (" + distance.flattest.n +
    " located rounds). Plays like a local everywhere.");

  if (distance.steepest) push("The Decay Rate", distance.steepest.player,
    colorOf[distance.steepest.player], fmtSlope(distance.steepest.slope),
    "Accuracy decays " + Math.abs(distance.steepest.slope).toFixed(1) +
    " points per 1,000 km from western Mass (" + distance.steepest.n +
    " rounds). The atlas charges roaming fees.");

  var pfBest = null;
  geoNames.forEach(function (n) {
    var c = Object.keys(perPlayer[n].byCountry).length;
    if (c > 0 && (!pfBest || c > pfBest.count)) pfBest = { player: n, count: c };
  });
  if (pfBest) push("Passport Filler", pfBest.player, colorOf[pfBest.player],
    pfBest.count + " countries",
    "Has put a score down in more countries than anyone else, out of " +
    (passport ? passport.countryCount : pfBest.count) + " the group has faced.");

  var dualBest = null, krypt = null;
  geoNames.forEach(function (n) {
    var bc = perPlayer[n].byCountry;
    Object.keys(bc).forEach(function (c) {
      if (bc[c].count < MIN_N) return;
      var a = bc[c].sum / bc[c].count;
      if (!dualBest || a > dualBest.avg) dualBest = { player: n, country: c, avg: a, count: bc[c].count };
      if (!krypt || a < krypt.avg) krypt = { player: n, country: c, avg: a, count: bc[c].count };
    });
  });
  if (dualBest) push("The Dual Citizen", dualBest.player, colorOf[dualBest.player],
    r1(dualBest.avg) + " avg",
    "The group's best player–country pairing: " + dualBest.count + " rounds in " +
    dualBest.country + ". Should probably register to vote there.");
  if (krypt && (!dualBest || krypt.player !== dualBest.player || krypt.country !== dualBest.country))
    push("Cartographic Kryptonite", krypt.player, colorOf[krypt.player],
      r1(krypt.avg) + " avg",
      "The group's worst player–country pairing: " + krypt.count + " rounds in " +
      krypt.country + ". Some borders are personal.");

  if (islands.show && islands.best) push("Island Hopper", islands.best.player,
    colorOf[islands.best.player], islands.best.islAvg + " on islands",
    "Best island average in the group (" + islands.best.islN +
    " island rounds). Unbothered by ferries.");
  if (islands.show && islands.worst) push("Island Liability", islands.worst.player,
    colorOf[islands.worst.player], islands.worst.islAvg + " on islands",
    "Weakest island average (" + islands.worst.islN +
    " island rounds). Anything surrounded by water is a guess.");

  var southSpec = null;
  geoNames.forEach(function (n) {
    var pg = perPlayer[n];
    if (pg.south.count < 5) return;
    var a = sideAvg(pg.south);
    if (!southSpec || a > southSpec.avg) southSpec = { player: n, avg: a, count: pg.south.count };
  });
  if (southSpec) push("Southern-Hemisphere Specialist", southSpec.player,
    colorOf[southSpec.player], southSpec.avg + " below the line",
    "Best average south of the equator (" + southSpec.count +
    " rounds). The seasons are backwards and the form is not.");

  var backyard = null;
  geoNames.forEach(function (n) {
    var b0 = perPlayer[n].buckets[0];
    if (b0.count < 5) return;
    var a = sideAvg(b0);
    if (!backyard || a > backyard.avg) backyard = { player: n, avg: a, count: b0.count };
  });
  if (backyard) push("Backyard Bonus", backyard.player, colorOf[backyard.player],
    backyard.avg + " within 1,500 km",
    "Best average inside the comfort radius (" + backyard.count +
    " rounds within 1,500 km of home). Never leaves, never misses.");

  if (rematch && rematch.bestGain) push("Quick Study", rematch.bestGain.country, null,
    "+" + rematch.bestGain.delta + " on the rematch",
    "Biggest return-visit improvement: " + rematch.bestGain.firstAvg + " first time, " +
    rematch.bestGain.returnAvg + " after (" + rematch.bestGain.firstN + " vs " +
    rematch.bestGain.returnN + " rounds). Lessons were learned.");
  if (rematch && rematch.worstDrop) push("Fool Me Twice", rematch.worstDrop.country, null,
    "−" + Math.abs(rematch.worstDrop.delta) + " on the rematch",
    "Biggest return-visit collapse: " + rematch.worstDrop.firstAvg + " first time, " +
    rematch.worstDrop.returnAvg + " after (" + rematch.worstDrop.firstN + " vs " +
    rematch.worstDrop.returnN + " rounds). Apparently we retain nothing.");

  return {
    empty: false,
    hasContinents: hasContinents,
    coverage: {
      locDays: locDayKeys.length,
      playDays: playDayCount,
      coveredDays: covered.length,
      roundsScored: roundsScored,
      uniqueLocations: locs.length
    },
    locations: locs.map(function (L) {
      return { key: L.key, name: L.name, lat: L.lat, lon: L.lon,
               country: L.country, continent: L.continent,
               avg: L.avg, count: L.count, min: L.min, max: L.max,
               occLabel: L.occLabel };
    }),
    continentTable: continentTable,
    passport: passport,
    distance: distance,
    hemispheres: hemispheres,
    climate: climate,
    islands: islands,
    homes: homes,
    roundPos: roundPos,
    rematch: rematch,
    superlatives: geoSup
  };
}

if (typeof module !== 'undefined') module.exports = { computeStats: computeStats, computeGeoStats: computeGeoStats, geoMapSVG: geoMapSVG, geoSectionHTML: geoSectionHTML };

/* ================================ render ================================= */

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function dot(color) {
  return '<span class="dot" style="background:' + esc(color || "#5f6c7b") + '"></span>';
}
function fmtNum(x) { return x === null || x === undefined ? "—" : String(x); }
function fmtStamp(iso) {
  if (!iso) return "unknown";
  var d = iso.slice(0, 10), t = iso.slice(11, 16);
  return d + (t ? " at " + t : "");
}

function chipClass(score) {
  if (score >= 90) return "hi";
  if (score >= 70) return "mid";
  if (score >= 50) return "low";
  return "bad";
}

function sparkSVG(series, color, gmin, gmax) {
  if (!series || series.length < 2) return "";
  var w = 110, h = 26, pad = 2;
  var span = Math.max(1, gmax - gmin);
  var pts = series.map(function (v, i) {
    var x = pad + i * (w - 2 * pad) / (series.length - 1);
    var y = h - pad - (v - gmin) / span * (h - 2 * pad);
    return x.toFixed(1) + "," + y.toFixed(1);
  });
  var last = pts[pts.length - 1].split(",");
  return '<svg class="spark" width="110" height="26" viewBox="0 0 110 26" aria-hidden="true">' +
    '<polyline points="' + pts.join(" ") + '" fill="none" stroke="' + esc(color) + '" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>' +
    '<circle cx="' + last[0] + '" cy="' + last[1] + '" r="2.2" fill="' + esc(color) + '"/></svg>';
}

function trendSVG(stats) {
  var trend = stats.trend, dates = trend.dates;
  if (!dates || dates.length < 2) return "";
  var W = 940, H = 320, L = 46, R = 14, T = 14, B = 30;
  var lo = Math.floor(trend.min / 50) * 50, hi = Math.ceil(trend.max / 50) * 50;
  if (hi === lo) hi = lo + 50;
  function X(i) { return L + i * (W - L - R) / (dates.length - 1); }
  function Y(v) { return T + (hi - v) / (hi - lo) * (H - T - B); }
  var out = ['<svg viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="7-day rolling average final score per player">'];
  var step = (hi - lo) > 250 ? 100 : 50;
  for (var g = lo; g <= hi; g += step) {
    var gy = Y(g).toFixed(1);
    out.push('<line x1="' + L + '" y1="' + gy + '" x2="' + (W - R) + '" y2="' + gy + '" stroke="#263140" stroke-width="1"/>');
    out.push('<text x="' + (L - 8) + '" y="' + (+gy + 4) + '" text-anchor="end" font-size="11" fill="#5f6c7b">' + g + '</text>');
  }
  var nLab = Math.min(6, dates.length);
  for (var li = 0; li < nLab; li++) {
    var idx = Math.round(li * (dates.length - 1) / (nLab - 1));
    var lab = dates[idx].slice(5).replace("-", "/");
    out.push('<text x="' + X(idx).toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="11" fill="#5f6c7b">' + lab + '</text>');
  }
  stats.names.forEach(function (n) {
    var vals = trend.series[n];
    if (!vals) return;
    var color = stats.colorOf[n];
    var seg = [];
    function flush() {
      if (seg.length >= 2) {
        out.push('<polyline points="' + seg.join(" ") + '" fill="none" stroke="' + esc(color) +
                 '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>');
      }
      seg = [];
    }
    vals.forEach(function (v, i) {
      if (v === null) { flush(); return; }
      seg.push(X(i).toFixed(1) + "," + Y(v).toFixed(1));
    });
    flush();
    vals.forEach(function (v, i) {
      if (v === null) return;
      out.push('<circle cx="' + X(i).toFixed(1) + '" cy="' + Y(v).toFixed(1) + '" r="2.4" fill="' + esc(color) +
               '" opacity="0.9"><title>' + esc(n) + " · " + esc(trend.dates[i]) + " · " + v + '</title></circle>');
    });
  });
  out.push("</svg>");
  return out.join("");
}

/* ============================== geography =============================== */

/* Simplified world landmass (Natural Earth 110m), equirectangular projection

function geoRGB(v) {
  v = Math.max(0, Math.min(100, +v || 0));
  var stops = [
    [0,   [62, 108, 194]],
    [55,  [122, 126, 138]],
    [80,  [196, 156, 80]],
    [100, [240, 205, 124]]
  ];
  for (var i = 1; i < stops.length; i++) {
    if (v <= stops[i][0]) {
      var t = (v - stops[i - 1][0]) / (stops[i][0] - stops[i - 1][0]);
      var a = stops[i - 1][1], b = stops[i][1];
      return [Math.round(a[0] + (b[0] - a[0]) * t),
              Math.round(a[1] + (b[1] - a[1]) * t),
              Math.round(a[2] + (b[2] - a[2]) * t)];
    }
  }
  return stops[stops.length - 1][1];
}
function geoColor(v) { var c = geoRGB(v); return "rgb(" + c[0] + "," + c[1] + "," + c[2] + ")"; }

function geoMapSVG(geo) {
  var out = ['<svg viewBox="0 0 1000 500" role="img" aria-label="World map of daily puzzle locations, colored by group average round score">'];
  out.push('<path d="' + WORLD_PATH + '" fill="#1b2530" fill-rule="evenodd"/>');
  out.push('<line x1="0" y1="250" x2="1000" y2="250" stroke="#263140" stroke-width="0.6" stroke-dasharray="3 6"/>');
  geo.locations.forEach(function (L) {
    var x = (L.lon + 180) * (1000 / 360), y = (90 - L.lat) * (500 / 180);
    out.push('<circle class="geo-dot" cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) +
      '" r="4.2" fill="' + geoColor(L.avg) + '" stroke="#0d1117" stroke-width="1.1" opacity="0.95">' +
      '<title>' + esc(L.name + " · " + L.occLabel + " · group avg " + L.avg) + '</title></circle>');
  });
  out.push('</svg>');
  return out.join("");
}
